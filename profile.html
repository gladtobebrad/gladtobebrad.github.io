<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Profile — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth } from "./js/auth.js";
    import { getUser, getLeaderboard, getEvents, getTeamsForEvent, getSurfers, getResults, getCurrentEventForTour, getTeam } from "./js/db.js";
    import { scoreTeam } from "./js/scoring.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading, formatSalary, statusBadge } from "./js/ui.js";

    const SEASON = 2026;

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) {
        showAuthGate(main);
        return;
      }
      showLoading(main);
      await renderProfile(main);
    });

    async function renderProfile(container) {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get("id");

      if (!userId) {
        container.innerHTML = `
          <h1 class="page-title">Player Profile</h1>
          <div class="card"><p class="text-muted">No player specified. <a href="players.html">View all players</a>.</p></div>
        `;
        return;
      }

      try {
        const [playerDoc, leaderboard, events, surfers] = await Promise.all([
          getUser(userId),
          getLeaderboard(SEASON),
          getEvents(SEASON),
          getSurfers()
        ]);

        if (!playerDoc) {
          container.innerHTML = `
            <h1 class="page-title">Player Not Found</h1>
            <div class="card"><p class="text-muted">This player does not exist. <a href="players.html">Back to players</a>.</p></div>
          `;
          return;
        }

        // Build surfer lookup
        const surferMap = {};
        surfers.forEach((s) => { surferMap[s.id] = s; });

        // Find player's rank from leaderboard
        leaderboard.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));
        const lbEntry = leaderboard.find((e) => e.userId === userId);
        const rank = lbEntry
          ? leaderboard.indexOf(lbEntry) + 1
          : null;

        const avatarUrl = playerDoc.avatarUrl || playerDoc.photoUrl || "";
        const teamName = playerDoc.teamName || playerDoc.displayName || "Anonymous";
        const displayName = playerDoc.displayName || "Anonymous";
        const adsCoins = playerDoc.adsCoins ?? 10;

        // Load current event teams if trading is locked
        const [mensEvent, womensEvent] = await Promise.all([
          getCurrentEventForTour("mens", SEASON),
          getCurrentEventForTour("womens", SEASON)
        ]);
        const currentTeams = [];
        for (const ev of [mensEvent, womensEvent].filter(Boolean)) {
          if (!ev.tradingOpen) {
            const team = await getTeam(userId, ev.id);
            if (team) currentTeams.push({ event: ev, team, label: ev.tour === "womens" ? "Women's CT" : "Men's CT" });
          }
        }

        // Load all events — team + score per event, split by tour
        const mensEvents = events.filter((e) => (e.tour || "mens") === "mens");
        const womensEvents = events.filter((e) => e.tour === "womens");

        const loadEventRosters = async (tourEvents) => {
          const rosters = [];
          for (const event of tourEvents) {
            const team = await getTeam(userId, event.id);
            if (!team) { rosters.push({ event, team: null, score: null }); continue; }
            let score = null;
            if (event.status === "completed") {
              const results = await getResults(event.id);
              score = scoreTeam(team, results, event.tour || "mens");
            }
            rosters.push({ event, team, score });
          }
          return rosters;
        };

        const [mensRosters, womensRosters] = await Promise.all([
          loadEventRosters(mensEvents),
          loadEventRosters(womensEvents)
        ]);

        container.innerHTML = `
          <div class="flex gap-2 mb-3" style="align-items:center">
            ${avatarUrl
              ? `<img src="${avatarUrl}" alt="" class="avatar-lg">`
              : `<div class="avatar-lg avatar-lg--empty">${(displayName || "?")[0]}</div>`}
            <div>
              <h1 class="page-title" style="margin-bottom:0">${teamName}</h1>
              ${teamName !== displayName ? `<p class="text-muted">${displayName}</p>` : ""}
            </div>
          </div>

          <!-- Season Summary -->
          <div class="card mb-3">
            <div class="card__header">
              <span class="card__title">Season ${SEASON} Standings</span>
              <span class="ads-coin-badge">🪙 ${adsCoins} ADScoin</span>
            </div>
            <div class="grid grid--3 text-center mt-2">
              <div>
                <p class="text-xs text-muted">Rank</p>
                <p style="font-size:1.5rem;font-weight:600">${rank || "—"}</p>
              </div>
              <div>
                <p class="text-xs text-muted">Best 9 Total</p>
                <p style="font-size:1.5rem;font-weight:600">${lbEntry?.bestNineTotal || 0}</p>
              </div>
              <div>
                <p class="text-xs text-muted">Events Played</p>
                <p style="font-size:1.5rem;font-weight:600">${lbEntry?.eventsPlayed || 0}</p>
              </div>
            </div>
          </div>

          <!-- Current Event Teams (visible when trading locked) -->
          ${currentTeams.length > 0 ? `
            <h2 class="mb-2">Current Roster${currentTeams.length > 1 ? "s" : ""}</h2>
            <div class="grid grid--2 mb-4">
              ${currentTeams.map(({ event, team, label }) => `
                <div class="card">
                  <div class="card__header">
                    <span class="card__title">${label} — ${event.name}</span>
                    <span class="text-sm text-muted">${formatSalary(team.totalSpent || 0)} spent</span>
                  </div>
                  <div class="team-photo-strip">
                    ${team.surfers.map((s) => {
                      const data = surferMap[s.surferId] || {};
                      const photo = data.photoUrl
                        ? `<img src="${data.photoUrl}" class="team-strip__photo" alt="">`
                        : `<div class="team-strip__photo team-strip__photo--empty">${(data.name || "?")[0]}</div>`;
                      return `<div class="team-strip__surfer">
                        ${photo}
                        <span class="team-strip__name">${(data.name || s.surferId.replace(/-/g, " ")).split(" ").pop()}</span>
                      </div>`;
                    }).join("")}
                    ${team.alternate ? (() => {
                      const altData = surferMap[team.alternate.surferId] || {};
                      const altPhoto = altData.photoUrl
                        ? `<img src="${altData.photoUrl}" class="team-strip__photo team-strip__photo--alt" alt="">`
                        : `<div class="team-strip__photo team-strip__photo--empty team-strip__photo--alt">${(altData.name || "?")[0]}</div>`;
                      return `<div class="team-strip__surfer">
                        ${altPhoto}
                        <span class="team-strip__name" style="color:var(--color-warm-brown)">ALT</span>
                      </div>`;
                    })() : ""}
                  </div>
                </div>
              `).join("")}
            </div>
          ` : ""}

          <!-- Event Rosters by Tour -->
          ${[{ label: "Men's CT", rosters: mensRosters }, { label: "Women's CT", rosters: womensRosters }]
            .filter(({ rosters }) => rosters.length > 0)
            .map(({ label, rosters }) => `
              <h2 class="mb-2">${label}</h2>
              <div class="grid grid--2 mb-4">
                ${rosters.map(({ event, team, score }) => `
                  <div class="card">
                    <div class="card__header">
                      <span class="card__title">${event.name}</span>
                      <span class="text-sm" style="font-weight:600">
                        ${score ? `${score.totalPoints} pts` : event.status === "live" ? "🔴 Live" : "Upcoming"}
                      </span>
                    </div>
                    ${team ? `
                      <div class="team-photo-strip">
                        ${team.surfers.map((s, i) => {
                          const data = surferMap[s.surferId] || {};
                          const sc = score?.surferScores?.[i];
                          const photo = data.photoUrl
                            ? `<img src="${data.photoUrl}" class="team-strip__photo" alt="">`
                            : `<div class="team-strip__photo team-strip__photo--empty">${(data.name || "?")[0]}</div>`;
                          return `<div class="team-strip__surfer">
                            ${photo}
                            <span class="team-strip__name">${(data.name || s.surferId.replace(/-/g, " ")).split(" ").pop()}</span>
                            ${sc ? `<span class="team-strip__name" style="color:var(--color-sage);font-weight:600">${sc.points}pt</span>` : ""}
                          </div>`;
                        }).join("")}
                        ${team.alternate ? (() => {
                          const altData = surferMap[team.alternate.surferId] || {};
                          const altPhoto = altData.photoUrl
                            ? `<img src="${altData.photoUrl}" class="team-strip__photo team-strip__photo--alt" alt="">`
                            : `<div class="team-strip__photo team-strip__photo--empty team-strip__photo--alt">${(altData.name || "?")[0]}</div>`;
                          return `<div class="team-strip__surfer">
                            ${altPhoto}
                            <span class="team-strip__name" style="color:var(--color-warm-brown)">ALT${score?.alternateUsed ? "✓" : ""}</span>
                          </div>`;
                        })() : ""}
                      </div>
                    ` : `<p class="text-muted text-sm">No team submitted.</p>`}
                  </div>
                `).join("")}
              </div>
            `).join("")}

          <div class="mt-3">
            <a href="players.html" class="btn btn--outline">&larr; Back to Players</a>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Error</h1>
          <div class="card"><p class="text-muted">${err.message}</p></div>
        `;
      }
    }
  </script>
</body>
</html>
