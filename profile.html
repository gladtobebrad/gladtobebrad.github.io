<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Profile — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth } from "./js/auth.js";
    import { getUser, getLeaderboard, getEvents, getSurfers, getResults, getCurrentEventForTour, getTeam } from "./js/db.js";
    import { scoreTeam } from "./js/scoring.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading, statusBadge } from "./js/ui.js";

    const SEASON = 2026;

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) {
        showAuthGate(main);
        return;
      }
      showLoading(main);
      await renderProfile(main, user);
    });

    async function renderProfile(container, currentUser) {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get("id");

      if (!userId) {
        container.innerHTML = `
          <h1 class="page-title">Player Profile</h1>
          <div class="card"><p class="text-muted">No player specified. <a href="standings.html">View standings</a>.</p></div>
        `;
        return;
      }

      try {
        const [playerDoc, leaderboard, events, surfers] = await Promise.all([
          getUser(userId),
          getLeaderboard(SEASON),
          getEvents(SEASON),
          getSurfers()
        ]);

        if (!playerDoc) {
          container.innerHTML = `
            <h1 class="page-title">Player Not Found</h1>
            <div class="card"><p class="text-muted">This player does not exist. <a href="standings.html">Back to standings</a>.</p></div>
          `;
          return;
        }

        // Build surfer lookup
        const surferMap = {};
        surfers.forEach((s) => { surferMap[s.id] = s; });

        // Find player's rank from leaderboard
        leaderboard.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));
        const lbEntry = leaderboard.find((e) => e.userId === userId);
        const rank = lbEntry
          ? leaderboard.indexOf(lbEntry) + 1
          : null;

        const avatarUrl = playerDoc.avatarUrl || playerDoc.photoUrl || "";
        const teamName = playerDoc.teamName || playerDoc.displayName || "Anonymous";
        const displayName = playerDoc.displayName || "Anonymous";
        const adsCoins = playerDoc.adsCoins ?? 10;

        // Load current events and rosters for both tours
        const [mensEvent, womensEvent] = await Promise.all([
          getCurrentEventForTour("mens", SEASON),
          getCurrentEventForTour("womens", SEASON)
        ]);
        const isOwn = currentUser?.uid === userId;
        const mensCurrentTeam = mensEvent && (isOwn || mensEvent.tradingOpen === false)
          ? await getTeam(userId, mensEvent.id) : null;
        const womensCurrentTeam = womensEvent && (isOwn || womensEvent.tradingOpen === false)
          ? await getTeam(userId, womensEvent.id) : null;
        const mensLocked = !mensEvent || mensEvent.tradingOpen === false;
        const womensLocked = !womensEvent || womensEvent.tradingOpen === false;

        // Load all events — team + score per event, split by tour
        const mensEvents = events.filter((e) => (e.tour || "mens") === "mens");
        const womensEvents = events.filter((e) => (e.tour || "") === "womens");

        const loadEventRosters = async (tourEvents) => {
          const rosters = [];
          for (const event of tourEvents) {
            if (event.tradingOpen !== false) { rosters.push({ event, team: null, score: null }); continue; }
            const team = await getTeam(userId, event.id);
            if (!team) { rosters.push({ event, team: null, score: null }); continue; }
            let score = null;
            if (event.status === "completed") {
              const results = await getResults(event.id);
              score = scoreTeam(team, results, event.tour || "mens");
            }
            rosters.push({ event, team, score });
          }
          return rosters;
        };

        const [mensRosters, womensRosters] = await Promise.all([
          loadEventRosters(mensEvents),
          loadEventRosters(womensEvents)
        ]);

        // Compute per-tour standings from rosters
        const toStandings = (rosters) => {
          const scored = rosters.filter(r => r.score).map(r => r.score.totalPoints).sort((a, b) => b - a);
          return {
            eventsPlayed: scored.length,
            best9: scored.slice(0, 9).reduce((s, p) => s + p, 0),
          };
        };
        const mensStandings = toStandings(mensRosters);
        const womensStandings = toStandings(womensRosters);

        // Helper: render a team photo strip
        // large=true → 4-per-row grid with bigger photos (current roster)
        // large=false → small flex-wrap strip (event cards)
        const renderStrip = (team, score, large = false, tour = "mens") => {
          if (!team) return `<p class="text-muted text-sm">No team submitted.</p>`;
          const photoSize = large ? "80px" : "44px";
          const surferWidth = large ? "80px" : "48px";
          const shortName = (fullName) => {
            const parts = fullName.trim().split(" ");
            return parts.length > 1 ? `${parts[0][0]}. ${parts[parts.length - 1]}` : parts[0];
          };

          if (large) {
            const rosterSize = tour === "womens" ? 5 : 8; // required surfer slots
            const slots = [];

            // Surfer slots — grey circle only if the user left this spot unfilled
            for (let i = 0; i < rosterSize; i++) {
              if (i < team.surfers.length) {
                slots.push({ type: "surfer", s: team.surfers[i], i });
              } else {
                slots.push({ type: "grey" });
              }
            }

            // Alt slot — grey circle only if no alt picked
            slots.push(team.alternate ? { type: "alt", s: team.alternate } : { type: "grey" });

            // Pad to 10 with invisible placeholders (no circle, just grid space)
            while (slots.length < 10) slots.push({ type: "invisible" });

            const slotHtml = slots.map((slot) => {
              if (slot.type === "invisible") {
                return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">
                  <div style="width:${photoSize};height:${photoSize}"></div>
                  <span style="font-size:0.62rem;color:transparent">—</span>
                </div>`;
              }
              if (slot.type === "grey") {
                // grey: unfilled required spot — show grey circle, no name row
                const isAltSlot = slots.indexOf(slot) === rosterSize; // last required slot = alt
                return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">
                  <div style="position:relative;width:${photoSize};height:${photoSize}">
                    <div style="width:100%;height:100%;border-radius:50%;background:var(--color-beige);opacity:0.35"></div>
                    ${isAltSlot ? `<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;font-weight:700;color:var(--color-warm-gray);background:rgba(255,255,255,0.85);border-radius:4px;padding:0 3px;line-height:1.4;white-space:nowrap">ALT</span>` : ""}
                  </div>
                  <span style="font-size:0.62rem;color:transparent">—</span>
                </div>`;
              }
              if (slot.type === "alt") {
                const d = surferMap[slot.s.surferId] || {};
                const altName = d.name || slot.s.surferId.replace(/-/g, " ");
                const p = d.photoUrl
                  ? `<img src="${d.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px dashed var(--color-warm-gray);opacity:0.8" alt="">`
                  : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown);opacity:0.8">${altName[0]}</div>`;
                return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">
                  <div style="position:relative;width:${photoSize};height:${photoSize}">
                    ${p}
                    <span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;font-weight:700;color:var(--color-warm-gray);background:rgba(255,255,255,0.85);border-radius:4px;padding:0 3px;line-height:1.4;white-space:nowrap">ALT${score?.alternateUsed ? "✓" : ""}</span>
                  </div>
                  <span style="font-size:0.62rem;text-align:center;max-width:${surferWidth};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-warm-brown)">${shortName(altName)}</span>
                </div>`;
              }
              // type === "surfer"
              const data = surferMap[slot.s.surferId] || {};
              const sc = score?.surferScores?.[slot.i];
              const name = data.name || slot.s.surferId.replace(/-/g, " ");
              const photo = data.photoUrl
                ? `<img src="${data.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px solid var(--color-beige)" alt="">`
                : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown)">${name[0]}</div>`;
              return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">
                ${photo}
                <span style="font-size:0.62rem;text-align:center;max-width:${surferWidth};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-dark)">${shortName(name)}</span>
                ${sc ? `<span style="font-size:0.62rem;color:var(--color-sage);font-weight:600">${sc.points}pt</span>` : ""}
              </div>`;
            }).join("");

            return `<div style="display:grid;grid-template-columns:repeat(5,80px);gap:0.5rem;margin-top:0.5rem">${slotHtml}</div>`;
          }

          // Small strip (event cards)
          const surferHtml = team.surfers.map((s, i) => {
            const data = surferMap[s.surferId] || {};
            const sc = score?.surferScores?.[i];
            const name = data.name || s.surferId.replace(/-/g, " ");
            const photo = data.photoUrl
              ? `<img src="${data.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px solid var(--color-beige)" alt="">`
              : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown)">${name[0]}</div>`;
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">
              ${photo}
              <span style="font-size:0.62rem;text-align:center;max-width:${surferWidth};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-dark)">${shortName(name)}</span>
              ${sc ? `<span style="font-size:0.62rem;color:var(--color-sage);font-weight:600">${sc.points}pt</span>` : ""}
            </div>`;
          }).join("");
          const altHtml = team.alternate ? (() => {
            const d = surferMap[team.alternate.surferId] || {};
            const altName = d.name || team.alternate.surferId.replace(/-/g, " ");
            const p = d.photoUrl
              ? `<img src="${d.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px dashed var(--color-warm-gray);opacity:0.75" alt="">`
              : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown);opacity:0.75">${altName[0]}</div>`;
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">${p}<span style="font-size:0.62rem;color:var(--color-warm-brown)">ALT${score?.alternateUsed ? "✓" : ""}</span></div>`;
          })() : "";
          return `<div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.4rem">${surferHtml}${altHtml}</div>`;
        };

        // Helper: render a single past/upcoming event card (compact)
        const renderEventCard = (event, team, score) => `
          <div class="card mb-3">
            <div class="card__header">
              <span class="card__title" style="font-size:0.9rem">${event.name}</span>
              <span class="text-sm" style="font-weight:600">
                ${score ? `${score.totalPoints} pts` : event.status === "live" ? "🔴 Live" : statusBadge(event.status)}
              </span>
            </div>
            ${renderStrip(team, score, false)}
          </div>`;

        // Helper: standings card for one tour
        const renderStandings = (label, standings) => `
          <div class="card mb-3">
            <div class="card__header">
              <span class="card__title">Season ${SEASON} — ${label}</span>
            </div>
            <div class="grid grid--2 text-center mt-2">
              <div>
                <p class="text-xs text-muted">Best 9 Total</p>
                <p style="font-size:1.4rem;font-weight:600">${standings.eventsPlayed > 0 ? standings.best9 : "—"}</p>
              </div>
              <div>
                <p class="text-xs text-muted">Events Played</p>
                <p style="font-size:1.4rem;font-weight:600">${standings.eventsPlayed > 0 ? standings.eventsPlayed : "—"}</p>
              </div>
            </div>
          </div>`;

        container.innerHTML = `
          <!-- Avatar + Name -->
          <div class="flex gap-2 mb-4" style="align-items:center">
            <div style="display:flex;flex-direction:column;align-items:center;gap:0.4rem;flex-shrink:0">
              ${avatarUrl
                ? `<img src="${avatarUrl}" alt="" class="avatar-lg" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
                : `<div class="avatar-lg avatar-lg--empty">${(displayName || "?")[0]}</div>`}
              ${currentUser?.uid === userId ? `<a href="index.html" class="btn btn--outline btn--sm" style="font-size:0.72rem;padding:0.2rem 0.6rem;white-space:nowrap">Edit Profile</a>` : ""}
            </div>
            <div>
              <h1 class="page-title" style="margin-bottom:0">${teamName}</h1>
              ${teamName !== displayName ? `<p class="text-muted">${displayName}</p>` : ""}
              <span class="ads-coin-badge" style="margin-top:0.4rem">🪙 ${adsCoins} ADScoin</span>
            </div>
          </div>

          <!-- 2-column layout: Mens LHS, Womens RHS -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">

            <!-- LHS: Men's CT -->
            <div>
              <h2 class="mb-3">Men's CT</h2>
              ${renderStandings("Men's CT", mensStandings)}
              ${mensEvent ? `
                <div class="card mb-3">
                  <div class="card__header">
                    <span class="card__title">Current Roster</span>
                    <span class="text-sm text-muted">${mensEvent.name}</span>
                  </div>
                  ${!isOwn && !mensLocked
                    ? `<p class="text-sm text-muted" style="padding:0.5rem 0">Roster hidden until trading closes.</p>`
                    : renderStrip(mensCurrentTeam, null, true, "mens")}
                </div>
              ` : ""}
              ${mensRosters.map(({ event, team, score }) => renderEventCard(event, team, score)).join("")}
            </div>

            <!-- RHS: Women's CT -->
            <div>
              <h2 class="mb-3">Women's CT</h2>
              ${renderStandings("Women's CT", womensStandings)}
              ${womensEvent ? `
                <div class="card mb-3">
                  <div class="card__header">
                    <span class="card__title">Current Roster</span>
                    <span class="text-sm text-muted">${womensEvent.name}</span>
                  </div>
                  ${!isOwn && !womensLocked
                    ? `<p class="text-sm text-muted" style="padding:0.5rem 0">Roster hidden until trading closes.</p>`
                    : renderStrip(womensCurrentTeam, null, true, "womens")}
                </div>
              ` : ""}
              ${womensRosters.map(({ event, team, score }) => renderEventCard(event, team, score)).join("")}
            </div>

          </div>

          <div class="mt-3">
            <a href="standings.html" class="btn btn--outline">&larr; Back to Standings</a>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Error</h1>
          <div class="card"><p class="text-muted">${err.message}</p></div>
        `;
      }
    }
  </script>
</body>
</html>
