<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth } from "./js/auth.js";
    import { getAllUsers, getLeaderboard } from "./js/db.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading } from "./js/ui.js";

    const SEASON = 2026;

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) {
        showAuthGate(main);
        return;
      }
      showLoading(main);
      await renderPage(main);
    });

    async function renderPage(container) {
      try {
        const [users, mensLb, womensLb] = await Promise.all([
          getAllUsers(),
          getLeaderboard(SEASON, "mens"),
          getLeaderboard(SEASON, "womens")
        ]);

        const userMap = {};
        users.forEach(u => { userMap[u.id] = u; });

        function buildStandings(lb) {
          lb.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));
          return lb.map((entry, i) => {
            const u = userMap[entry.userId] || {};
            return {
              id: entry.userId,
              rank: i + 1,
              displayName: u.displayName || entry.displayName || "Anonymous",
              teamName: u.teamName || entry.teamName || u.displayName || "—",
              avatarUrl: u.avatarUrl || u.photoUrl || entry.avatarUrl || "",
              bestNineTotal: entry.bestNineTotal || 0,
              eventsPlayed: entry.eventsPlayed || 0
            };
          });
        }

        function standingsTable(players, tableId) {
          if (!players.length) return `<p class="text-muted">No standings yet.</p>`;
          return `
            <table class="data-table" id="${tableId}">
              <thead><tr>
                <th class="sortable-col" data-col="rank" data-dir="asc" style="cursor:pointer;user-select:none"># <span class="sort-arrow" style="font-size:0.6rem;opacity:1">▲</span></th>
                <th>Player</th>
                <th class="text-right sortable-col" data-col="bestNineTotal" data-dir="" style="cursor:pointer;user-select:none">Best 9 <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span></th>
                <th class="text-right sortable-col" data-col="eventsPlayed" data-dir="" style="cursor:pointer;user-select:none">Events <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span></th>
              </tr></thead>
              <tbody>
                ${players.map(p => `
                  <tr style="cursor:pointer" onclick="window.location.href='profile.html?id=${p.id}'"
                    data-rank="${p.rank}" data-best="${p.bestNineTotal}" data-events="${p.eventsPlayed}">
                    <td><span class="leaderboard-rank leaderboard-rank--${p.rank}">${p.rank}</span></td>
                    <td class="flex gap-1" style="align-items:center">
                      ${p.avatarUrl
                        ? `<img src="${p.avatarUrl}" alt="" class="avatar-sm" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
                        : `<div class="avatar-sm avatar-sm--empty">${(p.displayName || "?")[0]}</div>`}
                      <div>
                        <strong>${p.teamName}</strong>
                        ${p.teamName !== p.displayName ? `<span class="text-xs text-muted" style="margin-left:0.5rem">${p.displayName}</span>` : ""}
                      </div>
                    </td>
                    <td class="text-right">${p.bestNineTotal}</td>
                    <td class="text-right">${p.eventsPlayed}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          `;
        }

        const mensPlayers = buildStandings(mensLb);
        const womensPlayers = buildStandings(womensLb);

        container.innerHTML = `
          <h1 class="page-title">Season Standings</h1>
          <p class="text-muted mb-3">${users.length} registered player${users.length !== 1 ? "s" : ""}</p>
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Men's CT</span></div>
            ${standingsTable(mensPlayers, "table-mens")}
          </div>
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Women's CT</span></div>
            ${standingsTable(womensPlayers, "table-womens")}
          </div>
          <div class="mt-3">
            <a href="index.html" class="btn btn--outline">&larr; Back to Dashboard</a>
          </div>
        `;
        // Wire up sortable column headers
        container.querySelectorAll(".sortable-col").forEach((th) => {
          th.addEventListener("click", () => {
            const col = th.dataset.col;
            const table = th.closest("table");
            const tbody = table.querySelector("tbody");
            // Toggle direction
            const prev = th.dataset.dir;
            const dir = prev === "asc" ? "desc" : "asc";
            // Reset all headers in this table
            table.querySelectorAll(".sortable-col").forEach((h) => {
              h.dataset.dir = "";
              h.querySelector(".sort-arrow").textContent = "▲▼";
              h.querySelector(".sort-arrow").style.opacity = "0.4";
            });
            th.dataset.dir = dir;
            th.querySelector(".sort-arrow").textContent = dir === "asc" ? "▲" : "▼";
            th.querySelector(".sort-arrow").style.opacity = "1";

            const colMap = { rank: "data-rank", bestNineTotal: "data-best", eventsPlayed: "data-events" };
            const attr = colMap[col];
            const rows = [...tbody.querySelectorAll("tr")];
            rows.sort((a, b) => {
              const av = parseFloat(a.getAttribute(attr) ?? 0);
              const bv = parseFloat(b.getAttribute(attr) ?? 0);
              return dir === "asc" ? av - bv : bv - av;
            });
            rows.forEach(r => tbody.appendChild(r));
          });
        });

      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Season Standings</h1>
          <div class="card"><p class="text-muted">Unable to load data. ${err.message}</p></div>
        `;
      }
    }
  </script>
</body>
</html>
