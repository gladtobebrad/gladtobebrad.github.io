<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth } from "./js/auth.js";
    import { getLeaderboard, getEvents, getAllUsers } from "./js/db.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading } from "./js/ui.js";

    const SEASON = 2026;

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) { showAuthGate(main); return; }
      showLoading(main);
      await renderPage(main);
    });

    async function renderPage(container) {
      try {
        const [mensLb, womensLb, events] = await Promise.all([
          getLeaderboard(SEASON, "mens"),
          getLeaderboard(SEASON, "womens"),
          getEvents(SEASON)
        ]);

        // Completed events per tour, sorted by eventNumber
        const mensEvents = events
          .filter(e => (e.tour || "mens") === "mens" && e.status === "completed")
          .sort((a, b) => a.eventNumber - b.eventNumber);
        const womensEvents = events
          .filter(e => e.tour === "womens" && e.status === "completed")
          .sort((a, b) => a.eventNumber - b.eventNumber);

        // If no leaderboard data yet, fall back to all registered users (pre-season)
        let allUsers = null;
        if (!mensLb.length && !womensLb.length) {
          allUsers = await getAllUsers();
        }

        function buildStandings(lb) {
          if (lb.length) {
            lb.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));
            return lb.map((entry, i) => ({
              id: entry.userId,
              rank: i + 1,
              displayName: entry.displayName || "Anonymous",
              teamName: entry.teamName || entry.displayName || "—",
              avatarUrl: entry.avatarUrl || "",
              bestNineTotal: entry.bestNineTotal || 0,
              allEventsTotal: entry.allEventsTotal || 0,
              eventsPlayed: entry.eventsPlayed || 0,
              eventScores: entry.eventScores || {}
            }));
          }
          // Pre-season fallback: show all users with no scores
          return (allUsers || []).map((u, i) => ({
            id: u.id,
            rank: i + 1,
            displayName: u.displayName || "Anonymous",
            teamName: u.teamName || u.displayName || "—",
            avatarUrl: u.avatarUrl || u.photoUrl || "",
            bestNineTotal: 0,
            allEventsTotal: 0,
            eventsPlayed: 0,
            eventScores: {}
          }));
        }

        function standingsTable(players, tourEvents, tableId) {
          if (!players.length) return `<p class="text-muted">No players yet.</p>`;
          return `
            <div style="overflow-x:auto">
              <table class="data-table" id="${tableId}">
                <thead><tr>
                  <th class="sortable-col" data-col="rank" data-dir="asc" style="cursor:pointer;user-select:none"># <span class="sort-arrow" style="font-size:0.6rem;opacity:1">▲</span></th>
                  <th>Player</th>
                  <th class="text-right sortable-col" data-col="bestNineTotal" data-dir="" style="cursor:pointer;user-select:none;white-space:nowrap">Best 9 <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span></th>
                  <th class="text-right sortable-col" data-col="allEventsTotal" data-dir="" style="cursor:pointer;user-select:none;white-space:nowrap">Total <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span></th>
                  ${tourEvents.map(e => `
                    <th class="text-right sortable-col" data-col="evt_${e.id}" data-dir="" style="cursor:pointer;user-select:none;white-space:nowrap;font-size:0.7rem">
                      ${e.name.split(" ").slice(-2).join(" ")} <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span>
                    </th>
                  `).join("")}
                </tr></thead>
                <tbody>
                  ${players.map(p => `
                    <tr style="cursor:pointer" onclick="window.location.href='profile.html?id=${p.id}'"
                      data-rank="${p.rank}" data-best="${p.bestNineTotal}" data-total="${p.allEventsTotal}"
                      data-search="${(p.teamName + " " + p.displayName).toLowerCase()}"
                      ${tourEvents.map(e => `data-evt-${e.id}="${p.eventScores[e.id] ?? -1}"`).join(" ")}>
                      <td><span class="leaderboard-rank leaderboard-rank--${p.rank}">${p.rank}</span></td>
                      <td class="flex gap-1" style="align-items:center">
                        ${p.avatarUrl
                          ? `<img src="${p.avatarUrl}" alt="" class="avatar-sm" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
                          : `<div class="avatar-sm avatar-sm--empty">${(p.displayName || "?")[0]}</div>`}
                        <div>
                          <strong>${p.teamName}</strong>
                          ${p.teamName !== p.displayName ? `<span class="text-xs text-muted" style="margin-left:0.5rem">${p.displayName}</span>` : ""}
                        </div>
                      </td>
                      <td class="text-right"><strong>${p.bestNineTotal}</strong></td>
                      <td class="text-right text-muted">${p.allEventsTotal}</td>
                      ${tourEvents.map(e => {
                        const pts = p.eventScores[e.id];
                        return `<td class="text-right">${pts != null ? pts : "—"}</td>`;
                      }).join("")}
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          `;
        }

        const mensPlayers = buildStandings(mensLb);
        const womensPlayers = buildStandings(womensLb);

        container.innerHTML = `
          <h1 class="page-title">Season Standings</h1>
          <p class="text-muted mb-3">${mensLb.length} men's / ${womensLb.length} women's players</p>
          <input type="search" id="player-search" placeholder="Search players..." style="width:100%;max-width:320px;padding:0.5rem 0.75rem;border:1px solid var(--color-beige);border-radius:6px;font-size:0.9rem;margin-bottom:1.25rem;outline:none;">
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Men's CT</span></div>
            ${standingsTable(mensPlayers, mensEvents, "table-mens")}
          </div>
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Women's CT</span></div>
            ${standingsTable(womensPlayers, womensEvents, "table-womens")}
          </div>
          <div class="mt-3">
            <a href="index.html" class="btn btn--outline">&larr; Back to Dashboard</a>
          </div>
        `;

        // Wire up sortable column headers
        container.querySelectorAll(".sortable-col").forEach((th) => {
          th.addEventListener("click", () => {
            const col = th.dataset.col;
            const table = th.closest("table");
            const tbody = table.querySelector("tbody");
            const prev = th.dataset.dir;
            const dir = prev === "asc" ? "desc" : "asc";

            table.querySelectorAll(".sortable-col").forEach((h) => {
              h.dataset.dir = "";
              h.querySelector(".sort-arrow").textContent = "▲▼";
              h.querySelector(".sort-arrow").style.opacity = "0.4";
            });
            th.dataset.dir = dir;
            th.querySelector(".sort-arrow").textContent = dir === "asc" ? "▲" : "▼";
            th.querySelector(".sort-arrow").style.opacity = "1";

            const rows = [...tbody.querySelectorAll("tr")];
            rows.sort((a, b) => {
              let av, bv;
              if (col.startsWith("evt_")) {
                const evtId = col.slice(4);
                av = parseFloat(a.dataset[`evt-${evtId}`] ?? a.getAttribute(`data-evt-${evtId}`) ?? -1);
                bv = parseFloat(b.dataset[`evt-${evtId}`] ?? b.getAttribute(`data-evt-${evtId}`) ?? -1);
              } else {
                const attrMap = { rank: "rank", bestNineTotal: "best", allEventsTotal: "total" };
                av = parseFloat(a.dataset[attrMap[col]] ?? 0);
                bv = parseFloat(b.dataset[attrMap[col]] ?? 0);
              }
              return dir === "asc" ? av - bv : bv - av;
            });
            rows.forEach(r => tbody.appendChild(r));
          });
        });

        // Search — filters both tables simultaneously
        document.getElementById("player-search").addEventListener("input", (e) => {
          const q = e.target.value.toLowerCase().trim();
          container.querySelectorAll("tbody tr").forEach(row => {
            row.style.display = !q || row.dataset.search.includes(q) ? "" : "none";
          });
        });

      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Season Standings</h1>
          <div class="card"><p class="text-muted">Unable to load data. ${err.message}</p></div>
        `;
      }
    }
  </script>
</body>
</html>
