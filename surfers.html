<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Vault — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
  <style>
    .place-badge {
      display: inline-block;
      min-width: 2.5rem;
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
    }
    /* Plain rank cells — no color bands. Cleaner, less visual noise;
       the table title makes the meaning of the numbers clear. */
    .rank-cell {
      display: inline-block;
      min-width: 1.5rem;
      font-weight: 500;
      color: var(--color-charcoal);
      text-align: center;
    }
    .place-null { color: var(--color-warm-gray); }
    .place-inj { color: #8B7E74; font-style: italic; font-size: 0.7rem; }

    /* Sticky surfer-name column at narrow widths so the heatmap can
       scroll horizontally while the surfer name stays in view. */
    @media (max-width: 700px) {
      #event-table thead th:first-child,
      #event-table tbody td:first-child {
        position: sticky;
        left: 0;
        background: var(--color-warm-white);
        box-shadow: 1px 0 0 var(--color-beige);
        z-index: 2;
      }
    }

    .surfer-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .data-table td { vertical-align: middle; }
    .text-center { text-align: center; }
    .avg-cell { font-weight: 500; color: var(--color-warm-black); }

    .section-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 0.75rem 0;
    }
    .section-toggle h2 { margin: 0; font-size: 1.2rem; }
    .section-arrow {
      font-size: 1.2rem;
      transition: transform 0.2s;
      color: var(--color-warm-gray);
    }
    .section-arrow.collapsed { transform: rotate(-90deg); }
    .section-body.collapsed { display: none; }

    /* Section header for the Results table: title on the left, location
       dropdown on the right. Wraps cleanly on narrow viewports. */
    .data-vault-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .data-vault-title {
      margin: 0;
      font-size: 1.1rem;
      font-family: var(--font-heading);
      color: var(--color-warm-black);
    }
    .data-vault-loc {
      font-size: 0.85rem;
      color: var(--color-warm-brown);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .loc-select-main {
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--color-beige);
      border-radius: var(--radius-md);
      background: var(--color-warm-white);
      font-size: 0.85rem;
      color: var(--color-charcoal);
      cursor: pointer;
      font-family: inherit;
      min-width: 10rem;
    }
    .loc-select-main:focus { border-color: var(--color-sage); outline: none; }

    .sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    .sortable:hover { color: var(--color-warm-black); }
    .sort-arrow { font-size: 0.65rem; margin-left: 0.2rem; }

    /* Sticky table headers (kept for #event-table and Popularity's
       #surfers-table; #surfer-table was removed with the surfer tab). */
    #event-table thead th,
    #surfers-table thead th {
      position: sticky;
      top: 0;
      background: var(--color-warm-white);
      z-index: 1;
      box-shadow: 0 1px 0 var(--color-beige);
    }
  </style>
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth } from "./js/auth.js";
    import { getEvents, getSurfers } from "./js/db.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading } from "./js/ui.js";

    const SEASON = 2026;
    let activeSubPage = "location";  // "location" (Results) | "popularity"
    let activeTour = "mens";          // "mens" | "womens"
    let allSurfers = [];
    let events = [];
    let eventData = {};
    let rosterNames = {};  // per-tour set of Firestore active surfer names

    // ── Data-widget state ─────────────────────────────────
    let dataTours = {};
    let dataAvailableTours = [];
    let selectedLocation = {};   // per tour
    let eventSortCol = "avg";
    let eventSortAsc = true;

    // ── Location name mapping (from data.html) ───────────
    const LOCATION_MAP = {
      "Lexus Pipe Pro":                          "Pipeline",
      "Billabong Pro Pipeline":                  "Pipeline",
      "Hurley Pro Sunset Beach":                 "Sunset Beach",
      "Surf Abu Dhabi Pro":                      "Abu Dhabi",
      "MEO Rip Curl Pro Portugal":               "Portugal",
      "MEO Portugal Pro":                        "Portugal",
      "Surf City El Salvador Pro":               "El Salvador",
      "Rip Curl Pro Bells Beach":                "Bells Beach",
      "Bonsoy Gold Coast Pro":                   "Gold Coast",
      "Western Australia Margaret River Pro":    "Margaret River",
      "Margaret River Pro":                      "Margaret River",
      "Lexus Trestles Pro":                      "Trestles",
      "VIVO Rio Pro":                            "Rio de Janeiro",
      "Oi Rio Pro":                              "Rio de Janeiro",
      "Corona Open J-Bay":                       "J-Bay",
      "Corona Cero Open J-Bay":                  "J-Bay",
      "SHISEIDO Tahiti Pro":                     "Tahiti",
      "Outerknown Tahiti Pro":                   "Tahiti",
      "Lexus Tahiti Pro":                        "Tahiti",
      "Tahiti Pro":                              "Tahiti",
      "Corona Fiji Pro":                         "Fiji",
      "Fiji Pro":                                "Fiji",
      "Corona Cero New Zealand Pro":             "New Zealand",
      "Lexus Pipe Masters":                      "Pipeline",
      "Lexus WSL Finals":                        "WSL Finals",
      "Rip Curl WSL Finals":                     "WSL Finals",
      "Lexus WSL Finals Fiji":                   "WSL Finals",
      "Surf Ranch Pro":                          "Surf Ranch",
      "Quiksilver/ROXY Pro G-Land":              "G-Land",
    };

    const LOCATION_PATTERNS = [
      { re: /\bpipe/i, loc: "Pipeline" },
      { re: /\bsunset\b/i, loc: "Sunset Beach" },
      { re: /\babu\s+dhabi\b/i, loc: "Abu Dhabi" },
      { re: /\bportugal\b/i, loc: "Portugal" },
      { re: /\bel\s+salvador\b/i, loc: "El Salvador" },
      { re: /\bbells\b/i, loc: "Bells Beach" },
      { re: /\bgold\s+coast\b/i, loc: "Gold Coast" },
      { re: /\bmargaret\s+river\b/i, loc: "Margaret River" },
      { re: /\btrestles\b/i, loc: "Trestles" },
      { re: /\brio\b/i, loc: "Rio de Janeiro" },
      { re: /\bj-?bay\b/i, loc: "J-Bay" },
      { re: /\btahiti\b/i, loc: "Tahiti" },
      { re: /\bfiji\b/i, loc: "Fiji" },
      { re: /\bfinals\b/i, loc: "WSL Finals" },
      { re: /\bsurf\s+ranch\b/i, loc: "Surf Ranch" },
      { re: /\bg-?land\b/i, loc: "G-Land" },
      { re: /\bnew\s*zealand\b/i, loc: "New Zealand" },
    ];

    function locationForEvent(eventName) {
      if (!eventName) return eventName;
      const exact = LOCATION_MAP[eventName];
      if (exact) return exact;
      for (const { re, loc } of LOCATION_PATTERNS) {
        if (re.test(eventName)) return loc;
      }
      return eventName;
    }

    const LOCATION_ORDER = [
      "Pipeline", "Sunset Beach", "Abu Dhabi", "Portugal",
      "El Salvador", "Bells Beach", "Gold Coast", "Margaret River",
      "G-Land", "Surf Ranch", "Trestles", "Rio de Janeiro",
      "J-Bay", "Tahiti", "Fiji", "New Zealand", "WSL Finals",
    ];

    const CURRENT_SEASON_LOCATIONS = [
      "Bells Beach", "Margaret River", "Gold Coast", "New Zealand",
      "El Salvador", "Rio de Janeiro", "Tahiti", "Fiji",
      "Trestles", "Abu Dhabi", "Portugal", "Pipeline",
    ];

    function buildIndices(datasets) {
      const surferIdx = {};
      const locationIdx = {};
      const years = [...new Set(datasets.map(d => d.year))].sort();
      for (const ds of datasets) {
        const { year, events: evts, surfers } = ds;
        for (const surfer of surfers) {
          if (!surferIdx[surfer.name]) surferIdx[surfer.name] = {};
          for (let i = 0; i < evts.length; i++) {
            const loc = locationForEvent(evts[i]);
            const place = surfer.places[i] ?? null;
            if (!surferIdx[surfer.name][loc]) surferIdx[surfer.name][loc] = {};
            surferIdx[surfer.name][loc][year] = place;
            if (!locationIdx[loc]) locationIdx[loc] = {};
            if (!locationIdx[loc][surfer.name]) locationIdx[loc][surfer.name] = {};
            locationIdx[loc][surfer.name][year] = place;
          }
        }
      }
      const latestYear = Math.max(...years);
      const latestDataset = datasets.find(d => d.year === latestYear);
      const activeNames = new Set(latestDataset ? latestDataset.surfers.map(s => s.name) : []);
      const names = Object.keys(surferIdx)
        .filter(n => activeNames.has(n))
        .sort((a, b) => a.split(" ").pop().localeCompare(b.split(" ").pop()));
      const locations = CURRENT_SEASON_LOCATIONS.filter(l => locationIdx[l]);
      const allLocationsFull = [
        ...LOCATION_ORDER.filter(l => locationIdx[l]),
        ...Object.keys(locationIdx).filter(l => !LOCATION_ORDER.includes(l)).sort(),
      ].filter(l => !CURRENT_SEASON_LOCATIONS.includes(l) && l !== "WSL Finals");
      return { surferIndex: surferIdx, locationIndex: locationIdx, allYears: years, sortedNames: names, allLocations: locations, allLocationsFull, activeNames };
    }

    // ── Data helpers ──────────────────────────────────────
    function placeBadge(n) {
      if (n === null) return `<span class="place-null">—</span>`;
      if (n === "INJ") return `<span class="place-inj">INJ</span>`;
      return `<span class="rank-cell">${n}</span>`;
    }

    function calcStats(yearData) {
      const vals = Object.values(yearData).filter(v => v !== null && v !== "INJ");
      if (vals.length === 0) return { avg: null };
      return {
        avg: +(vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1),
      };
    }

    function sortArrow(col) {
      if (col !== eventSortCol) return "";
      return `<span class="sort-arrow">${eventSortAsc ? "▲" : "▼"}</span>`;
    }

    // ── Load WSL JSON data ────────────────────────────────
    async function loadWslData() {
      if (location.protocol === "file:") return;
      const tryFetch = (url) => fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
      const [mensData, womensData] = await Promise.all([
        Promise.all([
          tryFetch("./data/wsl_results/wsl_2022_mens.json"),
          tryFetch("./data/wsl_results/wsl_2023_mens.json"),
          tryFetch("./data/wsl_results/wsl_2024_mens.json"),
          tryFetch("./data/wsl_results/wsl_2025_mens.json"),
        ]).then(arr => arr.filter(Boolean)),
        Promise.all([
          tryFetch("./data/wsl_results/wsl_2022_womens.json"),
          tryFetch("./data/wsl_results/wsl_2023_womens.json"),
          tryFetch("./data/wsl_results/wsl_2024_womens.json"),
          tryFetch("./data/wsl_results/wsl_2025_womens.json"),
        ]).then(arr => arr.filter(Boolean)),
      ]);
      if (mensData.length > 0) dataTours.mens = buildIndices(mensData);
      if (womensData.length > 0) dataTours.womens = buildIndices(womensData);
      dataAvailableTours = Object.keys(dataTours);
      // Initialize per-tour defaults
      for (const key of dataAvailableTours) {
        const t = dataTours[key];
        if (!selectedLocation[key]) selectedLocation[key] = t.allLocations[0];
      }
    }

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) {
        showAuthGate(main);
        return;
      }
      showLoading(main);
      await loadData(main);
    });

    async function loadData(container) {
      try {
        const [eventsResult, surfersResult] = await Promise.all([
          getEvents(SEASON),
          getSurfers(),
          loadWslData(),
        ]);
        events = eventsResult;
        allSurfers = surfersResult;

        // Build roster-active name sets per tour from Firestore surfers
        rosterNames = {};
        for (const s of allSurfers) {
          const t = s.tour || "mens";
          if (!rosterNames[t]) rosterNames[t] = new Set();
          rosterNames[t].add(s.name);
        }

        for (const event of events) {
          eventData[event.id] = {
            event,
            popularityPct: event.popularityPct || {},
            totalTeams: event.totalTeams || 0
          };
        }

        render(container);
      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Data Vault</h1>
          <div class="card"><p class="text-muted">Unable to load data. ${err.message}</p></div>
        `;
      }
    }

    function render(container) {
      const tour = activeTour;
      const dt = dataTours[tour];

      // ── Sub-page tabs ─────────────────────────────────
      // Dropped the "Results by Surfer" sub-page entirely (the WSL site
      // has a similar per-surfer page already). The remaining Results
      // tab is the heatmap-style Results-by-Location view.
      const subPages = [
        { id: "location",   label: "Results" },
        { id: "popularity", label: "Popularity" },
      ];
      const subPageTabs = `
        <div class="tab-bar" style="display:flex;gap:0.5rem;margin-bottom:1rem;border-bottom:1px solid var(--color-beige);padding-bottom:0">
          ${subPages.map(p => `
            <button data-subpage="${p.id}" style="
              padding:0.5rem 1rem;
              border:none;background:none;cursor:pointer;
              font-size:0.9rem;font-weight:${activeSubPage === p.id ? "600" : "400"};
              color:${activeSubPage === p.id ? "var(--color-charcoal)" : "var(--color-sage)"};
              border-bottom:2px solid ${activeSubPage === p.id ? "var(--color-charcoal)" : "transparent"};
              margin-bottom:-1px;
            ">${p.label}</button>
          `).join("")}
        </div>`;

      // ── Tour toggle (Men's / Women's) ─────────────────
      const tourToggle = `
        <div class="tour-tabs mb-3">
          <button class="tour-tab ${tour === "mens" ? "tour-tab--active" : ""}" data-tour="mens">Men's CT</button>
          <button class="tour-tab ${tour === "womens" ? "tour-tab--active" : ""}" data-tour="womens">Women's CT</button>
        </div>`;

      // ── Build active sub-page content ─────────────────
      let pageContent = "";

      if (activeSubPage === "location" && dt) {
        const loc = selectedLocation[tour] || dt.allLocations[0];
        const { locationIndex, allYears, allLocations } = dt;

        // Fixed 4-year window: the most recent 4 years of available data,
        // displayed in descending order (newest leftmost). Surfers who
        // didn't compete a given year render as em-dashes via placeBadge.
        const displayYears = [...allYears].sort((a, b) => a - b).slice(-4).reverse();

        const locData = locationIndex[loc] || {};
        const rosterSet = rosterNames[tour] || new Set();
        const locSurfers = Object.entries(locData)
          .filter(([name]) => rosterSet.has(name))
          .map(([name, yearData]) => {
            const stats = calcStats(yearData);
            return { name, yearData, ...stats };
          });

        locSurfers.sort((a, b) => {
          let aVal, bVal;
          if (eventSortCol === "name") {
            return eventSortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
          } else if (eventSortCol === "avg") {
            aVal = a.avg; bVal = b.avg;
          } else {
            const yr = parseInt(eventSortCol);
            aVal = a.yearData[yr] ?? null; bVal = b.yearData[yr] ?? null;
          }
          if ((aVal === null || aVal === "INJ") && (bVal === null || bVal === "INJ")) return 0;
          if (aVal === null || aVal === "INJ") return 1;
          if (bVal === null || bVal === "INJ") return -1;
          return eventSortAsc ? aVal - bVal : bVal - aVal;
        });

        // Single dropdown listing every location with data (current-season
        // venues followed by historical ones). Replaces the prior tile row
        // + "More…" dropdown for a calmer header.
        const dropdownLocs = [...allLocations, ...dt.allLocationsFull];
        const locDropdown = `
          <select class="loc-select-main" id="loc-select">
            ${dropdownLocs.map(l => `<option value="${l}" ${l === loc ? "selected" : ""}>${l}</option>`).join("")}
          </select>`;

        const eventRows = locSurfers.map(s => {
          const yearCells = displayYears.map(y =>
            `<td class="text-center">${placeBadge(s.yearData[y] ?? null)}</td>`
          ).join("");
          return `<tr>
            <td>${s.name}</td>
            <td class="text-center avg-cell">${s.avg !== null ? s.avg : "—"}</td>
            ${yearCells}
          </tr>`;
        }).join("");

        // No scroll container — show the full table. Sticky surfer-name
        // column kicks in on narrow viewports for clean horizontal scroll.
        pageContent = `
          <div class="card">
            <div class="data-vault-header">
              <h2 class="data-vault-title">Surfer Rank History</h2>
              <label class="data-vault-loc">Location: ${locDropdown}</label>
            </div>
            ${eventRows.length > 0 ? `
            <div style="overflow-x:auto">
            <table class="data-table" id="event-table" style="margin:0">
              <thead>
                <tr>
                  <th class="sortable" data-sort="name">Surfer ${sortArrow("name")}</th>
                  <th class="sortable text-center" data-sort="avg">Avg ${sortArrow("avg")}</th>
                  ${displayYears.map(y => `<th class="sortable text-center" data-sort="${y}">${y} ${sortArrow(String(y))}</th>`).join("")}
                </tr>
              </thead>
              <tbody>${eventRows}</tbody>
            </table>
            </div>
            ` : `<p class="text-muted">No data for this location.</p>`}
          </div>`;

      } else if (activeSubPage === "popularity") {
        const popularitySurfers = allSurfers
          .filter(s => (s.tour || "mens") === tour)
          .sort((a, b) => (a.rank || 999) - (b.rank || 999));

        const tourEvents = events
          .filter(e => (e.tour || "mens") === tour)
          .sort((a, b) => a.eventNumber - b.eventNumber);

        pageContent = `
          <div class="card">
            <p class="text-muted">Percentage of teams that included each surfer, shown only after trading closes for each event.</p>
            <div style="overflow-x:auto;max-height:540px;overflow-y:auto;border:1px solid var(--color-beige);border-radius:var(--radius-md)">
              <table class="data-table" id="surfers-table" style="margin:0">
                <thead><tr>
                  <th class="sortable-col" data-col="0" data-dir="asc" style="cursor:pointer;user-select:none;white-space:nowrap">
                    Surfer <span class="sort-arrow" style="font-size:0.6rem;opacity:1">▲</span>
                  </th>
                  <th class="sortable-col text-right" data-col="rank" data-dir="" style="cursor:pointer;user-select:none;white-space:nowrap">
                    Rank <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span>
                  </th>
                  <th class="sortable-col text-right" data-col="value" data-dir="" style="cursor:pointer;user-select:none;white-space:nowrap">
                    Value <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span>
                  </th>
                  ${tourEvents.map((e, i) => `
                    <th class="sortable-col text-right" data-col="${i + 3}" data-dir="" style="cursor:pointer;user-select:none;white-space:nowrap;font-size:0.8rem">
                      Ev ${e.eventNumber} <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span>
                    </th>
                  `).join("")}
                </tr></thead>
                <tbody>
                  ${popularitySurfers.map(surfer => {
                    const eventCells = tourEvents.map(event => {
                      const data = eventData[event.id];
                      if (data && data.totalTeams > 0) {
                        const pct = data.popularityPct[surfer.id];
                        return pct != null ? pct.toFixed(1) : "0.0";
                      }
                      return null;
                    });
                    return `<tr
                      data-name="${surfer.name.toLowerCase()}"
                      data-rank="${surfer.rank || 999}"
                      data-value="${surfer.value || 0}"
                      ${eventCells.map((v, i) => `data-ev${i}="${v ?? -1}"`).join(" ")}>
                      <td>${surfer.name}</td>
                      <td class="text-right">${surfer.rank || "—"}</td>
                      <td class="text-right">$${surfer.value ? (surfer.value/1_000_000).toFixed(2) + "M" : "—"}</td>
                      ${eventCells.map(v => `<td class="text-right">${v != null ? v + "%" : "—"}</td>`).join("")}
                    </tr>`;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </div>`;
      }

      if (!pageContent && !dt) {
        pageContent = `<div class="card"><p class="text-muted">No data available for this tour.</p></div>`;
      }

      container.innerHTML = `
        <h1 class="page-title">Data Vault</h1>
        ${subPageTabs}
        ${tourToggle}
        ${pageContent}
      `;

      // ── Event listeners ─────────────────────────────────
      // Sub-page tabs
      container.querySelectorAll("[data-subpage]").forEach(btn => {
        btn.addEventListener("click", () => {
          activeSubPage = btn.dataset.subpage;
          eventSortCol = "avg";
          eventSortAsc = true;
          render(container);
        });
      });

      // Tour toggle
      container.querySelectorAll("[data-tour]").forEach(btn => {
        btn.addEventListener("click", () => {
          activeTour = btn.dataset.tour;
          eventSortCol = "avg";
          eventSortAsc = true;
          render(container);
        });
      });

      // Sortable columns (popularity table)
      container.querySelectorAll(".sortable-col").forEach(th => {
        th.addEventListener("click", () => {
          const col = th.dataset.col;
          const table = th.closest("table");
          const tbody = table.querySelector("tbody");
          const prev = th.dataset.dir;
          const dir = prev === "asc" ? "desc" : "asc";

          table.querySelectorAll(".sortable-col").forEach(h => {
            h.dataset.dir = "";
            h.querySelector(".sort-arrow").textContent = "▲▼";
            h.querySelector(".sort-arrow").style.opacity = "0.4";
          });
          th.dataset.dir = dir;
          th.querySelector(".sort-arrow").textContent = dir === "asc" ? "▲" : "▼";
          th.querySelector(".sort-arrow").style.opacity = "1";

          const rows = [...tbody.querySelectorAll("tr")];
          rows.sort((a, b) => {
            let av, bv;
            if (col === "0") {
              av = a.dataset.name;
              bv = b.dataset.name;
              return dir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
            } else if (col === "rank") {
              av = parseFloat(a.dataset.rank);
              bv = parseFloat(b.dataset.rank);
            } else if (col === "value") {
              av = parseFloat(a.dataset.value);
              bv = parseFloat(b.dataset.value);
            } else {
              const idx = parseInt(col) - 3;
              av = parseFloat(a.dataset[`ev${idx}`] ?? -1);
              bv = parseFloat(b.dataset[`ev${idx}`] ?? -1);
            }
            return dir === "asc" ? av - bv : bv - av;
          });
          rows.forEach(r => tbody.appendChild(r));
        });
      });

      // ── Data widget listeners ───────────────────────────
      if (dt && activeSubPage === "location") {
        document.getElementById("loc-select")?.addEventListener("change", (e) => {
          selectedLocation[tour] = e.target.value;
          eventSortCol = "avg"; eventSortAsc = true;
          render(container);
        });

        container.querySelectorAll(".sortable").forEach(th => {
          th.addEventListener("click", () => {
            const col = th.dataset.sort;
            if (eventSortCol === col) { eventSortAsc = !eventSortAsc; }
            else { eventSortCol = col; eventSortAsc = true; }
            render(container);
          });
        });
      }

    }
  </script>

</body>
</html>
