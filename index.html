<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Surfer — Dashboard</title>
  <meta name="description" content="Free fantasy surf league built around the WSL Championship Tour. Draft your team, manage your cap, and compete all season.">
  <meta property="og:title" content="Fantasy Surfer">
  <meta property="og:description" content="Free fantasy surf league built around the WSL Championship Tour.">
  <meta property="og:image" content="https://fantasysurfer.org/img/Fsurf_logo_with_text.png">
  <meta property="og:url" content="https://fantasysurfer.org">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth, getCurrentUser, getUserProfile } from "./js/auth.js";
    import { getCurrentEventForTour, getLeaderboard, getTeam, getEvents, getResults, getTeamsForEvent, getSurfers, getUser, getClub, getUserClubIds } from "./js/db.js";
    import { scoreTeam } from "./js/scoring.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading, formatSalary, formatDate, statusBadge, tradingBadge, renderTable } from "./js/ui.js";

    const SEASON = 2026;
    let activeTab = "homepage";

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) {
        showAuthGate(main);
        return;
      }
      showLoading(main);
      await renderDashboard(main, user, profile);
    });

    async function renderDashboard(container, user, profile) {
      let mensEvent, womensEvent, mensLeaderboard, womensLeaderboard, events;
      try {
        [mensEvent, womensEvent, mensLeaderboard, womensLeaderboard, events] = await Promise.all([
          getCurrentEventForTour("mens", SEASON),
          getCurrentEventForTour("womens", SEASON),
          getLeaderboard(SEASON, "mens"),
          getLeaderboard(SEASON, "womens"),
          getEvents(SEASON)
        ]);
      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Fantasy Surf League</h1>
          <div class="card">
            <p class="text-muted">Unable to load data. Make sure Firebase is configured in <code>js/firebase-config.js</code>.</p>
            <p class="text-muted text-sm mt-1">${err.message}</p>
          </div>
        `;
        return;
      }

      // Get user's teams for both tours
      let mensTeam = null, womensTeam = null;
      const [mt, wt] = await Promise.all([
        mensEvent ? getTeam(user.uid, mensEvent.id) : null,
        womensEvent ? getTeam(user.uid, womensEvent.id) : null,
      ]);
      mensTeam = mt; womensTeam = wt;

      // Always load surfer data for name lookups
      const surferMap = {};
      const surfers = await getSurfers();
      surfers.forEach((s) => { surferMap[s.id] = s; });

      // Load all teams (per tour) when trading is closed
      const userDocCache = {};
      const enrichTeams = async (eventObj) => {
        if (!eventObj || eventObj.tradingOpen) return [];
        const raw = await getTeamsForEvent(eventObj.id);
        const enriched = [];
        for (const team of raw) {
          if (!userDocCache[team.userId]) userDocCache[team.userId] = await getUser(team.userId);
          const u = userDocCache[team.userId];
          enriched.push({ ...team, displayName: u?.displayName || "Unknown", teamName: u?.teamName || u?.displayName || "—", avatarUrl: u?.avatarUrl || "" });
        }
        return enriched;
      };
      await Promise.all([enrichTeams(mensEvent), enrichTeams(womensEvent)]);

      // Sort both leaderboards
      mensLeaderboard.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));
      womensLeaderboard.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));

      // Find user's rank in each tour
      const mensRank = mensLeaderboard.findIndex((e) => e.userId === user.uid) + 1;
      const womensRank = womensLeaderboard.findIndex((e) => e.userId === user.uid) + 1;
      const mensEntry = mensLeaderboard.find((e) => e.userId === user.uid);
      const womensEntry = womensLeaderboard.find((e) => e.userId === user.uid);

      // Load club data
      const userDoc = await getUser(user.uid);
      const clubIds = getUserClubIds(userDoc);
      let allClubs = [];
      let selectedClubIdx = 0;
      let club = null;
      let clubMembers = [];
      if (clubIds.length > 0) {
        allClubs = (await Promise.all(clubIds.map(id => getClub(id)))).filter(Boolean);
      }
      const selectClub = (idx) => {
        selectedClubIdx = idx;
        club = allClubs[idx] || null;
        clubMembers = [];
        if (club) {
          clubMembers = mensLeaderboard.filter((e) => club.memberIds.includes(e.userId));
        }
      };
      // Default to user's preferred club
      const defaultIdx = allClubs.findIndex(c => c.id === userDoc?.defaultClubId);
      selectClub(defaultIdx >= 0 ? defaultIdx : 0);

      // Profile info
      const avatarUrl = profile?.avatarUrl || profile?.photoUrl || user.photoURL || "";
      const adsCoins = profile?.adsCoins ?? 10;
      const clubLabel = allClubs.length > 0
        ? allClubs.map(c => `<a href="club.html?id=${c.id}" style="color:inherit;text-decoration:underline;text-underline-offset:2px">${c.name}</a>`).join("<br>")
        : "No clubs yet";

      // ── Rosters tab data (lazy-loaded once) ──
      let rostersLoaded = false;
      let mensRosters = [], womensRosters = [];

      async function loadRosters() {
        if (rostersLoaded) return;
        const mensEvents = events.filter((e) => (e.tour || "mens") === "mens");
        const womensEvents = events.filter((e) => e.tour === "womens");

        const loadEventRosters = async (tourEvents) => {
          const rosters = [];
          for (const event of tourEvents) {
            if (event.tradingOpen !== false) { rosters.push({ event, team: null, score: null }); continue; }
            const team = await getTeam(user.uid, event.id);
            if (!team) { rosters.push({ event, team: null, score: null }); continue; }
            let score = null;
            if (event.status === "completed") {
              const results = await getResults(event.id);
              score = scoreTeam(team, results, event.tour || "mens");
            }
            rosters.push({ event, team, score });
          }
          return rosters;
        };

        [mensRosters, womensRosters] = await Promise.all([
          loadEventRosters(mensEvents),
          loadEventRosters(womensEvents)
        ]);
        rostersLoaded = true;
      }

      // ── Render helpers from profile page ──
      const shortName = (fullName) => {
        const parts = fullName.trim().split(" ");
        return parts.length > 1 ? `${parts[0][0]}. ${parts[parts.length - 1]}` : parts[0];
      };

      const renderStrip = (team, score, large = false, tour = "mens") => {
        if (!team) return `<p class="text-muted text-sm">No team submitted.</p>`;
        const isMid = large === "mid";
        const photoSize = isMid ? "50px" : large ? "80px" : "44px";
        const surferWidth = isMid ? "50px" : large ? "80px" : "48px";

        if (large || isMid) {
          const rosterSize = tour === "womens" ? 5 : 8;
          const slots = [];
          for (let i = 0; i < rosterSize; i++) {
            if (i < team.surfers.length) slots.push({ type: "surfer", s: team.surfers[i], i });
            else slots.push({ type: "grey" });
          }
          slots.push(team.alternate ? { type: "alt", s: team.alternate } : { type: "grey" });
          while (slots.length < 10) slots.push({ type: "invisible" });

          const slotHtml = slots.map((slot) => {
            if (slot.type === "invisible") {
              return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}"><div style="width:${photoSize};height:${photoSize}"></div><span style="font-size:0.62rem;color:transparent">—</span></div>`;
            }
            if (slot.type === "grey") {
              const isAltSlot = slots.indexOf(slot) === rosterSize;
              return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}"><div style="position:relative;width:${photoSize};height:${photoSize}"><div style="width:100%;height:100%;border-radius:50%;background:var(--color-beige);opacity:0.35"></div>${isAltSlot ? `<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;font-weight:700;color:var(--color-warm-gray);background:rgba(255,255,255,0.85);border-radius:4px;padding:0 3px;line-height:1.4;white-space:nowrap">ALT</span>` : ""}</div><span style="font-size:0.62rem;color:transparent">—</span></div>`;
            }
            if (slot.type === "alt") {
              const d = surferMap[slot.s.surferId] || {};
              const altName = d.name || slot.s.surferId.replace(/-/g, " ");
              const p = d.photoUrl
                ? `<img src="${d.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px dashed var(--color-warm-gray);opacity:0.8" alt="">`
                : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown);opacity:0.8">${altName[0]}</div>`;
              return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}"><div style="position:relative;width:${photoSize};height:${photoSize}">${p}<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:0.5rem;font-weight:700;color:var(--color-warm-gray);background:rgba(255,255,255,0.85);border-radius:4px;padding:0 3px;line-height:1.4;white-space:nowrap">ALT${score?.alternateUsed ? "✓" : ""}</span></div><span style="font-size:0.62rem;text-align:center;max-width:${surferWidth};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-warm-brown)">${shortName(altName)}</span></div>`;
            }
            const data = surferMap[slot.s.surferId] || {};
            const sc = score?.surferScores?.[slot.i];
            const name = data.name || slot.s.surferId.replace(/-/g, " ");
            const photo = data.photoUrl
              ? `<img src="${data.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px solid var(--color-beige)" alt="">`
              : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown)">${name[0]}</div>`;
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">${photo}<span style="font-size:0.62rem;text-align:center;max-width:${surferWidth};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-dark)">${shortName(name)}</span>${sc ? `<span style="font-size:0.62rem;color:var(--color-sage);font-weight:600">${sc.points}pt</span>` : ""}</div>`;
          }).join("");
          return `<div style="display:grid;grid-template-columns:repeat(5,${surferWidth});gap:${isMid ? "0.3rem" : "0.5rem"};margin-top:0.5rem">${slotHtml}</div>`;
        }

        // Small strip
        const surferHtml = team.surfers.map((s, i) => {
          const data = surferMap[s.surferId] || {};
          const sc = score?.surferScores?.[i];
          const name = data.name || s.surferId.replace(/-/g, " ");
          const photo = data.photoUrl
            ? `<img src="${data.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px solid var(--color-beige)" alt="">`
            : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown)">${name[0]}</div>`;
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">${photo}<span style="font-size:0.62rem;text-align:center;max-width:${surferWidth};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-dark)">${shortName(name)}</span>${sc ? `<span style="font-size:0.62rem;color:var(--color-sage);font-weight:600">${sc.points}pt</span>` : ""}</div>`;
        }).join("");
        const altHtml = team.alternate ? (() => {
          const d = surferMap[team.alternate.surferId] || {};
          const altName = d.name || team.alternate.surferId.replace(/-/g, " ");
          const p = d.photoUrl
            ? `<img src="${d.photoUrl}" style="width:${photoSize};height:${photoSize};border-radius:50%;object-fit:cover;object-position:top center;border:2px dashed var(--color-warm-gray);opacity:0.75" alt="">`
            : `<div style="width:${photoSize};height:${photoSize};border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--color-warm-brown);opacity:0.75">${altName[0]}</div>`;
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;width:${surferWidth}">${p}<span style="font-size:0.62rem;color:var(--color-warm-brown)">ALT</span></div>`;
        })() : "";
        return `<div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.4rem">${surferHtml}${altHtml}</div>`;
      };

      const renderEventCard = (event, team, score) => `
        <div class="card mb-3">
          <div class="card__header">
            <span class="card__title" style="font-size:0.9rem">${event.name}</span>
            <span class="text-sm" style="font-weight:600">
              ${score ? `${score.totalPoints} pts` : event.status === "live" ? "Live" : statusBadge(event.status)}
            </span>
          </div>
          ${renderStrip(team, score, false)}
        </div>`;

      const renderStandings = (label, standings) => `
        <div class="card mb-3">
          <div class="card__header">
            <span class="card__title">Season ${SEASON} — ${label}</span>
          </div>
          <div class="grid grid--2 text-center mt-2">
            <div>
              <p class="text-xs text-muted">Best 9 Total</p>
              <p style="font-size:1.4rem;font-weight:600">${standings.eventsPlayed > 0 ? standings.best9 : "—"}</p>
            </div>
            <div>
              <p class="text-xs text-muted">Events Played</p>
              <p style="font-size:1.4rem;font-weight:600">${standings.eventsPlayed > 0 ? standings.eventsPlayed : "—"}</p>
            </div>
          </div>
        </div>`;

      // ── Main render function ──
      function render() {
        const tabs = `
          <div class="tour-tabs mb-3">
            <button class="tour-tab dash-tab ${activeTab === "homepage" ? "tour-tab--active" : ""}" data-tab="homepage">Events</button>
            <button class="tour-tab dash-tab ${activeTab === "standings" ? "tour-tab--active" : ""}" data-tab="standings">Standings</button>
            <button class="tour-tab dash-tab ${activeTab === "rosters" ? "tour-tab--active" : ""}" data-tab="rosters">Rosters</button>
          </div>`;

        // ── Profile widget (top-right) ──
        const avatarSm = avatarUrl
          ? `<img src="${avatarUrl}" alt="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0" referrerpolicy="no-referrer">`
          : `<div style="width:80px;height:80px;border-radius:50%;background:var(--color-beige);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:1.5rem;color:var(--color-warm-brown);flex-shrink:0">${(profile?.displayName || user.displayName || "?")[0]}</div>`;
        const avatarPreview = avatarUrl
          ? `<img src="${avatarUrl}" alt="" class="avatar-preview" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
          : `<div class="avatar-preview avatar-preview--empty">${(profile?.displayName || user.displayName || "?")[0]}</div>`;

        const profileWidget = `
          <div style="display:flex;align-items:center;gap:0.75rem">
            ${avatarSm}
            <div style="text-align:right">
              <div style="font-weight:600;font-size:0.95rem">${profile?.teamName || user.displayName || "—"}</div>
              <div class="text-xs text-muted">${clubLabel}</div>
            </div>
            <button class="btn btn--outline btn--sm" id="btn-edit-profile" style="white-space:nowrap;font-size:0.72rem;padding:0.2rem 0.5rem">Edit</button>
          </div>`;

        const editFormModal = `
          <div id="profile-edit-form" style="display:none;margin-bottom:1rem">
            <div class="card">
              <div class="profile-edit">
                <div class="profile-edit__avatar">${avatarPreview}</div>
                <div class="profile-edit__fields">
                  <div class="form-group mb-1">
                    <label class="form-label">Team Name</label>
                    <input type="text" class="search-input" id="team-name-input" placeholder="e.g. michael ciaramella" maxlength="30" value="${profile?.teamName || ""}">
                  </div>
                  <div class="form-group mb-1">
                    <label class="form-label">Profile Photo</label>
                    <div id="avatar-drop-zone" style="border:2px dashed var(--color-beige);border-radius:8px;padding:0.6rem 0.8rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;cursor:pointer;transition:border-color 0.15s,background 0.15s">
                      <label class="btn btn--outline btn--sm" style="cursor:pointer;margin:0">
                        Choose File
                        <input type="file" id="avatar-file-input" accept="image/*" style="display:none">
                      </label>
                      <span class="text-xs text-muted" id="avatar-file-name">or drag &amp; drop here</span>
                    </div>
                    <p class="text-xs text-muted mt-1">or paste a URL: <input type="text" class="search-input" id="avatar-url-input" placeholder="https://i.imgur.com/..." value="${(profile?.avatarUrl && !profile.avatarUrl.startsWith("https://firebasestorage")) ? profile.avatarUrl : ""}" style="display:inline;width:auto;max-width:200px;padding:0.2rem 0.4rem;font-size:0.8rem"></p>
                  </div>
                  <div style="display:flex;gap:0.5rem">
                    <button class="btn btn--primary btn--sm" id="btn-save-profile">Save Profile</button>
                    <button class="btn btn--outline btn--sm" id="btn-cancel-profile">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          </div>`;

        let content = "";

        // Standings HTML (shared by standings tab)
        const standingsHtml = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:stretch">
            <div class="card">
              <div class="card__header">
                <span class="card__title">League Standings</span>
                <a href="players.html" class="btn btn--outline btn--sm">Full Standings →</a>
              </div>
              <table class="data-table">
                <thead><tr><th>Tour</th><th class="text-right">Rank</th><th class="text-right">Best 9</th><th class="text-right">Total</th></tr></thead>
                <tbody>
                  <tr><td>Men's CT</td><td class="text-right"><strong>${mensRank > 0 ? `#${mensRank} of ${mensLeaderboard.length}` : "—"}</strong></td><td class="text-right">${mensEntry?.bestNineTotal ?? "—"}</td><td class="text-right text-muted">${mensEntry?.allEventsTotal ?? "—"}</td></tr>
                  <tr><td>Women's CT</td><td class="text-right"><strong>${womensRank > 0 ? `#${womensRank} of ${womensLeaderboard.length}` : "—"}</strong></td><td class="text-right">${womensEntry?.bestNineTotal ?? "—"}</td><td class="text-right text-muted">${womensEntry?.allEventsTotal ?? "—"}</td></tr>
                </tbody>
              </table>
            </div>
            <div class="card">
              <div class="card__header">
                ${allClubs.length > 1 ? `
                  <select id="club-select" style="font-family:inherit;font-size:0.95rem;font-weight:600;border:none;background:none;color:var(--color-charcoal);cursor:pointer;padding:0;margin:0">
                    ${allClubs.map((c, i) => `<option value="${i}" ${i === selectedClubIdx ? "selected" : ""}>${c.name}</option>`).join("")}
                  </select>
                ` : `<span class="card__title">${club ? club.name : "Club Standings"}</span>`}
                <div style="display:flex;gap:0.4rem;align-items:center">
                  ${allClubs.length > 1 && club ? `<button id="btn-default-club" class="btn btn--outline btn--sm" style="font-size:0.7rem;padding:0.15rem 0.4rem;${club.id === userDoc?.defaultClubId ? "opacity:0.4;cursor:default" : ""}">${club.id === userDoc?.defaultClubId ? "Default" : "Set Default"}</button>` : ""}
                  ${club ? `<a href="club.html?id=${club.id}" class="btn btn--outline btn--sm" id="club-view-link">View Club →</a>` : `<a href="club.html" class="btn btn--outline btn--sm">Join a Club →</a>`}
                </div>
              </div>
              <table class="data-table">
                <thead><tr><th>#</th><th>Team</th><th class="text-right">Best 9</th></tr></thead>
                <tbody>
                  ${clubMembers.length > 0 ? (() => {
                    const userIdx = clubMembers.findIndex(e => e.userId === user.uid);
                    const userInTop3 = userIdx >= 0 && userIdx < 3;
                    const showRows = clubMembers.slice(0, userInTop3 ? 4 : 3);
                    const renderRow = (entry, i) => `
                      <tr class="${entry.userId === user.uid ? "highlight" : ""}">
                        <td>${i + 1}</td>
                        <td class="flex gap-1" style="align-items:center">
                          ${entry.avatarUrl ? `<img src="${entry.avatarUrl}" class="avatar-sm" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : `<div class="avatar-sm avatar-sm--empty">${(entry.displayName || "?")[0]}</div>`}
                          ${entry.teamName || entry.displayName || "—"}
                        </td>
                        <td class="text-right">${entry.bestNineTotal || 0}</td>
                      </tr>`;
                    let html = showRows.map((e, i) => renderRow(e, i)).join("");
                    if (!userInTop3 && userIdx >= 3) {
                      html += `<tr><td colspan="3" class="text-center text-muted" style="padding:0.1rem">···</td></tr>`;
                      html += renderRow(clubMembers[userIdx], userIdx);
                    }
                    return html;
                  })() : `
                    <tr><td>1</td><td class="text-muted">—</td><td class="text-right text-muted">—</td></tr>
                    <tr><td>2</td><td class="text-muted">—</td><td class="text-right text-muted">—</td></tr>
                    <tr><td>3</td><td class="text-muted">—</td><td class="text-right text-muted">—</td></tr>
                    <tr><td colspan="3" class="text-center text-muted" style="padding:0.1rem">···</td></tr>
                    <tr><td>—</td><td class="text-muted">You</td><td class="text-right text-muted">—</td></tr>
                  `}
                </tbody>
              </table>
            </div>
          </div>`;

        if (activeTab === "homepage") {
          content = `
            <!-- Current Events + Schedule side by side -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">
              <div class="card">
                <div class="card__header"><span class="card__title">Current Events</span></div>
                ${mensEvent || womensEvent ? `
                  ${[mensEvent && { ev: mensEvent, team: mensTeam, label: "Men's CT", tour: "mens" }, womensEvent && { ev: womensEvent, team: womensTeam, label: "Women's CT", tour: "womens" }]
                    .filter(Boolean)
                    .map(({ ev, team, label, tour }, idx) => `
                      ${idx > 0 ? `<div style="border-top:1px solid var(--color-beige);margin-top:0.75rem;padding-top:0.75rem"></div>` : ""}
                      <div style="display:flex;gap:1rem;align-items:flex-start">
                        <div style="flex:1;min-width:0">
                          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
                            <span class="text-sm" style="font-weight:600">${label}</span>
                            ${tradingBadge(ev.tradingOpen)}
                          </div>
                          <h3 style="margin-bottom:0.25rem">${ev.name}</h3>
                          <p class="text-muted text-sm">${ev.location || ""}</p>
                          <p class="text-sm mt-1">${formatDate(ev.startDate)} — ${formatDate(ev.endDate)}</p>
                          <div class="mt-1">
                            <a href="team.html${tour === "womens" ? "?tour=womens" : ""}" class="btn btn--primary btn--sm">Manage Team</a>
                          </div>
                        </div>
                        <div style="flex-shrink:0">
                          ${team ? renderStrip(team, null, "mid", tour) : `<p class="text-muted text-sm">No team picked yet.</p>`}
                        </div>
                      </div>
                    `).join("")}
                ` : `<p class="text-muted">No upcoming events.</p>`}
              </div>
              <div class="card">
                <div class="card__header"><span class="card__title">${SEASON} Schedule</span></div>
                ${events.length > 0 ? (() => {
                  const seen = new Set();
                  const unique = events.filter((e) => {
                    const key = `${e.eventNumber}-${e.name}`;
                    if (seen.has(key)) return false;
                    seen.add(key); return true;
                  });
                  return `<div class="surfer-list">
                    ${unique.map((e) => `
                      <div class="surfer-row">
                        <span class="surfer-row__rank">${e.eventNumber}</span>
                        <span class="surfer-row__name">${e.name}</span>
                        ${statusBadge(e.status)}
                      </div>
                    `).join("")}
                  </div>`;
                })() : `<p class="text-muted">No events scheduled yet.</p>`}
              </div>
            </div>`;
        } else if (activeTab === "standings") {
          content = standingsHtml;
        } else {
          // Rosters tab
          content = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">
              <div>
                <h2 class="mb-3">Men's CT</h2>
                ${mensEvent ? `
                  <div class="card mb-3">
                    <div class="card__header">
                      <span class="card__title">Current Roster</span>
                      <span class="text-sm text-muted">${mensEvent.name}</span>
                    </div>
                    ${renderStrip(mensTeam, null, true, "mens")}
                  </div>
                ` : ""}
                ${mensRosters.map(({ event, team, score }) => renderEventCard(event, team, score)).join("")}
              </div>
              <div>
                <h2 class="mb-3">Women's CT</h2>
                ${womensEvent ? `
                  <div class="card mb-3">
                    <div class="card__header">
                      <span class="card__title">Current Roster</span>
                      <span class="text-sm text-muted">${womensEvent.name}</span>
                    </div>
                    ${renderStrip(womensTeam, null, true, "womens")}
                  </div>
                ` : ""}
                ${womensRosters.map(({ event, team, score }) => renderEventCard(event, team, score)).join("")}
              </div>
            </div>`;
        }

        container.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.25rem;margin-top:-1rem">
            <h1 class="page-title" style="margin:0">Fantasy Surf League</h1>
            ${profileWidget}
          </div>
          ${tabs}
          ${editFormModal}
          ${content}
        `;

        // ── Tab click handlers ──
        container.querySelectorAll(".dash-tab").forEach((btn) => {
          btn.addEventListener("click", async () => {
            activeTab = btn.dataset.tab;
            if (activeTab === "rosters") {
              container.querySelector(".dash-tab[data-tab='rosters']").textContent = "Loading...";
              await loadRosters();
            }
            render();
          });
        });

        // ── Club dropdown handler ──
        document.getElementById("club-select")?.addEventListener("change", (e) => {
          selectClub(parseInt(e.target.value));
          render();
        });

        // ── Set default club ──
        document.getElementById("btn-default-club")?.addEventListener("click", async () => {
          if (!club || club.id === userDoc?.defaultClubId) return;
          const { updateUser } = await import("./js/db.js");
          const { toast: t } = await import("./js/ui.js");
          await updateUser(user.uid, { defaultClubId: club.id });
          userDoc.defaultClubId = club.id;
          t(`${club.name} set as default`, "success");
          render();
        });

        // ── Profile edit handlers ──
        {
          document.getElementById("btn-edit-profile")?.addEventListener("click", () => {
            const form = document.getElementById("profile-edit-form");
            form.style.display = form.style.display === "none" ? "block" : "none";
          });
          document.getElementById("btn-cancel-profile")?.addEventListener("click", () => {
            document.getElementById("profile-edit-form").style.display = "none";
          });

          const applyFile = (file) => {
            if (!file || !file.type.startsWith("image/")) return;
            document.getElementById("avatar-file-name").textContent = file.name;
            document.getElementById("avatar-url-input").value = "";
            const preview = document.querySelector(".profile-edit__avatar img, .profile-edit__avatar div");
            if (preview && preview.tagName === "IMG") preview.src = URL.createObjectURL(file);
            const dt = new DataTransfer();
            dt.items.add(file);
            document.getElementById("avatar-file-input").files = dt.files;
          };

          document.getElementById("avatar-file-input")?.addEventListener("change", (e) => applyFile(e.target.files[0]));

          const dropZone = document.getElementById("avatar-drop-zone");
          if (dropZone) {
            dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--color-primary)"; dropZone.style.background = "rgba(0,0,0,0.03)"; });
            dropZone.addEventListener("dragleave", () => { dropZone.style.borderColor = ""; dropZone.style.background = ""; });
            dropZone.addEventListener("drop", (e) => {
              e.preventDefault();
              dropZone.style.borderColor = "";
              dropZone.style.background = "";
              applyFile(e.dataTransfer.files[0]);
            });
          }

          document.getElementById("btn-save-profile")?.addEventListener("click", async () => {
            const { toast: t } = await import("./js/ui.js");
            const { updateUser } = await import("./js/db.js");
            const name = document.getElementById("team-name-input")?.value.trim();
            if (!name) { t("Team name is required.", "error"); return; }

            const file = document.getElementById("avatar-file-input")?.files[0];
            const urlInput = document.getElementById("avatar-url-input")?.value.trim();
            let finalUrl = urlInput || profile?.avatarUrl || "";

            if (file) {
              t("Uploading photo…", "info");
              try {
                const { storage } = await import("./js/firebase-config.js");
                const { ref, uploadBytes, getDownloadURL } = await import("https://www.gstatic.com/firebasejs/11.4.0/firebase-storage.js");
                const storageRef = ref(storage, `avatars/${user.uid}`);
                await uploadBytes(storageRef, file);
                finalUrl = await getDownloadURL(storageRef);
              } catch (err) {
                t("Upload failed: " + err.message, "error");
                return;
              }
            }

            await updateUser(user.uid, { teamName: name, avatarUrl: finalUrl });
            t("Profile saved!", "success");
            setTimeout(() => location.reload(), 800);
          });
        }
      }

      render();
    }
  </script>
</body>
</html>
