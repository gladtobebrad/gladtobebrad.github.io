<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Surf League — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth, getCurrentUser, getUserProfile } from "./js/auth.js";
    import { getCurrentEventForTour, getLeaderboard, getTeam, getEvents, getResults, getTeamsForEvent, getSurfers, getUser, getClub, getUserClubIds } from "./js/db.js";
    import { scoreTeam } from "./js/scoring.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading, formatSalary, formatDate, statusBadge, tradingBadge, renderTable } from "./js/ui.js";

    const SEASON = 2026;

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) {
        showAuthGate(main);
        return;
      }
      showLoading(main);
      await renderDashboard(main, user, profile);
    });

    async function renderDashboard(container, user, profile) {
      let mensEvent, womensEvent, leaderboard, events;
      try {
        [mensEvent, womensEvent, leaderboard, events] = await Promise.all([
          getCurrentEventForTour("mens", SEASON),
          getCurrentEventForTour("womens", SEASON),
          getLeaderboard(SEASON),
          getEvents(SEASON)
        ]);
      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Fantasy Surf League</h1>
          <div class="card">
            <p class="text-muted">Unable to load data. Make sure Firebase is configured in <code>js/firebase-config.js</code>.</p>
            <p class="text-muted text-sm mt-1">${err.message}</p>
          </div>
        `;
        return;
      }

      // Use mensEvent as the primary "current event" for legacy sections
      const currentEvent = mensEvent || womensEvent;

      // Get user's teams for both tours
      let mensTeam = null, womensTeam = null;
      const [mt, wt] = await Promise.all([
        mensEvent ? getTeam(user.uid, mensEvent.id) : null,
        womensEvent ? getTeam(user.uid, womensEvent.id) : null,
      ]);
      mensTeam = mt; womensTeam = wt;

      // Legacy userTeam for all-teams section
      const userTeam = mensTeam;

      // Always load surfer data for name lookups
      let allTeamsData = [];
      const surferMap = {};
      const surfers = await getSurfers();
      surfers.forEach((s) => { surferMap[s.id] = s; });

      // Load all teams (per tour) when trading is closed
      let allMensTeams = [], allWomensTeams = [];
      const userDocCache = {};
      const enrichTeams = async (eventObj) => {
        if (!eventObj || eventObj.tradingOpen) return [];
        const raw = await getTeamsForEvent(eventObj.id);
        const enriched = [];
        for (const team of raw) {
          if (!userDocCache[team.userId]) userDocCache[team.userId] = await getUser(team.userId);
          const u = userDocCache[team.userId];
          enriched.push({ ...team, displayName: u?.displayName || "Unknown", teamName: u?.teamName || u?.displayName || "—", avatarUrl: u?.avatarUrl || "" });
        }
        return enriched;
      };
      [allMensTeams, allWomensTeams] = await Promise.all([enrichTeams(mensEvent), enrichTeams(womensEvent)]);
      allTeamsData = allMensTeams; // legacy

      // Enrich leaderboard with fresh user profile data (avatar, team name)
      for (const entry of leaderboard) {
        const userDoc = await getUser(entry.userId);
        if (userDoc) {
          entry.avatarUrl = userDoc.avatarUrl || "";
          entry.teamName = userDoc.teamName || entry.teamName || userDoc.displayName || "";
          entry.displayName = userDoc.displayName || entry.displayName || "";
        }
      }

      // Sort leaderboard by bestNineTotal
      leaderboard.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));

      // Load club data — show first club's mini leaderboard on dashboard
      const userDoc = await getUser(user.uid);
      const clubIds = getUserClubIds(userDoc);
      let club = null;
      let clubMembers = [];
      if (clubIds.length > 0) {
        club = await getClub(clubIds[0]);
        if (club) {
          const memberLeaderboard = leaderboard.filter((e) => club.memberIds.includes(e.userId));
          memberLeaderboard.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));
          clubMembers = memberLeaderboard.slice(0, 5);
        }
      }

      // Profile section — team name + avatar
      const avatarUrl = profile?.avatarUrl || profile?.photoUrl || user.photoURL || "";
      const avatarPreview = avatarUrl
        ? `<img src="${avatarUrl}" alt="" class="avatar-preview" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
        : `<div class="avatar-preview avatar-preview--empty">${(profile?.displayName || user.displayName || "?")[0]}</div>`;

      const adsCoins = profile?.adsCoins ?? 10;
      const teamNameSection = `<div class="card mb-3">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <h4 style="margin:0">Your Profile</h4>
              <span class="ads-coin-badge">🪙 ${adsCoins} ADScoin</span>
            </div>
            <div class="profile-edit">
              <div class="profile-edit__avatar">
                ${avatarPreview}
              </div>
              <div class="profile-edit__fields">
                <div class="form-group mb-1">
                  <label class="form-label">Team Name</label>
                  <input type="text" class="search-input" id="team-name-input" placeholder="e.g. michael ciaramella" maxlength="30" value="${profile?.teamName || ""}">
                </div>
                <div class="form-group mb-1">
                  <label class="form-label">Profile Photo</label>
                  <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
                    <label class="btn btn--outline btn--sm" style="cursor:pointer;margin:0">
                      Choose File
                      <input type="file" id="avatar-file-input" accept="image/*" style="display:none">
                    </label>
                    <span class="text-xs text-muted" id="avatar-file-name">No file chosen</span>
                  </div>
                  <p class="text-xs text-muted mt-1">or paste a URL: <input type="text" class="search-input" id="avatar-url-input" placeholder="https://i.imgur.com/..." value="${profile?.avatarUrl || ""}" style="display:inline;width:auto;max-width:200px;padding:0.2rem 0.4rem;font-size:0.8rem"></p>
                </div>
                <button class="btn btn--primary btn--sm" id="btn-save-profile">Save Profile</button>
              </div>
            </div>
          </div>`;

      container.innerHTML = `
        <h1 class="page-title">Fantasy Surf League</h1>
        ${teamNameSection}
        <div class="grid grid--sidebar">
          <div>
            <!-- Current Event -->
            <div class="card mb-3">
              <div class="card__header">
                <span class="card__title">Current Events</span>
              </div>
              ${mensEvent || womensEvent ? `
                ${[mensEvent && { ev: mensEvent, label: "Men's CT" }, womensEvent && { ev: womensEvent, label: "Women's CT" }]
                  .filter(Boolean)
                  .map(({ ev, label }, idx) => `
                    ${idx > 0 ? `<div style="border-top:1px solid var(--color-beige);margin-top:0.75rem;padding-top:0.75rem"></div>` : ""}
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
                      <span class="text-sm" style="font-weight:600">${label}</span>
                      ${statusBadge(ev.status)}
                    </div>
                    <h3 style="margin-bottom:0.25rem">${ev.name}</h3>
                    <p class="text-muted text-sm">${ev.location || ""}</p>
                    <p class="text-sm mt-1">${formatDate(ev.startDate)} — ${formatDate(ev.endDate)}</p>
                    <p class="mt-1">${tradingBadge(ev.tradingOpen)}</p>
                  `).join("")}
              ` : `<p class="text-muted">No upcoming events.</p>`}
            </div>

            <!-- Your Teams -->
            ${[mensEvent && { ev: mensEvent, team: mensTeam, label: "Men's CT" }, womensEvent && { ev: womensEvent, team: womensTeam, label: "Women's CT" }]
              .filter(Boolean)
              .map(({ ev, team, label }) => `
                <div class="card mb-3">
                  <div class="card__header">
                    <span class="card__title">Your Team — ${label}</span>
                  </div>
                  <p class="text-muted text-sm mb-2">${ev.name}</p>
                  ${team ? `
                    <div class="surfer-list">
                      ${team.surfers.map((s) => {
                        const data = surferMap[s.surferId] || {};
                        const photo = data.photoUrl
                          ? `<img src="${data.photoUrl}" class="surfer-photo--sm" alt="">`
                          : `<div class="surfer-photo--sm surfer-photo--empty">${(data.name || "?")[0]}</div>`;
                        return `<div class="surfer-row">
                          ${photo}
                          <div class="surfer-row__info">
                            <span class="surfer-row__name">${data.name || s.surferId.replace(/-/g, " ")}</span>
                            <span class="surfer-row__meta">#${data.rank || "—"} &middot; ${formatSalary(s.purchasePrice)}</span>
                          </div>
                        </div>`;
                      }).join("")}
                      ${team.alternate ? (() => {
                        const altData = surferMap[team.alternate.surferId] || {};
                        const altPhoto = altData.photoUrl
                          ? `<img src="${altData.photoUrl}" class="surfer-photo--sm" alt="">`
                          : `<div class="surfer-photo--sm surfer-photo--empty">${(altData.name || "?")[0]}</div>`;
                        return `<div class="surfer-row surfer-row--alternate">
                          ${altPhoto}
                          <div class="surfer-row__info">
                            <span class="surfer-row__name">${altData.name || team.alternate.surferId.replace(/-/g, " ")}</span>
                            <span class="surfer-row__meta">ALT &middot; ${formatSalary(team.alternate.purchasePrice)}</span>
                          </div>
                        </div>`;
                      })() : ""}
                    </div>
                    <a href="team.html" class="btn btn--primary btn--sm mt-2">Manage Team</a>
                  ` : `
                    <p class="text-muted">No team picked yet.</p>
                    <a href="team.html" class="btn btn--primary btn--sm mt-2">Pick Your Team</a>
                  `}
                </div>
              `).join("")}
          </div>

          <!-- Sidebar: Leaderboard + Events -->
          <div>
            <div class="card mb-3">
              <div class="card__header">
                <span class="card__title">Season Standings</span>
              </div>
              ${leaderboard.length > 0 ? `
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Team</th>
                      <th class="text-right">Best 9</th>
                      <th class="text-right">Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${leaderboard.map((entry, i) => `
                      <tr class="${entry.userId === user.uid ? "highlight" : ""}">
                        <td><span class="leaderboard-rank leaderboard-rank--${i + 1}">${i + 1}</span></td>
                        <td class="flex gap-1" style="align-items:center">
                          ${entry.avatarUrl ? `<img src="${entry.avatarUrl}" class="avatar-sm" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : `<div class="avatar-sm avatar-sm--empty">${(entry.displayName || "?")[0]}</div>`}
                          ${entry.teamName || entry.displayName || "—"}
                        </td>
                        <td class="text-right">${entry.bestNineTotal || 0}</td>
                        <td class="text-right text-muted">${entry.allEventsTotal || 0}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              ` : `<p class="text-muted">No standings yet. Results will appear after the first event.</p>`}
            </div>

            ${club ? `
            <div class="card mb-3">
              <div class="card__header">
                <span class="card__title">${club.name}${clubIds.length > 1 ? ` <span class="text-xs text-muted">(+${clubIds.length - 1} more)</span>` : ""}</span>
                <a href="club.html" class="btn btn--outline btn--sm">View Club →</a>
              </div>
              ${clubMembers.length > 0 ? `
                <table class="data-table">
                  <thead>
                    <tr><th>#</th><th>Team</th><th class="text-right">Best 9</th></tr>
                  </thead>
                  <tbody>
                    ${clubMembers.map((entry, i) => `
                      <tr class="${entry.userId === user.uid ? "highlight" : ""}">
                        <td>${i + 1}</td>
                        <td class="flex gap-1" style="align-items:center">
                          ${entry.avatarUrl ? `<img src="${entry.avatarUrl}" class="avatar-sm" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : `<div class="avatar-sm avatar-sm--empty">${(entry.displayName || "?")[0]}</div>`}
                          ${entry.teamName || entry.displayName || "—"}
                        </td>
                        <td class="text-right">${entry.bestNineTotal || 0}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              ` : `<p class="text-muted text-sm">No standings yet.</p>`}
            </div>
            ` : `
            <div class="card mb-3">
              <div class="card__header">
                <span class="card__title">Your Club</span>
              </div>
              <p class="text-muted text-sm">Compete with friends in a private group.</p>
              <a href="club.html" class="btn btn--outline btn--sm mt-2">Join or Create a Club →</a>
            </div>
            `}

            <div class="card">
              <div class="card__header">
                <span class="card__title">${SEASON} Schedule</span>
              </div>
              ${events.length > 0 ? (() => {
                // Deduplicate — mens + womens share the same contest name/number
                const seen = new Set();
                const unique = events.filter((e) => {
                  const key = `${e.eventNumber}-${e.name}`;
                  if (seen.has(key)) return false;
                  seen.add(key); return true;
                });
                return `<div class="surfer-list">
                  ${unique.map((e) => `
                    <div class="surfer-row">
                      <span class="surfer-row__rank">${e.eventNumber}</span>
                      <span class="surfer-row__name">${e.name}</span>
                      ${statusBadge(e.status)}
                    </div>
                  `).join("")}
                </div>`;
              })() : `<p class="text-muted">No events scheduled yet.</p>`}
            </div>
          </div>
        </div>

      `;

      // File picker preview
      document.getElementById("avatar-file-input")?.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById("avatar-file-name").textContent = file.name;
        // Show local preview immediately
        const preview = document.querySelector(".profile-edit__avatar img, .profile-edit__avatar div");
        if (preview && preview.tagName === "IMG") preview.src = URL.createObjectURL(file);
      });

      // Profile save handler
      document.getElementById("btn-save-profile")?.addEventListener("click", async () => {
        const { toast: t } = await import("./js/ui.js");
        const { updateUser } = await import("./js/db.js");
        const name = document.getElementById("team-name-input")?.value.trim();
        if (!name) { t("Team name is required.", "error"); return; }

        const file = document.getElementById("avatar-file-input")?.files[0];
        const urlInput = document.getElementById("avatar-url-input")?.value.trim();
        let avatarUrl = urlInput || "";

        if (file) {
          t("Uploading photo…", "info");
          try {
            const { storage } = await import("./js/firebase-config.js");
            const { ref, uploadBytes, getDownloadURL } = await import("https://www.gstatic.com/firebasejs/11.4.0/firebase-storage.js");
            const storageRef = ref(storage, `avatars/${user.uid}`);
            await uploadBytes(storageRef, file);
            avatarUrl = await getDownloadURL(storageRef);
          } catch (err) {
            t("Upload failed: " + err.message, "error");
            return;
          }
        }

        await updateUser(user.uid, { teamName: name, avatarUrl });
        t("Profile saved!", "success");
        location.reload();
      });
    }
  </script>
</body>
</html>
