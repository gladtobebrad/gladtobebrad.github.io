<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Surfer — Dashboard</title>
  <meta name="description" content="Build your dream team from the WSL Championship Tour, manage your salary cap, and battle your club all season long. Free to play.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Fantasy Surfer — Where surfer dreams become surfer fantasies">
  <meta property="og:description" content="Build your dream team from the WSL Championship Tour, manage your salary cap, and battle your club all season long. Free to play.">
  <meta property="og:image" content="https://fantasysurfer.org/img/loadpage.jpg">
  <meta property="og:image:alt" content="A surfer carving through a breaking wave">
  <meta property="og:url" content="https://fantasysurfer.org">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Fantasy Surfer — Where surfer dreams become surfer fantasies">
  <meta name="twitter:description" content="Build your dream team from the WSL Championship Tour, manage your salary cap, and battle your club all season long. Free to play.">
  <meta name="twitter:image" content="https://fantasysurfer.org/img/loadpage.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth } from "./js/auth.js";
    import { getCurrentEventForTour, getLeaderboard, getTeam, getEvents, getSurfers } from "./js/db.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading, statusBadge, tradingBadge } from "./js/ui.js";

    const SEASON = 2026;

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) {
        showAuthGate(main);
        return;
      }
      showLoading(main);
      await renderDashboard(main, user, profile);
    });

    async function renderDashboard(container, user, profile) {
      let mensEvent, womensEvent, mensLeaderboard, womensLeaderboard, events;
      try {
        [mensEvent, womensEvent, mensLeaderboard, womensLeaderboard, events] = await Promise.all([
          getCurrentEventForTour("mens", SEASON),
          getCurrentEventForTour("womens", SEASON),
          getLeaderboard(SEASON, "mens"),
          getLeaderboard(SEASON, "womens"),
          getEvents(SEASON)
        ]);
      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Fantasy Surf League</h1>
          <div class="card">
            <p class="text-muted">Unable to load data. Make sure Firebase is configured in <code>js/firebase-config.js</code>.</p>
            <p class="text-muted text-sm mt-1">${err.message}</p>
          </div>
        `;
        return;
      }

      // Get user's teams for both tours
      const [mensTeam, womensTeam] = await Promise.all([
        mensEvent ? getTeam(user.uid, mensEvent.id) : null,
        womensEvent ? getTeam(user.uid, womensEvent.id) : null,
      ]);

      // Surfer name/photo lookup
      const surferMap = {};
      const surfers = await getSurfers();
      surfers.forEach((s) => { surferMap[s.id] = s; });

      // ADScoin badge data (the only piece of user-specific content shown on dashboard;
      // everything else lives in the nav-user dropdown now)
      const adsCoins = profile?.adsCoins ?? 10;

      // ── Helpers ───────────────────────────────────────
      // Split a full name into first/last for two-line display.
      const splitName = (fullName) => {
        const parts = (fullName || "").trim().split(/\s+/);
        if (parts.length === 0) return { first: "", last: "" };
        if (parts.length === 1) return { first: "", last: parts[0] };
        const last = parts.pop();
        return { first: parts.join(" "), last };
      };

      const nameLabelHtml = (fullName) => {
        const { first, last } = splitName(fullName);
        return `<span class="team-row__name">
          ${first ? `<span class="team-row__firstname">${first}</span>` : ""}
          <span class="team-row__lastname">${last || fullName}</span>
        </span>`;
      };

      // Render a team as a single horizontal row of surfer tiles + alternate.
      // CSS class .team-row collapses to wrap at narrow viewports.
      const renderTeamRow = (team, tour) => {
        const rosterSize = tour === "womens" ? 5 : 8;
        if (!team) {
          return `<p class="text-muted text-sm" style="margin-top:0.5rem">No team picked yet. <a href="team.html${tour === "womens" ? "?tour=womens" : ""}">Pick your team →</a></p>`;
        }
        const surferTiles = [];
        for (let i = 0; i < rosterSize; i++) {
          if (i < team.surfers.length) {
            const s = team.surfers[i];
            const data = surferMap[s.surferId] || {};
            const name = data.name || s.surferId.replace(/-/g, " ");
            const photo = data.photoUrl
              ? `<img src="${data.photoUrl}" class="team-row__photo" alt="">`
              : `<div class="team-row__photo team-row__photo--empty">${name[0]}</div>`;
            surferTiles.push(`<div class="team-row__surfer">${photo}${nameLabelHtml(name)}</div>`);
          } else {
            surferTiles.push(`<div class="team-row__surfer"><div class="team-row__photo team-row__photo--empty" style="opacity:0.4"></div><span class="team-row__name" style="opacity:0">—</span></div>`);
          }
        }
        let altTile;
        if (team.alternate) {
          const d = surferMap[team.alternate.surferId] || {};
          const altName = d.name || team.alternate.surferId.replace(/-/g, " ");
          const p = d.photoUrl
            ? `<img src="${d.photoUrl}" class="team-row__photo team-row__photo--alt" alt="">`
            : `<div class="team-row__photo team-row__photo--empty team-row__photo--alt">${altName[0]}</div>`;
          altTile = `<div class="team-row__surfer">${p}${nameLabelHtml(altName)}<span class="team-row__alt-label">ALT</span></div>`;
        } else {
          altTile = `<div class="team-row__surfer"><div class="team-row__photo team-row__photo--empty team-row__photo--alt" style="opacity:0.4"></div><span class="team-row__name" style="opacity:0">—</span><span class="team-row__alt-label">ALT</span></div>`;
        }
        return `<div class="team-row">${surferTiles.join("")}<div class="team-row__alt-divider" aria-hidden="true"></div>${altTile}</div>`;
      };

      // Team card with header (label + Edit Team CTA) and the single-row team
      const renderTeamCard = (label, event, team, tour) => {
        const tourQuery = tour === "womens" ? "?tour=womens" : "";
        const editLink = `<a href="team.html${tourQuery}" class="btn btn--outline btn--sm">Edit Team →</a>`;
        const eventInfo = event
          ? `<div class="text-sm text-muted" style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-top:0.25rem">
              <span>${event.name}</span>
              ${statusBadge(event.status)} ${tradingBadge(event.tradingOpen)}
              ${(() => {
                const dl = getDeadlineMs(event);
                if (!dl) return "";
                return `<span style="display:inline-flex;align-items:center;gap:0.25rem;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:4px;padding:0.15rem 0.45rem;font-size:0.7rem;font-variant-numeric:tabular-nums;white-space:nowrap" data-deadline="${dl}"><span class="countdown-text">—</span> until lock</span>`;
              })()}
            </div>`
          : `<div class="text-sm text-muted" style="margin-top:0.25rem">No active event.</div>`;
        return `
          <div class="card mb-3 team-card">
            <div class="card__header" style="align-items:flex-start">
              <div style="min-width:0;flex:1">
                <span class="card__title">${label}</span>
                ${eventInfo}
              </div>
              ${editLink}
            </div>
            ${renderTeamRow(team, tour)}
          </div>`;
      };

      // ── Countdown helpers ─────────────────────────────
      function getDeadlineMs(ev) {
        if (!ev || !ev.tradingCloseTime || !ev.tradingCloseTimezone || ev.tradingOpen === false) return null;
        const offset = parseInt(ev.tradingCloseTimezone, 10);
        if (isNaN(offset)) return null;
        const sign = offset >= 0 ? "+" : "-";
        const absH = String(Math.abs(offset)).padStart(2, "0");
        const isoStr = `${ev.tradingCloseTime}:00${sign}${absH}:00`;
        const ms = new Date(isoStr).getTime();
        return isNaN(ms) ? null : ms;
      }

      function formatCountdown(ms) {
        if (ms <= 0) return "Closing soon";
        const s = Math.floor(ms / 1000);
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (d > 0) return `${d}d ${h}h ${m}m`;
        if (h > 0) return `${h}h ${m}m ${sec}s`;
        return `${m}m ${sec}s`;
      }

      // ── Rank progression chart (kept from prior dashboard) ─
      const buildRankProgression = (leaderboard, completedEventIds, memberIds = null) => {
        const entries = memberIds
          ? leaderboard.filter(e => memberIds.includes(e.userId))
          : leaderboard;
        if (entries.length === 0 || completedEventIds.length === 0) return [];
        const ranks = [];
        for (let n = 1; n <= completedEventIds.length; n++) {
          const evSubset = completedEventIds.slice(0, n);
          const standings = entries.map(e => {
            const scores = evSubset
              .map(evId => (e.eventScores || {})[evId] || 0)
              .filter(s => s > 0)
              .sort((a, b) => b - a);
            return { userId: e.userId, total: scores.slice(0, 9).reduce((a, b) => a + b, 0) };
          }).sort((a, b) => b.total - a.total);
          const rank = standings.findIndex(s => s.userId === user.uid) + 1;
          ranks.push(rank > 0 ? rank : null);
        }
        return ranks;
      };

      const mensCompletedEvents = events
        .filter(e => (e.tour || "mens") === "mens" && e.status === "completed")
        .sort((a, b) => (a.eventNumber || 0) - (b.eventNumber || 0))
        .map(e => e.id);
      const womensCompletedEvents = events
        .filter(e => (e.tour || "") === "womens" && e.status === "completed")
        .sort((a, b) => (a.eventNumber || 0) - (b.eventNumber || 0))
        .map(e => e.id);

      const MENS_LINE_COLOR = "#7D8975";   // sage-dark
      const WOMENS_LINE_COLOR = "#B0837A"; // muted dusty rose, matches sage-dark luminance

      const renderRankChart = (mensRanks, womensRanks, totalPlayers, opts = {}) => {
        const maxEvents = Math.max(mensRanks.length, womensRanks.length);
        if (maxEvents === 0) return `<p class="text-muted text-sm" style="text-align:center;margin-top:0.75rem">Chart will appear after events are scored.</p>`;
        const W = opts.W ?? 280;
        const H = opts.H ?? 240;
        const pad = opts.pad ?? { t: 8, r: 12, b: 30, l: 32 };
        const tickFont = opts.tickFont ?? 7.5;
        const axisFont = opts.axisFont ?? 9.5;
        const lineW = opts.lineW ?? 2;
        const dotR = opts.dotR ?? 3;
        const xTickY = opts.xTickY ?? (H - 17);
        const chartW = W - pad.l - pad.r;
        const chartH = H - pad.t - pad.b;
        const maxRank = Math.max(totalPlayers, 1);
        const toPoint = (ranks, i) => {
          const x = pad.l + (maxEvents === 1 ? chartW / 2 : (i / (maxEvents - 1)) * chartW);
          const y = pad.t + ((ranks[i] - 1) / (maxRank - 1)) * chartH;
          return { x, y };
        };
        const makeLine = (ranks, color) => {
          const valid = ranks.map((r, i) => r != null ? i : null).filter(i => i != null);
          if (valid.length === 0) return "";
          const points = valid.map(i => { const p = toPoint(ranks, i); return `${p.x},${p.y}`; });
          const pathD = points.length === 1
            ? ""
            : `<polyline points="${points.join(" ")}" fill="none" stroke="${color}" stroke-width="${lineW}" />`;
          const dots = valid.map(i => {
            const p = toPoint(ranks, i);
            return `<circle cx="${p.x}" cy="${p.y}" r="${dotR}" fill="${color}" />`;
          }).join("");
          return pathD + dots;
        };
        // 7 y-axis labels evenly spaced across the rank range, deduped + sorted
        const yLabelCount = 7;
        const yLabels = [...new Set(
          Array.from({ length: yLabelCount }, (_, i) =>
            Math.max(1, Math.round(1 + (maxRank - 1) * i / (yLabelCount - 1)))
          )
        )].sort((a, b) => a - b);
        const yLabelHtml = yLabels.map(r => {
          const y = pad.t + ((r - 1) / Math.max(maxRank - 1, 1)) * chartH;
          return `<text x="${pad.l - 3}" y="${y + 2.5}" text-anchor="end" fill="var(--color-warm-gray)" font-size="${tickFont}">${r}</text>`;
        }).join("");
        const xLabelHtml = Array.from({ length: maxEvents }, (_, i) => {
          const x = pad.l + (maxEvents === 1 ? chartW / 2 : (i / (maxEvents - 1)) * chartW);
          return `<text x="${x}" y="${xTickY}" text-anchor="middle" fill="var(--color-warm-gray)" font-size="${tickFont}">E${i + 1}</text>`;
        }).join("");
        const gridHtml = yLabels.map(r => {
          const y = pad.t + ((r - 1) / Math.max(maxRank - 1, 1)) * chartH;
          return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="var(--color-beige)" stroke-width="0.4" />`;
        }).join("");
        const yAxisLabelX = Math.max(5, pad.l - 24);
        const yAxisLabelY = pad.t + chartH / 2;
        const xAxisLabelY = H - 4;
        return `
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
            ${gridHtml}
            ${yLabelHtml}
            ${xLabelHtml}
            <text x="${yAxisLabelX}" y="${yAxisLabelY}" text-anchor="middle" transform="rotate(-90, ${yAxisLabelX}, ${yAxisLabelY})" fill="var(--color-warm-brown)" font-size="${axisFont}" font-weight="600">Rank</text>
            <text x="${pad.l + chartW / 2}" y="${xAxisLabelY}" text-anchor="middle" fill="var(--color-warm-brown)" font-size="${axisFont}" font-weight="600">Event Number</text>
            ${makeLine(mensRanks, MENS_LINE_COLOR)}
            ${makeLine(womensRanks, WOMENS_LINE_COLOR)}
          </svg>`;
      };

      // Build the legend HTML (shared between tall and wide variants)
      const renderRankLegend = () => `
        <div style="display:flex;gap:1.25rem;justify-content:center;margin-top:0.5rem;font-size:0.72rem">
          <span style="color:${MENS_LINE_COLOR};display:inline-flex;align-items:center;gap:0.3rem"><span style="display:inline-block;width:14px;height:2px;background:${MENS_LINE_COLOR}"></span>Men's CT</span>
          <span style="color:${WOMENS_LINE_COLOR};display:inline-flex;align-items:center;gap:0.3rem"><span style="display:inline-block;width:14px;height:2px;background:${WOMENS_LINE_COLOR}"></span>Women's CT</span>
        </div>`;

      // ── Render ────────────────────────────────────────
      function render() {
        const coinBadge = `<span class="ads-coin-badge">🪙 ${adsCoins} ADScoin</span>`;

        // Rank progression chart for League (Club chart now lives on /club).
        // Render two variants — tall for the 2-col layout, wide (clubhouse-
        // style flat aspect) for the post-snap single-col layout. CSS swaps
        // visibility at the same breakpoint where dash-grid-2 stacks.
        const leagueMensRanks = buildRankProgression(mensLeaderboard, mensCompletedEvents);
        const leagueWomensRanks = buildRankProgression(womensLeaderboard, womensCompletedEvents);
        const totalPlayers = Math.max(mensLeaderboard.length, womensLeaderboard.length, 12);
        const leagueChartTall = renderRankChart(leagueMensRanks, leagueWomensRanks, totalPlayers);
        const leagueChartWide = renderRankChart(leagueMensRanks, leagueWomensRanks, totalPlayers, {
          W: 280, H: 100,
          pad: { t: 5, r: 8, b: 20, l: 24 },
          tickFont: 4, axisFont: 5, lineW: 1, dotR: 1.5,
          xTickY: 100 - 11
        });
        const leagueLegend = renderRankLegend();

        // Schedule list — single shared schedule (men's tour events represent the shared venues)
        const scheduleEvents = events
          .filter(e => (e.tour || "mens") === "mens")
          .sort((a, b) => (a.eventNumber || 0) - (b.eventNumber || 0));
        const scheduleHtml = scheduleEvents.length === 0
          ? `<p class="text-muted">No events scheduled yet.</p>`
          : `<div class="surfer-list">
              ${scheduleEvents.map(e => `
                <div class="surfer-row">
                  <span class="surfer-row__rank">${e.eventNumber}</span>
                  <span class="surfer-row__name">
                    ${e.status !== "upcoming" ? `<a href="event.html?id=${e.id}" style="color:inherit;text-decoration:none">${e.name}</a>` : e.name}
                  </span>
                  ${statusBadge(e.status)}
                </div>
              `).join("")}
            </div>`;

        container.innerHTML = `
          <div class="dash-header">
            <div class="dash-title">
              <h1 class="page-title" style="margin-bottom:0">Fantasy Surf League</h1>
              <p class="dash-subtitle">Where surfer dreams become surfer fantasies</p>
            </div>
            ${coinBadge}
          </div>

          ${renderTeamCard("Men's CT", mensEvent, mensTeam, "mens")}
          ${renderTeamCard("Women's CT", womensEvent, womensTeam, "womens")}

          <div class="dash-grid-2 dash-grid-2--stretch mt-3">
            <div class="card" style="display:flex;flex-direction:column">
              <div class="card__header">
                <span class="card__title">League Standings</span>
                <a href="standings.html" class="btn btn--outline btn--sm">Standings →</a>
              </div>
              <div class="league-chart-wrapper" style="margin-top:0.75rem;flex:1;display:flex;flex-direction:column;justify-content:center">
                <div class="league-chart-tall">${leagueChartTall}</div>
                <div class="league-chart-wide">${leagueChartWide}</div>
                ${leagueLegend}
              </div>
            </div>
            <div class="card">
              <div class="card__header"><span class="card__title">${SEASON} Schedule</span></div>
              ${scheduleHtml}
            </div>
          </div>
        `;

        // ── Countdown tick ──
        clearInterval(window._countdownInterval);
        const cdEls = container.querySelectorAll("[data-deadline]");
        if (cdEls.length) {
          const tick = () => {
            const now = Date.now();
            cdEls.forEach((el) => {
              const dl = parseInt(el.dataset.deadline, 10);
              const span = el.querySelector(".countdown-text");
              if (span) span.textContent = formatCountdown(dl - now);
            });
          };
          tick();
          window._countdownInterval = setInterval(tick, 1000);
        }

      }

      render();
    }
  </script>
</body>
</html>
