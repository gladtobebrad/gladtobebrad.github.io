<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Team — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
  <style>
    .surfer-row--selected {
      border: 2px solid #3a6b1f;
      background: #d6ebca;
    }
    .surfer-row--unaffordable {
      position: relative;
    }
    .surfer-row--unaffordable::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(210, 205, 200, 0.55);
      z-index: 0;
      pointer-events: none;
    }
    .surfer-row--unaffordable .surfer-row__info {
      opacity: 0.35;
    }
    .surfer-row--unaffordable .surfer-row__action {
      opacity: 0.75;
    }
    .btn--unaffordable {
      background: none;
      border: 1px solid #c0392b;
      color: #c0392b;
      cursor: default;
      font-weight: 700;
    }
    .roster-slot--empty {
      height: 52px;
      border: 2px dashed #d5d0ca;
      border-radius: 6px;
      background: #f5f3f0;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
    }
    /* Side-by-side layout */
    .team-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1rem;
      align-items: start;
    }
    /* Single-column roster list */
    .roster-grid {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    /* Available pool: 4 columns in the right panel */
    #available-list.surfer-list--grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    /* Photo-flush card: photo spans full height, buttons appear on hover over photo */
    .available-card {
      align-items: stretch;
      padding: 0;
      gap: 0;
      overflow: hidden;
    }
    .available-card__photo-wrap {
      position: relative;
      flex-shrink: 0;
      width: 54px;
      align-self: stretch;
    }
    .available-card__photo {
      width: 54px;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .available-card__photo--empty {
      width: 54px;
      height: 100%;
      background: var(--color-beige);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-warm-brown);
    }
    .available-card__overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      background: rgba(0, 0, 0, 0.52);
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .available-card:hover .available-card__overlay {
      opacity: 1;
    }
    .overlay-btn {
      background: rgba(255, 255, 255, 0.92);
      border: none;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.5;
      width: 80%;
      text-align: center;
    }
    .overlay-btn--add  { color: #27ae60; }
    .overlay-btn--drop { color: #c0392b; }
    .overlay-btn--alt  { color: #2471a3; }
    .overlay-btn--cant { color: #c0392b; cursor: default; opacity: 0.7; }
    .available-card__photo-wrap {
      position: relative;
      z-index: 1;
    }
    .available-card__body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0.3rem 0.4rem;
      position: relative;
      z-index: 1;
    }
    .available-card__name {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }
    .available-card__firstname {
      font-size: 0.78rem;
      font-weight: 500;
    }
    .available-card__lastname {
      font-size: 0.875rem;
      font-weight: 600;
    }
    .available-card__stance {
      font-size: 0.68rem;
      margin-top: 0.1rem;
    }
    .available-card__footer {
      margin-top: 0.1rem;
    }
    .available-card__price {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-charcoal);
    }
    @media (max-width: 900px) {
      .team-layout { grid-template-columns: 1fr; }
      .roster-slot--empty { height: 88px; }
    }
  </style>
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, requireAuth, getCurrentUser } from "./js/auth.js";
    import { getSurfers, getCurrentEventForTour, getTeam, saveTeam, getPreviousTeam, getEventFresh } from "./js/db.js";
    import { validateTeam, calculateRemaining, getTeamRules } from "./js/team.js";
    import { renderHeader, renderFooter, showLoading, formatSalary, formatSalaryFull, statusBadge, tradingBadge, toast } from "./js/ui.js";

    const SEASON = 2026;

    // Working state
    let activeTour = new URLSearchParams(window.location.search).get("tour") || "mens";
    let roster = [];       // { surferId, purchasePrice }
    let alternate = null;  // { surferId, purchasePrice }
    let allSurfers = {};   // id → surfer doc
    let currentEvent = null;
    let existingTeam = null;
    let tradingOpen = true;

    initAuth();
    renderHeader();
    renderFooter();

    requireAuth().then(async (user) => {
      const main = document.getElementById("app-main");
      showLoading(main);
      await loadTeamPage(main, user);
    });

    async function loadTeamPage(container, user) {
      try {
        const [surfers, event] = await Promise.all([
          getSurfers(),
          getCurrentEventForTour(activeTour, SEASON)
        ]);

        surfers.forEach((s) => { allSurfers[s.id] = s; });
        currentEvent = event;

        // Reset working state when switching tours
        roster = [];
        alternate = null;

        if (!currentEvent) {
          renderTourTabs(container);
          container.innerHTML += `<div class="card"><p class="text-muted">No current ${activeTour === "womens" ? "Women's" : "Men's"} CT event. Check back when the season schedule is posted.</p></div>`;
          wireTourTabs(container, user);
          return;
        }

        // Always fetch fresh event data from Firestore to get accurate tradingOpen status.
        // The cached version from getEvents() may be stale (sessionStorage).
        const freshEvent = await getEventFresh(currentEvent.id);
        if (freshEvent) {
          currentEvent = { ...currentEvent, ...freshEvent };
        }
        tradingOpen = currentEvent.tradingOpen !== false;

        // Load existing team
        existingTeam = await getTeam(user.uid, currentEvent.id);
        if (existingTeam) {
          roster = [...existingTeam.surfers];
          alternate = existingTeam.alternate ? { ...existingTeam.alternate } : null;
        }

        renderTeamPage(container, user);
      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">My Team</h1>
          <div class="card">
            <p class="text-muted">Unable to load data. Check Firebase config.</p>
            <p class="text-muted text-sm mt-1">${err.message}</p>
          </div>
        `;
      }
    }

    function renderTeamPage(container, user) {
      const rules = getTeamRules(currentEvent.tour || "mens");
      const remaining = calculateRemaining(roster, currentEvent.tour || "mens");
      const spent = rules.salaryCap - remaining;
      const pct = Math.min((spent / rules.salaryCap) * 100, 100);
      const overCap = remaining < 0;
      const altCap = (currentEvent.tour || "mens") === "womens" ? 5_000_000 : 4_000_000;
      const altCapLabel = (currentEvent.tour || "mens") === "womens" ? "$5M" : "$4M";

      // Surfers on roster (by id)
      const onRoster = new Set(roster.map((s) => s.surferId));
      if (alternate) onRoster.add(alternate.surferId);

      // All surfers for this tour — selected ones shown greyed out
      const eventTour = currentEvent.tour || "mens";
      const available = Object.values(allSurfers)
        .filter((s) => (s.tour || "mens") === eventTour)
        .sort((a, b) => a.rank - b.rank);

      container.innerHTML = `
        <h1 class="page-title" style="margin-bottom:0">My Team</h1>
        <div class="tour-tabs mb-2">
          <button class="tour-tab ${activeTour === "mens" ? "tour-tab--active" : ""}" data-tour="mens">Men's CT</button>
          <button class="tour-tab ${activeTour === "womens" ? "tour-tab--active" : ""}" data-tour="womens">Women's CT</button>
        </div>
        <div class="flex-between mb-2">
          <p class="text-muted" style="margin:0">${currentEvent.name} — ${currentEvent.location || ""}</p>
          <div>${statusBadge(currentEvent.status)} ${tradingBadge(tradingOpen)}</div>
        </div>

        ${!tradingOpen ? `<div class="locked-banner mb-2">Trading is locked for this event. You cannot make changes until the event is completed.</div>` : ""}

        <!-- Side-by-side layout -->
        <div class="team-layout">

          <!-- LEFT: Roster -->
          <div class="card team-layout__roster">
            <div class="card__header">
              <span class="card__title">Your Roster (${roster.length}/${rules.rosterSize})</span>
            </div>
            <div class="roster-grid" id="roster-list">
              ${roster.map((s, i) => {
                const data = allSurfers[s.surferId] || {};
                const photo = data.photoUrl
                  ? `<img src="${data.photoUrl}" class="surfer-photo--sm" alt="">`
                  : `<div class="surfer-photo--sm surfer-photo--empty">${(data.name || "?")[0]}</div>`;
                const marketVal = data.value || s.purchasePrice;
                const delta = marketVal - s.purchasePrice;
                const deltaHtml = delta !== 0
                  ? `<span class="price-delta ${delta > 0 ? "price-delta--up" : "price-delta--down"}">${delta > 0 ? "▲" : "▼"} ${formatSalary(Math.abs(delta))}</span>`
                  : "";
                return `<div class="surfer-row" ${tradingOpen ? `draggable="true" data-roster-index="${i}" style="cursor:grab"` : ""}>
                  ${photo}
                  <div class="surfer-row__info">
                    <span class="surfer-row__name">${data.name || s.surferId.replace(/-/g, " ")}</span>
                    <span class="surfer-row__meta">#${data.rank || "—"} &middot; ${formatSalary(s.purchasePrice)} ${deltaHtml}</span>
                  </div>
                  <span class="surfer-row__action">
                    ${tradingOpen ? `<button class="btn btn--danger btn--icon" data-drop="${s.surferId}" title="Drop">&times;</button>` : ""}
                  </span>
                </div>`;
              }).join("")}
              ${Array.from({ length: rules.rosterSize - roster.length }, () => `<div class="roster-slot--empty"></div>`).join("")}
            </div>

            <!-- Alternate -->
            <div class="mt-3" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
              <div style="flex-shrink:0">
                <span class="text-sm" style="font-weight:600">Alternate</span>
                <span class="text-xs text-muted" style="display:block">Under ${altCapLabel} · excl. from cap</span>
              </div>
              <div id="alternate-slot" style="flex:1;min-width:160px;min-height:52px;display:flex;align-items:center">
                ${alternate ? (() => {
                  const altData = allSurfers[alternate.surferId] || {};
                  const altPhoto = altData.photoUrl
                    ? `<img src="${altData.photoUrl}" class="surfer-photo--sm" alt="">`
                    : `<div class="surfer-photo--sm surfer-photo--empty">${(altData.name || "?")[0]}</div>`;
                  return `<div class="surfer-row surfer-row--alternate" style="width:100%">
                    ${altPhoto}
                    <div class="surfer-row__info">
                      <span class="surfer-row__name">${altData.name || alternate.surferId.replace(/-/g, " ")}</span>
                      <span class="surfer-row__meta">ALT &middot; ${formatSalary(alternate.purchasePrice)}</span>
                    </div>
                    <span class="surfer-row__action">
                      ${tradingOpen ? `<button class="btn btn--danger btn--icon" data-drop-alt title="Drop">&times;</button>` : ""}
                    </span>
                  </div>`;
                })() : `<p class="text-muted text-sm">${tradingOpen ? "Drag a surfer under $4M here." : "No alternate."}</p>`}
              </div>
            </div>

            <!-- Actions -->
            ${tradingOpen ? `
              <div class="form-actions" style="margin-top:0.75rem">
                <button class="btn btn--outline btn--sm" id="btn-revert">Revert</button>
                <button class="btn btn--primary btn--sm" id="btn-save">Save Team</button>
              </div>
              <p class="text-xs text-muted" style="margin-top:0.4rem">Revert loads your roster from the last completed event.</p>
            ` : ""}
          </div>

          <!-- RIGHT: Available surfers -->
          <div class="card">
            <div class="salary-bar" style="margin-top:0;margin-bottom:0.75rem">
              <div class="salary-bar__header">
                <span>Salary Cap: ${formatSalaryFull(spent)} / ${formatSalaryFull(rules.salaryCap)}</span>
                <span>Remaining: <strong style="color:${overCap ? "#c0392b" : "inherit"}">${formatSalaryFull(Math.abs(remaining))}${overCap ? " OVER" : ""}</strong></span>
              </div>
              <div class="salary-bar__track">
                <div class="salary-bar__fill ${overCap ? "salary-bar__fill--over" : pct > 90 ? "salary-bar__fill--warn" : ""}" style="width:${pct}%"></div>
              </div>
            </div>
            <div class="surfer-list surfer-list--grid" id="available-list">
              ${renderAvailable(available, onRoster, alternate?.surferId, remaining, altCap)}
            </div>
          </div>

        </div>
      `;

      // Wire up event handlers
      wireEvents(container, user);
      wireTourTabs(container, user);
    }

    function renderAvailable(surfers, onRoster, altSurferId, remaining, altCap = 4_000_000) {
      if (surfers.length === 0) return `<p class="text-muted text-sm">No surfers available.</p>`;
      return surfers.map((s) => {
        const isAlt = s.id === altSurferId;
        const isOnRoster = !isAlt && onRoster?.has(s.id);
        const isSelected = isOnRoster || isAlt;
        const isUnaffordable = !isSelected && (s.value > remaining);
        const rowClass = isSelected ? " surfer-row--selected" : isUnaffordable ? " surfer-row--unaffordable" : "";
        const photoEl = s.photoUrl
          ? `<img src="${s.photoUrl}" class="available-card__photo" alt="">`
          : `<div class="available-card__photo--empty">${(s.name || "?")[0]}</div>`;
        const overlayButtons = !tradingOpen ? "" : (
          isAlt
            ? `<button class="overlay-btn overlay-btn--drop" data-drop-alt>− Remove Alt</button>`
            : isOnRoster
              ? `<button class="overlay-btn overlay-btn--drop" data-drop="${s.id}">− Drop</button>`
              : isUnaffordable
                ? `<button class="overlay-btn overlay-btn--cant" disabled>Can't Afford</button>
                   ${s.value < altCap ? `<button class="overlay-btn overlay-btn--alt" data-add-alt="${s.id}" data-value="${s.value}">+ ALT</button>` : ""}`
                : `<button class="overlay-btn overlay-btn--add" data-add="${s.id}" data-value="${s.value}">+ Add</button>
                   ${s.value < altCap ? `<button class="overlay-btn overlay-btn--alt" data-add-alt="${s.id}" data-value="${s.value}">+ ALT</button>` : ""}`
        );
        const isInjured = s.status === "injured";
        const cardAction = !tradingOpen ? "" : isAlt ? `data-card-drop-alt` : isOnRoster ? `data-card-drop="${s.id}"` : isUnaffordable ? "" : `data-card-add="${s.id}" data-card-value="${s.value}"`;
        return `
          <div class="surfer-row available-card${rowClass}" data-bracket="${s.priceBracket || ""}"
            ${tradingOpen && !isSelected && !isUnaffordable ? `draggable="true" data-surfer-id="${s.id}" data-surfer-value="${s.value}" data-surfer-bracket="${s.priceBracket || ""}"` : ""}
            ${cardAction} ${tradingOpen && !isUnaffordable ? 'style="cursor:pointer' + (isInjured ? ';position:relative;overflow:hidden"' : '"') : (isInjured ? 'style="position:relative;overflow:hidden"' : "")}
            ${isInjured ? 'data-injured="true"' : ""}>
            ${isInjured ? `<div style="position:absolute;inset:0;background:rgba(180,40,40,0.18);z-index:4;pointer-events:none"></div>
            <div style="position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden">
              <div style="position:absolute;top:50%;left:0;right:0;transform:translateY(-50%) rotate(-25deg);background:rgba(200,30,30,0.85);color:#fff;font-weight:800;font-size:0.85rem;letter-spacing:0.15em;text-align:center;padding:0.2rem 0;white-space:nowrap">INJ</div>
            </div>` : ""}
            <div class="available-card__photo-wrap">
              ${photoEl}
              <div class="available-card__overlay">${overlayButtons}</div>
            </div>
            <div class="available-card__body">
              ${(() => {
                const parts = s.name.trim().split(' ');
                const last = parts.length > 1 ? parts.pop() : '';
                const first = parts.join(' ');
                return `<span class="available-card__name">
                  <span class="available-card__firstname">${first}</span>
                  <span class="available-card__lastname">${last || s.name}</span>
                </span>`;
              })()}
              ${s.stance ? `<span class="available-card__stance">${s.stance === "goofy" ? "Goofy" : "Regular"}</span>` : ""}
              <div class="available-card__footer">
                <span class="available-card__price">${formatSalary(s.value)}</span>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function wireEvents(container, user) {
      // Drop from roster
      container.querySelectorAll("[data-drop]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.drop;
          roster = roster.filter((s) => s.surferId !== id);
          renderTeamPage(container, user);
        });
      });

      // Drop alternate
      container.querySelectorAll("[data-drop-alt]").forEach((btn) => {
        btn.addEventListener("click", () => {
          alternate = null;
          renderTeamPage(container, user);
        });
      });

      // Add to roster
      container.querySelectorAll("[data-add]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.add;
          const value = parseInt(btn.dataset.value, 10);
          const rules = getTeamRules(currentEvent.tour || "mens");
          if (roster.length >= rules.rosterSize) {
            toast("Roster is full. Drop a surfer first.", "error");
            return;
          }
          roster.push({ surferId: id, purchasePrice: value });
          renderTeamPage(container, user);
        });
      });

      // Add as alternate
      container.querySelectorAll("[data-add-alt]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.addAlt;
          const value = parseInt(btn.dataset.value, 10);
          alternate = { surferId: id, purchasePrice: value };
          renderTeamPage(container, user);
        });
      });

      // Card-level click: add surfer
      container.querySelectorAll("[data-card-add]").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("button")) return; // let button handlers handle it
          const id = card.dataset.cardAdd;
          const value = parseInt(card.dataset.cardValue, 10);
          const rules = getTeamRules(currentEvent.tour || "mens");
          if (roster.length >= rules.rosterSize) {
            toast("Roster is full. Drop a surfer first.", "error");
            return;
          }
          roster.push({ surferId: id, purchasePrice: value });
          renderTeamPage(container, user);
        });
      });

      // Card-level click: drop surfer
      container.querySelectorAll("[data-card-drop]").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("button")) return;
          const id = card.dataset.cardDrop;
          roster = roster.filter((s) => s.surferId !== id);
          renderTeamPage(container, user);
        });
      });

      // Card-level click: drop alternate
      container.querySelectorAll("[data-card-drop-alt]").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("button")) return;
          alternate = null;
          renderTeamPage(container, user);
        });
      });

      // Reorder within roster
      if (tradingOpen) {
        let dragSrcIndex = null;
        container.querySelectorAll("#roster-list .surfer-row[data-roster-index]").forEach((row) => {
          row.addEventListener("dragstart", (e) => {
            dragSrcIndex = parseInt(row.dataset.rosterIndex, 10);
            e.dataTransfer.setData("application/x-roster-index", dragSrcIndex);
            e.dataTransfer.effectAllowed = "move";
            row.classList.add("surfer-row--dragging");
          });
          row.addEventListener("dragend", () => {
            row.classList.remove("surfer-row--dragging");
            container.querySelectorAll(".surfer-row--drag-over").forEach((r) => r.classList.remove("surfer-row--drag-over"));
          });
          row.addEventListener("dragover", (e) => {
            if (dragSrcIndex === null) return; // not a reorder drag, let it bubble
            e.preventDefault();
            e.stopPropagation();
            e.dataTransfer.dropEffect = "move";
            row.classList.add("surfer-row--drag-over");
          });
          row.addEventListener("dragleave", () => {
            row.classList.remove("surfer-row--drag-over");
          });
          row.addEventListener("drop", (e) => {
            e.preventDefault();
            if (dragSrcIndex === null) return; // not a reorder, let roster-list handler take it
            e.stopPropagation();
            row.classList.remove("surfer-row--drag-over");
            const targetIndex = parseInt(row.dataset.rosterIndex, 10);
            if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
            const newRoster = [...roster];
            const [moved] = newRoster.splice(dragSrcIndex, 1);
            newRoster.splice(targetIndex, 0, moved);
            roster = newRoster;
            dragSrcIndex = null;
            renderTeamPage(container, user);
          });
        });
      }

      // Drag from available list
      if (tradingOpen) {
        container.querySelectorAll("#available-list .surfer-row[draggable]").forEach((row) => {
          row.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("application/json", JSON.stringify({
              id: row.dataset.surferId,
              value: parseInt(row.dataset.surferValue, 10),
              bracket: row.dataset.surferBracket
            }));
            e.dataTransfer.effectAllowed = "copy";
            row.classList.add("surfer-row--dragging");
          });
          row.addEventListener("dragend", () => {
            row.classList.remove("surfer-row--dragging");
          });
        });

        // Drop on roster list
        const rosterList = container.querySelector("#roster-list");
        rosterList.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "copy";
          rosterList.classList.add("drop-zone--over");
        });
        rosterList.addEventListener("dragleave", () => {
          rosterList.classList.remove("drop-zone--over");
        });
        rosterList.addEventListener("drop", (e) => {
          e.preventDefault();
          rosterList.classList.remove("drop-zone--over");
          try {
            const { id, value } = JSON.parse(e.dataTransfer.getData("application/json"));
            const rules = getTeamRules(currentEvent.tour || "mens");
            if (roster.length >= rules.rosterSize) {
              toast("Roster is full. Drop a surfer first.", "error");
              return;
            }
            if (roster.some((s) => s.surferId === id) || alternate?.surferId === id) return;
            roster.push({ surferId: id, purchasePrice: value });
            renderTeamPage(container, user);
          } catch {}
        });

        // Drop on alternate slot
        const altSlot = container.querySelector("#alternate-slot");
        altSlot.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "copy";
          altSlot.classList.add("drop-zone--over");
        });
        altSlot.addEventListener("dragleave", () => {
          altSlot.classList.remove("drop-zone--over");
        });
        altSlot.addEventListener("drop", (e) => {
          e.preventDefault();
          altSlot.classList.remove("drop-zone--over");
          try {
            const { id, value, bracket } = JSON.parse(e.dataTransfer.getData("application/json"));
            if (parseInt(value) >= altCap) {
              toast(`Alternate must be under ${altCapLabel}.`, "error");
              return;
            }
            if (roster.some((s) => s.surferId === id)) return;
            alternate = { surferId: id, purchasePrice: value };
            renderTeamPage(container, user);
          } catch {}
        });
      }

      // Search
      document.getElementById("surfer-search")?.addEventListener("input", (e) => {
        filterAvailable(container);
      });
      document.getElementById("bracket-filter")?.addEventListener("change", () => {
        filterAvailable(container);
      });

      // Revert
      document.getElementById("btn-revert")?.addEventListener("click", async () => {
        if (!currentEvent) return;
        const tour = currentEvent.tour || "mens";
        const prev = await getPreviousTeam(user.uid, currentEvent.id, tour, SEASON);
        if (!prev) {
          toast("No previous event team to revert to.", "info");
          return;
        }
        roster = [...prev.surfers];
        alternate = prev.alternate ? { ...prev.alternate } : null;
        renderTeamPage(container, user);
        toast("Team reverted to last event's roster.", "success");
      });

      // Save
      document.getElementById("btn-save")?.addEventListener("click", async () => {
        const tour = currentEvent.tour || "mens";
        const rules = getTeamRules(tour);
        const validation = validateTeam(roster, alternate, tour, allSurfers);
        if (!validation.valid) {
          validation.errors.forEach((err) => toast(err, "error", 5000));
          return;
        }

        // Re-check trading status from Firestore RIGHT NOW before saving.
        // This prevents saves even if the page loaded with stale cached data.
        try {
          const liveEvent = await getEventFresh(currentEvent.id);
          if (!liveEvent || liveEvent.tradingOpen === false) {
            tradingOpen = false;
            toast("Trading has been locked for this event. Your changes were NOT saved.", "error", 8000);
            renderTeamPage(container, user);
            return;
          }
        } catch (err) {
          toast("Unable to verify trading status. Please try again.", "error");
          return;
        }

        const totalSpent = roster.reduce((sum, s) => sum + s.purchasePrice, 0);
        try {
          await saveTeam(user.uid, currentEvent.id, {
            season: SEASON,
            tour,
            surfers: roster,
            alternate,
            totalSpent,
            salaryCap: rules.salaryCap,
            locked: false,
            carriedForward: false
          });
          toast("Team saved!", "success");
        } catch (err) {
          toast("Failed to save: " + err.message, "error");
        }
      });
    }

    function renderTourTabs(container) {
      container.innerHTML = `
        <div class="flex-between mb-2">
          <h1 class="page-title" style="margin-bottom:0">My Team</h1>
        </div>
        <div class="tour-tabs mb-3">
          <button class="tour-tab ${activeTour === "mens" ? "tour-tab--active" : ""}" data-tour="mens">Men's CT</button>
          <button class="tour-tab ${activeTour === "womens" ? "tour-tab--active" : ""}" data-tour="womens">Women's CT</button>
        </div>
      `;
    }

    function wireTourTabs(container, user) {
      container.querySelectorAll(".tour-tab").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (btn.dataset.tour === activeTour) return;
          activeTour = btn.dataset.tour;
          const main = document.getElementById("app-main");
          showLoading(main);
          await loadTeamPage(main, user);
        });
      });
    }

    function filterAvailable(container) {
      const search = (document.getElementById("surfer-search")?.value || "").toLowerCase();
      const bracket = document.getElementById("bracket-filter")?.value || "";
      const rows = container.querySelectorAll("#available-list .surfer-row");
      rows.forEach((row) => {
        const name = row.querySelector(".surfer-row__name")?.textContent.toLowerCase() || "";
        const rb = row.dataset.bracket || "";
        const matchSearch = !search || name.includes(search);
        const matchBracket = !bracket || rb === bracket;
        row.style.display = (matchSearch && matchBracket) ? "" : "none";
      });
    }
  </script>
</body>
</html>
