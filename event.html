<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Results — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <script>/* Theme: set data-theme before first paint to avoid a flash. Mirrors js/theme.js. */(function(){try{var t=localStorage.getItem("fsl-theme");var d=t==="dark"||((!t||t==="system")&&matchMedia("(prefers-color-scheme: dark)").matches);document.documentElement.setAttribute("data-theme",d?"dark":"light");}catch(e){}})();</script>
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="icon" type="image/png" href="img/Fsurf_logo_white.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { SEASON } from "./js/config.js";
    import { getEvent, getResults, getTeam, getSurfers, getLeaderboard } from "./js/db.js";
    import { scoreTeam, projectTeam, isInProgress, getPoints } from "./js/scoring.js";
    import { bootstrapPage, formatDate, statusBadge, escapeHtml } from "./js/ui.js";


    bootstrapPage({ auth: "user", onUnauth: "redirect", render: async ({ main, user }) => {

      const params = new URLSearchParams(window.location.search);
      const eventId = params.get("id");

      if (!eventId) {
        main.innerHTML = `<h1 class="page-title">Event</h1><div class="card"><p class="text-muted">No event specified. Go to the <a href="index.html">dashboard</a>.</p></div>`;
        return;
      }

      try {
        const [event, results, surfers, userTeam] = await Promise.all([
          getEvent(eventId),
          getResults(eventId),
          getSurfers(),
          getTeam(user.uid, eventId)
        ]);

        if (!event) {
          main.innerHTML = `<h1 class="page-title">Event Not Found</h1><div class="card"><p class="text-muted">This event does not exist. <a href="index.html">Back to dashboard</a>.</p></div>`;
          return;
        }

        const tour = event.tour || "mens";
        const surferMap = {};
        surfers.forEach((s) => { surferMap[s.id] = s; });

        results.sort((a, b) => (a.finish || 999) - (b.finish || 999));

        // While the event is live, surfers still competing have no result yet,
        // so scoreTeam would credit them 0 and the score reads upside-down.
        // Show a projected score (locked-in points + each still-alive surfer's
        // guaranteed-minimum floor) instead — but only once at least one surfer
        // has been eliminated to anchor the field size; before that there's
        // nothing to project from.
        const hasElimination = results.some((r) => !r.withdrawn && Number.isFinite(r.finish));
        const inProgress = isInProgress(event) && hasElimination;

        // Score only the current user's team
        const myScore = userTeam
          ? (inProgress ? projectTeam(userTeam, results, tour, event.fieldSize ?? null) : scoreTeam(userTeam, results, tour))
          : null;

        // Highlight user's surfers in results table
        const userSurferIds = new Set();
        if (userTeam) {
          userTeam.surfers.forEach((s) => userSurferIds.add(s.surferId));
          if (userTeam.alternate) userSurferIds.add(userTeam.alternate.surferId);
        }

        // Derive rank from the cached leaderboard eventScores (free — already in
        // localStorage). For a live event those stored scores are the projected
        // (floor) totals, computed the same way as myScore, so this ranks
        // projection-vs-projection consistently.
        let myRank = null, totalPlayers = null;
        try {
          const leaderboard = await getLeaderboard(SEASON, tour);
          const withScore = leaderboard.filter((e) => e.eventScores?.[eventId] != null);
          if (withScore.length > 0 && myScore) {
            totalPlayers = withScore.length;
            myRank = withScore.filter((e) => e.eventScores[eventId] > myScore.totalPoints).length + 1;
          }
        } catch {}

        main.innerHTML = `
          <div class="flex-between mb-2">
            <h1 class="page-title" style="margin-bottom:0">${escapeHtml(event.name)}</h1>
            ${statusBadge(event.status)}
          </div>
          <p class="text-muted mb-1">${escapeHtml(event.location || "")}</p>
          <p class="text-sm text-muted mb-3">${formatDate(event.startDate)} — ${formatDate(event.endDate)}</p>

          <div class="grid grid--sidebar">
            <!-- Event Results -->
            <div>
              <div class="card mb-3">
                <div class="card__header"><span class="card__title">Event Results</span></div>
                ${results.length > 0 ? `
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th scope="col">Pos</th><th scope="col">Surfer</th><th scope="col">Country</th><th scope="col" class="text-right">Points</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${results.map((r) => {
                        const s = surferMap[r.surferId] || {};
                        return `<tr class="${userSurferIds.has(r.surferId) ? "highlight" : ""}">
                          <td class="text-center"><strong>${r.finish}</strong></td>
                          <td>${escapeHtml(s.name || r.surferId.replace(/-/g, " "))}</td>
                          <td class="text-muted">${escapeHtml(s.country || "")}</td>
                          <td class="text-right">${r.points || getPoints(r.finish, tour)}</td>
                        </tr>`;
                      }).join("")}
                    </tbody>
                  </table>
                ` : `<p class="text-muted">No results entered yet.</p>`}
              </div>
            </div>

            <!-- Your Score -->
            <div>
              <div class="card">
                <div class="card__header"><span class="card__title">${inProgress ? "Projected Score" : "Your Score"}</span>${inProgress ? `<span class="text-xs text-muted">live</span>` : ""}</div>
                ${!userTeam ? `<p class="text-muted text-sm">No team submitted for this event.</p>` : !myScore ? `<p class="text-muted text-sm">No results yet.</p>` : `
                  ${myRank != null ? `
                    <div style="text-align:center;padding:0.75rem 0 1rem">
                      <div style="font-size:2rem;font-weight:700;color:var(--text)">${inProgress ? "~" : ""}${myScore.totalPoints}</div>
                      <div class="text-sm text-muted">${inProgress ? "projected pts" : "pts"}</div>
                      <div style="margin-top:0.4rem;font-size:0.85rem;color:var(--color-warm-brown)">
                        ${myRank}${myRank === 1 ? "st" : myRank === 2 ? "nd" : myRank === 3 ? "rd" : "th"} of ${totalPlayers}
                      </div>
                    </div>
                    <div style="border-top:1px solid var(--color-beige);padding-top:0.75rem">
                  ` : `<div style="padding:0.5rem 0">`}
                  <div class="surfer-list">
                    ${myScore.surferScores.map((ss) => {
                      const s = surferMap[ss.surferId] || {};
                      return `<div class="surfer-row">
                        <span class="surfer-row__name">
                          ${escapeHtml(s.name || ss.surferId.replace(/-/g, " "))}
                          ${ss.isAlternate ? `<span class="text-xs text-muted"> ALT</span>` : ""}
                          ${ss.didNotCompete ? `<span class="text-xs text-muted"> DNP</span>` : ""}
                          ${ss.projected ? `<span class="text-xs text-muted" title="Still competing — guaranteed-minimum (floor) points"> · still in</span>` : ""}
                        </span>
                        <span class="surfer-row__value${ss.didNotCompete ? " text-muted" : ""}">${ss.projected ? "~" : ""}${ss.points} pts</span>
                      </div>`;
                    }).join("")}
                  </div>
                  <div style="border-top:1px solid var(--color-beige);margin-top:0.5rem;padding-top:0.5rem;display:flex;justify-content:space-between;align-items:center">
                    <span style="font-weight:600">${inProgress ? "Projected Total" : "Total"}</span>
                    <span style="font-weight:700">${inProgress ? "~" : ""}${myScore.totalPoints} pts${myScore.alternateUsed ? " *" : ""}</span>
                  </div>
                  ${myScore.alternateUsed ? `<p class="text-xs text-muted mt-1">* alternate used</p>` : ""}
                  ${inProgress ? `<p class="text-xs text-muted mt-1">Live floor: locked-in points for eliminated surfers plus the guaranteed minimum for those still competing. Your final score can only climb from here.</p>` : ""}
                  </div>
                  <div class="mt-2">
                    <a href="standings.html" class="btn btn--outline btn--sm" style="width:100%;text-align:center">Full Standings →</a>
                  </div>
                `}
              </div>
            </div>
          </div>

          <div class="mt-3">
            <a href="index.html" class="btn btn--outline">&larr; Back to Dashboard</a>
          </div>
        `;
      } catch (err) {
        main.innerHTML = `<h1 class="page-title">Error</h1><div class="card"><p class="text-muted">${escapeHtml(err.message)}</p></div>`;
      }
    }});
  </script>
</body>
</html>
