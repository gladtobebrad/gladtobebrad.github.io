<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="icon" type="image/png" href="img/Fsurf_logo_white.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { SEASON } from "./js/config.js";
    import { getLeaderboard, getEvents, getPlayerDirectory } from "./js/db.js";
    import { isInProgress } from "./js/scoring.js";
    import { bootstrapPage, escapeHtml } from "./js/ui.js";
    import { renderStandingsTable, wireStandingsTables } from "./js/standings-table.js";

    let scoringMode = "best9"; // "best9" or "all"

    bootstrapPage({ auth: "user", render: ({ main, user }) => renderPage(main, user) });

    async function renderPage(container, user) {
      try {
        const [mensLb, womensLb, events, directory] = await Promise.all([
          getLeaderboard(SEASON, "mens"),
          getLeaderboard(SEASON, "womens"),
          getEvents(SEASON),
          getPlayerDirectory()
        ]);
        // Avatars live in the player directory (1 cached read), not the
        // leaderboard snapshot — map them in so standings shows real photos
        // (first preference, initial fallback) like the clubhouse table.
        const dirAvatars = {};
        for (const u of directory) if (u.avatarUrl) dirAvatars[u.id] = u.avatarUrl;

        // All season events per tour, sorted by eventNumber (upcoming events
        // show as empty columns, matching the clubhouse event-by-event table)
        const mensEvents = events
          .filter(e => (e.tour || "mens") === "mens")
          .sort((a, b) => a.eventNumber - b.eventNumber);
        const womensEvents = events
          .filter(e => (e.tour || "") === "womens")
          .sort((a, b) => a.eventNumber - b.eventNumber);

        // Pre-season (no leaderboard yet): the directory roster is the fallback.
        const allUsers = directory;

        // The leaderboard already stores projected scores for in-progress
        // events (the admin recalc uses projectTeam for live events); we only
        // need to know which event columns are live so they can be styled as
        // projected estimates rather than final numbers.
        const inProgressIds = new Set(
          events.filter(e => isInProgress(e) && e.resultsEntered).map(e => e.id)
        );

        function buildStandings(lb) {
          if (lb.length) {
            const key = scoringMode === "all" ? "allEventsTotal" : "bestNineTotal";
            lb.sort((a, b) => (b[key] || 0) - (a[key] || 0));
            return lb.map((entry, i) => ({
              id: entry.userId,
              rank: i + 1,
              displayName: entry.displayName || "Anonymous",
              teamName: entry.teamName || entry.displayName || "—",
              avatarUrl: dirAvatars[entry.userId] || entry.avatarUrl || "",
              bestNineTotal: entry.bestNineTotal || 0,
              allEventsTotal: entry.allEventsTotal || 0,
              eventsPlayed: entry.eventsPlayed || 0,
              eventScores: entry.eventScores || {}
            }));
          }
          // Pre-season fallback: show all users with no scores
          return (allUsers || []).map((u, i) => ({
            id: u.id,
            rank: i + 1,
            displayName: u.displayName || "Anonymous",
            teamName: u.teamName || u.displayName || "—",
            avatarUrl: u.avatarUrl || u.photoUrl || "",
            bestNineTotal: 0,
            allEventsTotal: 0,
            eventsPlayed: 0,
            eventScores: {}
          }));
        }

        const mensPlayers = buildStandings(mensLb);
        const womensPlayers = buildStandings(womensLb);

        container.innerHTML = `
          <h1 class="page-title">Standings</h1>
          <div class="standings-controls" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem">
            <div class="tour-tabs" style="margin-bottom:0;border-bottom-width:1px">
              <button class="tour-tab tour-tab--active" data-tour="mens" style="padding:0.35rem 1rem;font-size:0.85rem">Men's CT</button>
              <button class="tour-tab" data-tour="womens" style="padding:0.35rem 1rem;font-size:0.85rem">Women's CT</button>
            </div>
            <input type="search" id="player-search" placeholder="Search players..." style="width:240px;min-width:160px;max-width:280px;margin-left:auto;padding:0.4rem 0.75rem;border:1px solid var(--color-beige);border-radius:6px;font-size:0.9rem;outline:none;">
            <div style="display:flex;border:1px solid var(--color-beige);border-radius:6px;overflow:hidden;font-size:0.8rem">
              <button class="scoring-toggle" data-mode="best9" style="padding:0.3rem 0.7rem;border:none;cursor:pointer;font-family:inherit;${scoringMode === "best9" ? "background:var(--color-sage);color:#fff;font-weight:600" : "background:var(--color-warm-white);color:var(--color-warm-brown)"}">Best 9</button>
              <button class="scoring-toggle" data-mode="all" style="padding:0.3rem 0.7rem;border:none;border-left:1px solid var(--color-beige);cursor:pointer;font-family:inherit;${scoringMode === "all" ? "background:var(--color-sage);color:#fff;font-weight:600" : "background:var(--color-warm-white);color:var(--color-warm-brown)"}">All Events</button>
            </div>
          </div>
          <div id="panel-mens" class="card mb-3">
            ${renderStandingsTable({ players: mensPlayers, tourEvents: mensEvents, scoringMode, liveEventIds: inProgressIds, highlightUserId: user.uid, tableId: "table-mens" })}
          </div>
          <div id="panel-womens" class="card mb-3" style="display:none">
            ${renderStandingsTable({ players: womensPlayers, tourEvents: womensEvents, scoringMode, liveEventIds: inProgressIds, highlightUserId: user.uid, tableId: "table-womens" })}
          </div>
        `;

        wireStandingsTables(container);

        // Tour toggle
        const panelMens = document.getElementById("panel-mens");
        const panelWomens = document.getElementById("panel-womens");
        container.querySelectorAll(".tour-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            container.querySelectorAll(".tour-tab").forEach((b) => b.classList.remove("tour-tab--active"));
            btn.classList.add("tour-tab--active");
            const isMens = btn.dataset.tour === "mens";
            panelMens.style.display = isMens ? "" : "none";
            panelWomens.style.display = isMens ? "none" : "";
          });
        });

        // Scoring mode toggle
        container.querySelectorAll(".scoring-toggle").forEach((btn) => {
          btn.addEventListener("click", () => {
            scoringMode = btn.dataset.mode;
            renderPage(container, user);
          });
        });

        // Search — filters active table
        document.getElementById("player-search").addEventListener("input", (e) => {
          const q = e.target.value.toLowerCase().trim();
          container.querySelectorAll("tbody tr").forEach(row => {
            row.style.display = !q || row.dataset.search.includes(q) ? "" : "none";
          });
        });

      } catch (err) {
        container.innerHTML = `
          <h1 class="page-title">Standings</h1>
          <div class="card"><p class="text-muted">Unable to load data. ${escapeHtml(err.message)}</p></div>
        `;
      }
    }
  </script>
</body>
</html>
