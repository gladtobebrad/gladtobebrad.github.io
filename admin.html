<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, requireAdmin } from "./js/auth.js";
    import {
      getAllSurfers, saveSurfer, deleteSurfer,
      getEvents, getCurrentEventForTour, saveEvent, deleteEvent,
      getResults, saveResultsBatch, clearResults,
      getTeamsForEvent, lockTeamsForEvent, carryForwardTeams, clearAllTeams,
      touchLeaderboardVersion,
      savePlayerDirectory, getAllUsers,
      getAllClubs, deleteClub,
      getSiteConfig, saveSiteConfig
    } from "./js/db.js";
    import { scoreTeam, getPoints, getMaxFinishPosition, calculateSeasonStandings } from "./js/scoring.js";
    import { renderHeader, renderFooter, showLoading, toast, formatSalary, formatDate, confirmModal, resolveCountdownState, startCountdownTimer, fetchLiveStatusCached, renderLiveStatusBanner } from "./js/ui.js";
    import { db } from "./js/firebase-config.js";
    import { collection, doc, getDocs, query, where, writeBatch } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
    import { fetchSchedule, pickTargetVenue, discoverGenders, scrapeEventForGender } from "./js/wsl-scrape.js";
    import { buildSurferIndex, resolveSurfer, computeFinishPositions } from "./js/wsl-resolve.js";

    const SEASON = 2026;
    let surfers = [];
    let events = [];
    let users = [];
    let clubs = [];
    let activeTab = "events";
    let activeSurferTour = "mens";

    initAuth();
    renderHeader();
    renderFooter();

    requireAdmin().then(async (user) => {
      const main = document.getElementById("app-main");
      showLoading(main);
      await loadAdmin(main);
    });

    async function loadAdmin(container) {
      try {
        [surfers, events, users] = await Promise.all([
          getAllSurfers(),
          getEvents(SEASON),
          getAllUsers()
        ]);
        try { clubs = await getAllClubs(); } catch { clubs = []; }
      } catch (err) {
        container.innerHTML = `<h1>Admin Panel</h1><div class="card"><p class="text-muted">Error: ${err.message}</p></div>`;
        return;
      }
      renderAdmin(container);
    }

    function renderAdmin(container) {
      // Stop any running countdown-preview tick before re-rendering — the
      // element it points at is about to be replaced. Without this, dead
      // intervals accumulate every tab switch.
      if (window._countdownPreviewInterval) {
        clearInterval(window._countdownPreviewInterval);
        window._countdownPreviewInterval = null;
      }
      surfers.sort((a, b) => (a.rank || 999) - (b.rank || 999));
      events.sort((a, b) => (a.eventNumber || 0) - (b.eventNumber || 0));

      container.innerHTML = `
        <h1 class="page-title">Admin Panel</h1>

        <div class="tabs">
          <button class="tab-btn ${activeTab === "events" ? "active" : ""}" data-tab="events">Events</button>
          <button class="tab-btn ${activeTab === "surfers" ? "active" : ""}" data-tab="surfers">Surfers</button>
          <button class="tab-btn ${activeTab === "results" ? "active" : ""}" data-tab="results">Results</button>
          <button class="tab-btn ${activeTab === "players" ? "active" : ""}" data-tab="players">Players (${users.length})</button>
          <button class="tab-btn ${activeTab === "clubs" ? "active" : ""}" data-tab="clubs">Clubs (${clubs.length})</button>
        </div>

        <!-- EVENTS TAB -->
        <div class="tab-panel ${activeTab === "events" ? "active" : ""}" id="tab-events">
          <div>
              <div class="card mb-3">
                <div class="card__header">
                  <span class="card__title">Site Banners</span>
                </div>
                <div style="display:grid;grid-template-columns:120px minmax(0,1fr) 140px;gap:1rem;align-items:center;margin-bottom:0.6rem">
                  <span style="font-size:0.78rem;font-weight:600;color:var(--color-warm-gray)">Live Status</span>
                  <div id="live-status-preview" style="text-align:center;padding:0.4rem 1rem;background:rgba(33,122,60,0.12);font-size:0.85rem;color:var(--color-charcoal);border-radius:6px"></div>
                  <label class="toggle" id="toggle-live-status" style="justify-self:start">
                    <input type="checkbox">
                    <span class="toggle__track"></span>
                    <span class="toggle__label">Hidden</span>
                  </label>
                </div>
                <div style="display:grid;grid-template-columns:120px minmax(0,1fr) 140px;gap:1rem;align-items:center">
                  <span style="font-size:0.78rem;font-weight:600;color:var(--color-warm-gray)">Countdown</span>
                  <div id="countdown-preview" style="text-align:center;padding:0.4rem 1rem;background:rgba(192,57,43,0.12);font-size:0.85rem;color:var(--color-charcoal);border-radius:6px"></div>
                  <label class="toggle" id="toggle-banner" style="justify-self:start">
                    <input type="checkbox">
                    <span class="toggle__track"></span>
                    <span class="toggle__label">Hidden</span>
                  </label>
                </div>
                <p class="text-xs text-muted" style="margin:0.6rem 0 0">Live status takes priority — when WSL reports an active event, the countdown is hidden even if shown here.</p>
              </div>
              <div class="card">
                <div class="card__header">
                  <span class="card__title">${SEASON} Events</span>
                  <button class="btn btn--sm btn--primary" id="btn-add-event">+ Add Event</button>
                </div>
                ${events.length > 0 ? `
                  <table class="data-table">
                    <thead><tr><th>#</th><th>Name</th><th>Tour</th><th>Status</th><th>Trading</th><th></th></tr></thead>
                    <tbody>
                      ${events.map((e) => `
                        <tr>
                          <td>${e.eventNumber}</td>
                          <td>${e.name}</td>
                          <td>${e.tour === "womens" ? "W" : "M"}</td>
                          <td>
                            <select class="inline-select inline-select--status" data-status-event="${e.id}" data-current="${e.status}">
                              <option value="upcoming"${e.status === "upcoming" ? " selected" : ""}>Upcoming</option>
                              <option value="live"${e.status === "live" ? " selected" : ""}>Live</option>
                              <option value="completed"${e.status === "completed" ? " selected" : ""}>Completed</option>
                            </select>
                          </td>
                          <td>
                            <label class="toggle" data-toggle-trading="${e.id}">
                              <input type="checkbox" ${e.tradingOpen ? "checked" : ""}>
                              <span class="toggle__track"></span>
                              <span class="toggle__label">${e.tradingOpen ? "Open" : "Locked"}</span>
                            </label>
                          </td>
                          <td>
                            <button class="btn btn--sm btn--outline" data-edit-event="${e.id}">Edit</button>
                            <button class="btn btn--sm btn--danger" data-delete-event="${e.id}">Del</button>
                          </td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                ` : `<p class="text-muted">No events yet.</p>`}
              </div>
            </div>
          </div>

          <!-- Event Modal -->
          <div class="modal-overlay" id="event-modal" style="display:none">
            <div class="modal">
              <div class="modal__header">
                <span class="modal__title" id="event-form-title">Add Event</span>
                <button class="modal__close" id="event-modal-close">&times;</button>
              </div>
              <form id="event-form">
                <input type="hidden" id="event-edit-id">
                <div class="form-group">
                  <label class="form-label">Event ID (slug)</label>
                  <input class="form-input" id="event-id" placeholder="pipe-pro-2026" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Name</label>
                  <input class="form-input" id="event-name" placeholder="Billabong Pipeline Pro" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Location</label>
                  <input class="form-input" id="event-location" placeholder="Pipeline, Oahu">
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Event #</label>
                    <input class="form-input" id="event-number" type="number" min="1" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Tour</label>
                    <select class="form-select" id="event-tour">
                      <option value="both">Both (Men's + Women's)</option>
                      <option value="mens">Men's only</option>
                      <option value="womens">Women's only</option>
                    </select>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Start Date</label>
                    <input class="form-input" id="event-start" type="date" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">End Date</label>
                    <input class="form-input" id="event-end" type="date" required>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Trading Close Time</label>
                    <input class="form-input" id="event-trading-close" type="datetime-local">
                    <span class="text-xs text-muted">First call time. Used for countdown banner.</span>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Event Timezone</label>
                    <select class="form-select" id="event-timezone">
                      <option value="">— select —</option>
                      <option value="+12">NZST / FJT (UTC+12)</option>
                      <option value="+11">AEDT (UTC+11)</option>
                      <option value="+10">AEST (UTC+10)</option>
                      <option value="+8">AWST (UTC+8)</option>
                      <option value="+4">GST (UTC+4)</option>
                      <option value="+1">WEST (UTC+1)</option>
                      <option value="+0">WET (UTC+0)</option>
                      <option value="-3">BRT (UTC-3)</option>
                      <option value="-6">CST (UTC-6)</option>
                      <option value="-7">PDT (UTC-7)</option>
                      <option value="-10">TAHT (UTC-10)</option>
                    </select>
                  </div>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn--primary">Save Event</button>
                  <button type="button" class="btn btn--outline" id="event-modal-cancel">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- SURFERS TAB -->
        <div class="tab-panel ${activeTab === "surfers" ? "active" : ""}" id="tab-surfers">
          <div>
            <div class="card">
              <div class="card__header">
                <span class="card__title">Surfers</span>
                <button class="btn btn--sm btn--primary" id="btn-add-surfer">+ Add Surfer</button>
              </div>
              <div style="display:flex;gap:0.5rem;margin-bottom:1rem;border-bottom:1px solid var(--color-beige);padding-bottom:0">
                <button data-surfer-tour="mens" style="padding:0.4rem 1rem;border:none;background:none;cursor:pointer;font-size:0.875rem;font-weight:${activeSurferTour==="mens"?"600":"400"};color:${activeSurferTour==="mens"?"var(--color-charcoal)":"var(--color-sage)"};border-bottom:2px solid ${activeSurferTour==="mens"?"var(--color-charcoal)":"transparent"};margin-bottom:-1px">
                  Men's CT (${surfers.filter(s=>(s.tour||"mens")==="mens").length})
                </button>
                <button data-surfer-tour="womens" style="padding:0.4rem 1rem;border:none;background:none;cursor:pointer;font-size:0.875rem;font-weight:${activeSurferTour==="womens"?"600":"400"};color:${activeSurferTour==="womens"?"var(--color-charcoal)":"var(--color-sage)"};border-bottom:2px solid ${activeSurferTour==="womens"?"var(--color-charcoal)":"transparent"};margin-bottom:-1px">
                  Women's CT (${surfers.filter(s=>s.tour==="womens").length})
                </button>
              </div>
              <div>
                <table class="data-table">
                  <thead><tr><th>Rank</th><th>Name</th><th>Country</th><th>Value</th><th>Bracket</th><th>Status</th><th></th></tr></thead>
                  <tbody>
                    ${surfers.filter(s => (s.tour || "mens") === activeSurferTour).map((s) => `
                      ${(() => { const currentStatus = s.status || (s.active === false ? "inactive" : "active"); return `
                      <tr style="${currentStatus === "inactive" ? "opacity:0.5" : ""}">
                        <td>${s.rank || "—"}</td>
                        <td>${s.name}</td>
                        <td>${s.country || ""}</td>
                        <td>${formatSalary(s.value)}</td>
                        <td>
                          <select class="inline-select inline-select--bracket" data-bracket-surfer="${s.id}" data-current="${s.priceBracket || ""}">
                            <option value="elite"${s.priceBracket === "elite" ? " selected" : ""}>Elite</option>
                            <option value="high"${s.priceBracket === "high" ? " selected" : ""}>High</option>
                            <option value="mid"${s.priceBracket === "mid" ? " selected" : ""}>Mid</option>
                            <option value="low"${s.priceBracket === "low" ? " selected" : ""}>Low</option>
                            <option value="budget"${s.priceBracket === "budget" ? " selected" : ""}>Budget</option>
                          </select>
                        </td>
                        <td>
                          <select class="inline-select inline-select--surfer-status" data-status-surfer="${s.id}" data-current="${currentStatus}">
                            <option value="active"${currentStatus === "active" ? " selected" : ""}>Active</option>
                            <option value="injured"${currentStatus === "injured" ? " selected" : ""}>Injured</option>
                            <option value="inactive"${currentStatus === "inactive" ? " selected" : ""}>Inactive</option>
                          </select>
                        </td>
                        <td>
                          <button class="btn btn--sm btn--outline" data-edit-surfer="${s.id}">Edit</button>
                          <button class="btn btn--sm btn--danger" data-delete-surfer="${s.id}">Del</button>
                        </td>
                      </tr>`; })()}
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Surfer Modal -->
          <div class="modal-overlay" id="surfer-modal" style="display:none">
            <div class="modal">
              <div class="modal__header">
                <span class="modal__title" id="surfer-form-title">Add Surfer</span>
                <button class="modal__close" id="surfer-modal-close">&times;</button>
              </div>
              <form id="surfer-form">
                <input type="hidden" id="surfer-edit-id">
                <div class="form-group">
                  <label class="form-label">ID (slug)</label>
                  <input class="form-input" id="surfer-id" placeholder="john-john-florence" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Full Name</label>
                  <input class="form-input" id="surfer-name" placeholder="John John Florence" required>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Country</label>
                    <input class="form-input" id="surfer-country" placeholder="HAW" maxlength="5">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Rank</label>
                    <input class="form-input" id="surfer-rank" type="number" min="1">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Tour</label>
                  <select class="form-select" id="surfer-tour">
                    <option value="mens">Men's CT</option>
                    <option value="womens">Women's CT</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Value ($)</label>
                  <input class="form-input" id="surfer-value" type="number" min="0" step="250000" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Photo Path</label>
                  <input class="form-input" id="surfer-photo" placeholder="data/photos/john-john-florence.png">
                  <div id="surfer-photo-preview" style="margin-top:0.5rem"></div>
                </div>
                <div class="form-group">
                  <label class="form-label">Stance</label>
                  <select class="form-select" id="surfer-stance">
                    <option value="">Unknown</option>
                    <option value="regular">Regular</option>
                    <option value="goofy">Goofy</option>
                  </select>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn--primary">Save Surfer</button>
                  <button type="button" class="btn btn--outline" id="surfer-modal-cancel">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- RESULTS TAB -->
        <div class="tab-panel ${activeTab === "results" ? "active" : ""}" id="tab-results">
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Fetch &amp; Update Results</span></div>
            <p class="text-sm text-muted mb-2">Auto-detects the event currently underway (or the most recently completed) on the WSL website, scrapes heat results for both men's and women's draws, computes finish positions, and pre-fills the manual-entry form below. Within-round ties are broken by heat total (exact ties picked at random — flagged for review). Only fully-completed rounds are filled in.</p>
            <div class="form-actions">
              <button class="btn btn--primary" id="btn-fetch-results">Fetch &amp; Update Results from WSL</button>
            </div>
            <div id="wsl-fetch-log" class="mt-3" style="display:none;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:0.78rem;background:#f7f5f0;border:1px solid var(--color-beige);border-radius:6px;padding:0.6rem 0.8rem;max-height:240px;overflow-y:auto;white-space:pre-wrap"></div>
            <div id="wsl-fetch-output" class="mt-3"></div>
          </div>
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Enter Results Manually</span></div>
            <div class="form-group">
              <label class="form-label">Select Event</label>
              <select class="form-select" id="results-event-select">
                <option value="">Choose an event...</option>
                ${events.map((e) => `<option value="${e.id}">${e.eventNumber}. ${e.name} — ${e.tour === "womens" ? "Women's" : "Men's"} (${e.status})</option>`).join("")}
              </select>
            </div>
            <div id="results-form-container"></div>
          </div>
          <div class="card">
            <div class="card__header"><span class="card__title">Clear Results</span></div>
            <div class="form-group">
              <label class="form-label">Select Event</label>
              <select class="form-select" id="clear-results-event-select">
                <option value="">Choose an event...</option>
                ${events.filter((e) => e.resultsEntered).map((e) =>
                  `<option value="${e.id}">${e.eventNumber}. ${e.name} — ${e.tour === "womens" ? "Women's" : "Men's"}</option>`
                ).join("")}
              </select>
            </div>
            <div class="form-actions">
              <button class="btn btn--outline" id="btn-clear-results" style="color:var(--color-error);border-color:var(--color-error)">Clear All Results for Event</button>
            </div>
          </div>
        </div>

        <!-- PLAYERS TAB -->
        <div class="tab-panel ${activeTab === "players" ? "active" : ""}" id="tab-players">
          <div class="card">
            <div class="card__header">
              <span class="card__title">Registered Players (${users.length})</span>
              <button class="btn btn--sm btn--outline" id="btn-refresh-directory">Refresh Player Directory</button>
            </div>
            ${users.length > 0 ? `
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Team Name</th>
                    <th>Email</th>
                    <th>Admin</th>
                    <th>Joined</th>
                  </tr>
                </thead>
                <tbody>
                  ${users.map((u) => `
                    <tr>
                      <td>${u.displayName || "—"}</td>
                      <td><strong>${u.teamName || "—"}</strong></td>
                      <td class="text-sm text-muted">${u.email || "—"}</td>
                      <td>${u.isAdmin ? '<span class="badge badge--live">Admin</span>' : ""}</td>
                      <td class="text-sm text-muted">${formatDate(u.joinedAt)}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            ` : `<p class="text-muted">No players have signed up yet.</p>`}
          </div>

          <div class="card mt-3">
            <div class="card__header"><span class="card__title">Season Reset</span></div>
            <p class="text-muted text-sm mb-3">Deletes all team rosters for all users and events. Use this at the start of a new season. This cannot be undone.</p>
            <button class="btn btn--danger" id="btn-reset-teams">Reset All Teams</button>
          </div>
        </div>

        <!-- CLUBS TAB -->
        <div class="tab-panel ${activeTab === "clubs" ? "active" : ""}" id="tab-clubs">
          <div class="card">
            <div class="card__header">
              <span class="card__title">All Clubs (${clubs.length})</span>
            </div>
            ${clubs.length > 0 ? `
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Owner</th>
                    <th>Members</th>
                    <th>Invite Code</th>
                    <th>Club ID</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  ${clubs.map((c) => {
                    const owner = users.find((u) => u.id === c.ownerId);
                    return `<tr>
                      <td><strong>${c.name}</strong></td>
                      <td>${owner ? (owner.teamName || owner.displayName || owner.email) : c.ownerId}</td>
                      <td>${(c.memberIds || []).length}</td>
                      <td><code>${c.inviteCode}</code></td>
                      <td class="text-xs text-muted">${c.id}</td>
                      <td>
                        <button class="btn btn--sm btn--danger" data-delete-club="${c.id}" data-club-members='${JSON.stringify(c.memberIds || [])}'>Delete</button>
                      </td>
                    </tr>`;
                  }).join("")}
                </tbody>
              </table>
            ` : `<p class="text-muted">No clubs yet.</p>`}
          </div>
        </div>

      `;

      wireAdminEvents(container);
    }

    // Apply a tri-state to a banner toggle: "available" (Shown/Hidden, clickable),
    // "unavailable" (locked + greyed; preserves the user's saved preference for
    // when content reappears), or "checking" (locked + greyed while a fetch is
    // in flight). The saved checkbox value is preserved across states so the
    // toggle restores correctly when content becomes eligible again.
    function setBannerToggleState(toggleEl, { state, savedShown, reason }) {
      const checkbox = toggleEl.querySelector("input");
      const label = toggleEl.querySelector(".toggle__label");
      checkbox.checked = savedShown;
      if (state === "available") {
        checkbox.disabled = false;
        label.textContent = savedShown ? "Shown" : "Hidden";
        toggleEl.style.opacity = "";
        toggleEl.style.cursor = "";
        toggleEl.removeAttribute("title");
      } else {
        checkbox.disabled = true;
        label.textContent = state === "checking" ? "Checking…" : "Unavailable";
        toggleEl.style.opacity = "0.5";
        toggleEl.style.cursor = "not-allowed";
        if (reason) toggleEl.title = reason;
      }
    }

    async function wireCountdownBanner() {
      const countdownPreview = document.getElementById("countdown-preview");
      const countdownToggle = document.getElementById("toggle-banner");
      const liveStatusPreview = document.getElementById("live-status-preview");
      const liveStatusToggle = document.getElementById("toggle-live-status");
      if (!countdownPreview || !countdownToggle || !liveStatusPreview || !liveStatusToggle) return;

      // Phase 1: load only the fast/local inputs (Firestore). Anything that
      // depends on WSL goes into Phase 2 below so a WSL outage cannot brick
      // the toggles or the countdown preview.
      let siteConfig = {};
      let mensEv = null, womensEv = null;
      try {
        [siteConfig, mensEv, womensEv] = await Promise.all([
          getSiteConfig(),
          getCurrentEventForTour("mens", SEASON),
          getCurrentEventForTour("womens", SEASON),
        ]);
      } catch (err) {
        countdownPreview.textContent = "Could not load banner state.";
        return;
      }

      // ── Live status row: preview placeholder + toggle in "Checking…" state ──
      // The toggle starts locked because we don't yet know if WSL has an
      // active event to display. Phase 2 below transitions it to either
      // "available" (when WSL returns content) or "unavailable".
      const liveSavedShown = siteConfig.showLiveStatus !== false;
      liveStatusPreview.style.color = "var(--color-warm-gray)";
      liveStatusPreview.removeAttribute("title");
      liveStatusPreview.textContent = "Checking WSL…";
      liveStatusPreview.style.display = "";
      setBannerToggleState(liveStatusToggle, { state: "checking", savedShown: liveSavedShown });

      const liveCheckbox = liveStatusToggle.querySelector("input");
      liveCheckbox.addEventListener("change", async () => {
        // Native disabled prevents firing in "checking"/"unavailable" states.
        const shown = liveCheckbox.checked;
        const liveLabel = liveStatusToggle.querySelector(".toggle__label");
        liveLabel.textContent = shown ? "Shown" : "Hidden";
        try {
          await saveSiteConfig({ showLiveStatus: shown });
          toast(`Live status banner ${shown ? "shown" : "hidden"}.`, "success");
        } catch (err) {
          toast("Error saving banner state: " + err.message, "error");
          liveCheckbox.checked = !shown;
          liveLabel.textContent = !shown ? "Shown" : "Hidden";
        }
      });

      // ── Countdown row: preview + toggle ──
      // Wired entirely from local data; never blocks on WSL.
      const cdSavedShown = siteConfig.showCountdown !== false;
      const state = resolveCountdownState({ mensEv, womensEv });
      if (!state) {
        countdownPreview.textContent = "Nothing — no tour has open trading with a start date.";
        countdownPreview.style.color = "var(--color-warm-gray)";
        countdownPreview.removeAttribute("title");
        setBannerToggleState(countdownToggle, {
          state: "unavailable",
          savedShown: cdSavedShown,
          reason: "No tour has open trading with a start date.",
        });
      } else {
        countdownPreview.style.color = "var(--color-charcoal)";
        countdownPreview.title = `Source: ${state.event.name} (${state.tour === "womens" ? "Women's" : "Men's"}) · deadline from ${state.deadlineSource}`;
        window._countdownPreviewInterval = startCountdownTimer(countdownPreview, state);
        setBannerToggleState(countdownToggle, { state: "available", savedShown: cdSavedShown });
      }

      const cdCheckbox = countdownToggle.querySelector("input");
      cdCheckbox.addEventListener("change", async () => {
        const shown = cdCheckbox.checked;
        const cdLabel = countdownToggle.querySelector(".toggle__label");
        cdLabel.textContent = shown ? "Shown" : "Hidden";
        try {
          await saveSiteConfig({ showCountdown: shown });
          toast(`Countdown banner ${shown ? "shown" : "hidden"}.`, "success");
        } catch (err) {
          toast("Error saving banner state: " + err.message, "error");
          cdCheckbox.checked = !shown;
          cdLabel.textContent = !shown ? "Shown" : "Hidden";
        }
      });

      // Phase 2: fetch live status in the background. Resolves the toggle's
      // state (available vs unavailable) once we know what WSL returned.
      fetchLiveStatusCached(SEASON).then((liveStatus) => {
        if (!document.body.contains(liveStatusPreview)) return;
        if (liveStatus) {
          liveStatusPreview.style.color = "var(--color-charcoal)";
          liveStatusPreview.title = `Source: WSL /events/${SEASON}/ct (cached ~60s)`;
          renderLiveStatusBanner(liveStatusPreview, liveStatus);
          liveStatusPreview.style.display = "";
          setBannerToggleState(liveStatusToggle, { state: "available", savedShown: liveSavedShown });
        } else {
          liveStatusPreview.style.color = "var(--color-warm-gray)";
          liveStatusPreview.removeAttribute("title");
          liveStatusPreview.style.display = "";
          // Distinguish "WSL says no active event" from "WSL unreachable" by
          // peeking at the cache's fail-TTL stamp.
          let failed = false;
          try {
            const cached = JSON.parse(sessionStorage.getItem("wsl_live_status") || "null");
            failed = cached && cached.data === null && cached.ttl < 30_000;
          } catch {}
          liveStatusPreview.textContent = failed
            ? "WSL unreachable — banner will retry automatically."
            : "Nothing — WSL has no active event right now.";
          setBannerToggleState(liveStatusToggle, {
            state: "unavailable",
            savedShown: liveSavedShown,
            reason: failed
              ? "WSL is currently unreachable."
              : "WSL has no active event right now.",
          });
        }
      });
    }

    // ── LEADERBOARD RECALC (hardened) ──────────────────
    //
    // Integrity contract (see memory: feedback-scoring-integrity):
    //  1. Compute the entire new leaderboard in memory before touching Firestore.
    //  2. Pre-flight: skip a tour entirely if it has no events with results
    //     entered — never overwrite a real leaderboard with empties.
    //  3. Single atomic writeBatch per tour: all sets + orphan deletes commit
    //     together, so a failure mid-flight leaves the leaderboard untouched.
    //  4. Per-tour try/catch so one tour's failure cannot corrupt the other.
    //  5. User team rosters (teams/) are read-only here — never written.
    async function recalcLeaderboardForTour(tour, freshEvents, freshUsers) {
      // Pre-flight: bail (don't write) if we can't compute a meaningful result.
      if (!freshUsers.length) {
        return { tour, status: "skipped", reason: "no registered users" };
      }
      const tourEvents = freshEvents.filter(
        (e) => (e.tour || "mens") === tour && (e.resultsEntered || e.status === "completed")
      );
      if (tourEvents.length === 0) {
        return { tour, status: "skipped", reason: "no events with results entered" };
      }

      // Build empty seed entries for every registered user — ensures players
      // who haven't picked any team still appear in standings (with 0s).
      const userScores = {};
      for (const u of freshUsers) {
        userScores[u.id] = {
          displayName: u.displayName || "",
          teamName: u.teamName || u.displayName || "",
          avatarUrl: u.avatarUrl || "",
          eventScores: {},
        };
      }

      // Parallel-fetch all (results, teams) tuples. Any rejection bubbles up
      // and the catch in promptUpdateLeaderboard records "failed" — Firestore
      // is not touched.
      const fetched = await Promise.all(
        tourEvents.map((ev) => Promise.all([getResults(ev.id), getTeamsForEvent(ev.id)]))
      );
      for (let i = 0; i < tourEvents.length; i++) {
        const ev = tourEvents[i];
        const [results, teams] = fetched[i];
        for (const team of teams) {
          if (!userScores[team.userId]) continue; // ghost team for an unregistered user — skip
          const score = scoreTeam(team, results, tour);
          // scoreTeam returns 0 for empty rosters; that's intentional and
          // preserves prior gracefully-handled behavior.
          userScores[team.userId].eventScores[ev.id] = score.totalPoints;
        }
      }

      const entries = Object.entries(userScores).map(([userId, data]) => ({ userId, ...data }));
      const newStandings = calculateSeasonStandings(entries);
      if (!newStandings.length) {
        return { tour, status: "skipped", reason: "computed empty standings" };
      }

      // Find existing leaderboard userIds so we can delete orphans (users no
      // longer in `users`) in the same atomic commit.
      const existingSnap = await getDocs(query(
        collection(db, "leaderboard"),
        where("season", "==", SEASON),
        where("tour", "==", tour)
      ));
      const existingUserIds = new Set();
      existingSnap.docs.forEach((d) => {
        const data = d.data();
        if (data.userId) existingUserIds.add(data.userId);
      });
      const newUserIds = new Set(newStandings.map((s) => s.userId));

      const batch = writeBatch(db);
      for (const entry of newStandings) {
        const docId = `${entry.userId}_${SEASON}_${tour}`;
        batch.set(doc(db, "leaderboard", docId), {
          userId: entry.userId,
          season: SEASON,
          tour,
          displayName: entry.displayName,
          teamName: entry.teamName,
          eventScores: entry.eventScores,
          bestNineTotal: entry.bestNineTotal,
          allEventsTotal: entry.allEventsTotal,
          eventsPlayed: entry.eventsPlayed,
        });
      }
      for (const oldUserId of existingUserIds) {
        if (!newUserIds.has(oldUserId)) {
          batch.delete(doc(db, "leaderboard", `${oldUserId}_${SEASON}_${tour}`));
        }
      }
      await batch.commit(); // atomic — all-or-nothing

      return {
        tour,
        status: "updated",
        players: newStandings.length,
        eventsUsed: tourEvents.length,
      };
    }

    // Confirm-then-recalc dialog. Wired into both result-save flows (WSL
    // scrape and manual entry). Always shows the dialog so admin retains
    // explicit control; never auto-runs.
    async function promptUpdateLeaderboard() {
      // Refresh events + users from source so the recalc sees the latest
      // resultsEntered flags and any signups since page load.
      try { sessionStorage.removeItem(`events_${SEASON}`); } catch {}
      let freshEvents, freshUsers;
      try {
        [freshEvents, freshUsers] = await Promise.all([getEvents(SEASON), getAllUsers()]);
      } catch (err) {
        toast("Could not check leaderboard state: " + err.message, "error");
        return;
      }

      // Per-tour summary: count of events with results + the two most-recent
      // events (by eventNumber) labeled Last/Current update so admin can see
      // exactly what's being added.
      // Wrap suffix in white-space:nowrap so phrases like "Round 1 of 6
      // Complete" never split across lines mid-suffix.
      const roundSuffix = (ev) => {
        if (ev.status === "completed") {
          return ` <span style="white-space:nowrap">— Final</span>`;
        }
        if (ev.roundsCompleted && ev.totalRounds) {
          return ` <span style="white-space:nowrap">— Round ${ev.roundsCompleted} of ${ev.totalRounds} Complete</span>`;
        }
        return "";
      };
      const summary = ["mens", "womens"].map((tour) => {
        const evs = freshEvents
          .filter((e) => (e.tour || "mens") === tour && (e.resultsEntered || e.status === "completed"))
          .sort((a, b) => (b.eventNumber || 0) - (a.eventNumber || 0)); // newest first
        return {
          tour,
          label: tour === "womens" ? "Women's CT" : "Men's CT",
          count: evs.length,
          current: evs[0] || null,
          last: evs[1] || null,
        };
      });
      const updatable = summary.filter((s) => s.count > 0);
      if (updatable.length === 0) {
        toast("Nothing to update — no events have results entered yet.", "info");
        return;
      }

      const renderTourBlock = (s) => {
        if (s.count === 0) {
          return `<div style="margin-bottom:0.6rem"><strong>${s.label}:</strong> <span class="text-sm text-muted">no events with results yet — will skip</span></div>`;
        }
        const lastLine = s.last
          ? `<div class="text-sm text-muted">Last: ${s.last.name}${roundSuffix(s.last)}</div>`
          : `<div class="text-sm text-muted">Last: —</div>`;
        const currentLine = `<div class="text-sm text-muted">Now: ${s.current.name}${roundSuffix(s.current)}</div>`;
        return `<div style="margin-bottom:0.6rem">`
          + `<strong>${s.label}:</strong> ${s.count} event${s.count === 1 ? "" : "s"} with results`
          + lastLine + currentLine
          + `</div>`;
      };
      const body =
          `<p>Recalculate team scores and the season leaderboard from the current stored event results?</p>`
        + summary.map(renderTourBlock).join("");

      const confirmed = await confirmModal({
        title: "Update team scores & leaderboard?",
        bodyHtml: body,
        confirmLabel: "Update Now",
        cancelLabel: "Skip",
        confirmTone: "primary",
      });
      if (!confirmed) return;

      const outcomes = [];
      for (const tour of ["mens", "womens"]) {
        try {
          outcomes.push(await recalcLeaderboardForTour(tour, freshEvents, freshUsers));
        } catch (err) {
          // Atomic batch failed → that tour's leaderboard is unchanged. Record
          // the failure and continue with the other tour.
          outcomes.push({ tour, status: "failed", reason: err.message });
        }
      }

      // Bump leaderboard version so all clients re-fetch from cache.
      if (outcomes.some((o) => o.status === "updated")) {
        try { await touchLeaderboardVersion(); } catch {}
      }

      // Refresh module-level events/users so subsequent admin actions see the
      // same data the recalc used.
      events = freshEvents;
      users = freshUsers;

      const labelOf = (t) => (t === "womens" ? "Women's" : "Men's");
      const parts = outcomes.map((o) => {
        if (o.status === "updated") return `${labelOf(o.tour)} updated (${o.players} player${o.players === 1 ? "" : "s"}, ${o.eventsUsed} event${o.eventsUsed === 1 ? "" : "s"})`;
        if (o.status === "skipped") return `${labelOf(o.tour)} skipped (${o.reason})`;
        return `${labelOf(o.tour)} FAILED: ${o.reason}`;
      });
      const anyFailed = outcomes.some((o) => o.status === "failed");
      const anyUpdated = outcomes.some((o) => o.status === "updated");
      const tone = anyFailed ? "warning" : anyUpdated ? "success" : "info";
      toast(parts.join(" · "), tone);
    }

    function wireAdminEvents(container) {
      // Tab switching
      container.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeTab = btn.dataset.tab;
          renderAdmin(container);
        });
      });

      // ── COUNTDOWN BANNER PREVIEW + TOGGLE ──
      if (activeTab === "events") wireCountdownBanner();

      // ── EVENT MODAL ──
      const eventModal = document.getElementById("event-modal");
      const openEventModal = (ev) => {
        if (ev) {
          document.getElementById("event-edit-id").value = ev.id;
          document.getElementById("event-id").value = ev.id;
          document.getElementById("event-id").disabled = true;
          document.getElementById("event-name").value = ev.name || "";
          document.getElementById("event-location").value = ev.location || "";
          document.getElementById("event-number").value = ev.eventNumber || "";
          document.getElementById("event-tour").value = ev.tour || "mens";
          document.getElementById("event-start").value = (ev.startDate || "").substring(0, 10);
          document.getElementById("event-end").value = (ev.endDate || "").substring(0, 10);
          document.getElementById("event-trading-close").value = ev.tradingCloseTime || "";
          document.getElementById("event-timezone").value = ev.tradingCloseTimezone || "";
          document.getElementById("event-form-title").textContent = "Edit Event";
        } else {
          document.getElementById("event-form").reset();
          document.getElementById("event-edit-id").value = "";
          document.getElementById("event-id").disabled = false;
          document.getElementById("event-form-title").textContent = "Add Event";
        }
        eventModal.style.display = "flex";
      };
      const closeEventModal = () => { eventModal.style.display = "none"; };

      document.getElementById("btn-add-event")?.addEventListener("click", () => openEventModal(null));
      document.getElementById("event-modal-close")?.addEventListener("click", closeEventModal);
      document.getElementById("event-modal-cancel")?.addEventListener("click", closeEventModal);
      eventModal?.addEventListener("click", (e) => { if (e.target === eventModal) closeEventModal(); });

      document.getElementById("event-form")?.addEventListener("submit", async (e) => {
        e.preventDefault();
        const editId = document.getElementById("event-edit-id").value;
        const id = editId || document.getElementById("event-id").value.trim();
        if (!id) return;
        const tourValue = document.getElementById("event-tour").value;
        const baseData = {
          name: document.getElementById("event-name").value.trim(),
          location: document.getElementById("event-location").value.trim(),
          eventNumber: parseInt(document.getElementById("event-number").value, 10),
          startDate: document.getElementById("event-start").value,
          endDate: document.getElementById("event-end").value,
          tradingCloseTime: document.getElementById("event-trading-close").value || null,
          tradingCloseTimezone: document.getElementById("event-timezone").value || null,
          season: SEASON
        };
        try {
          if (tourValue === "both") {
            const baseId = id.replace(/-mens$|-womens$/, "");
            await saveEvent(baseId + "-mens",   { ...baseData, tour: "mens" });
            await saveEvent(baseId + "-womens", { ...baseData, tour: "womens" });
            toast("Saved Men's + Women's events!", "success");
          } else {
            await saveEvent(id, { ...baseData, tour: tourValue });
            toast("Event saved!", "success");
          }
          try { Object.keys(sessionStorage).filter(k => k.startsWith("events_")).forEach(k => sessionStorage.removeItem(k)); } catch {}
          closeEventModal();
          events = await getEvents(SEASON);
          renderAdmin(container);
        } catch (err) {
          toast("Error: " + err.message, "error");
        }
      });

      container.querySelectorAll("[data-edit-event]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const ev = events.find((e) => e.id === btn.dataset.editEvent);
          if (!ev) return;
          openEventModal(ev);
        });
      });

      container.querySelectorAll("[data-delete-event]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm("Delete this event? This cannot be undone.")) return;
          await deleteEvent(btn.dataset.deleteEvent);
          toast("Event deleted.", "info");
          events = await getEvents(SEASON);
          renderAdmin(container);
        });
      });

      // ── INLINE STATUS SELECT ──
      container.querySelectorAll("[data-status-event]").forEach((sel) => {
        sel.addEventListener("change", async () => {
          const eventId = sel.dataset.statusEvent;
          try {
            await saveEvent(eventId, { status: sel.value });
            toast(`Status updated to "${sel.value}".`, "success");
            try { Object.keys(sessionStorage).filter(k => k.startsWith("events_")).forEach(k => sessionStorage.removeItem(k)); } catch {}
            events = await getEvents(SEASON);
            renderAdmin(container);
          } catch (err) {
            toast("Error: " + err.message, "error");
            // Revert the select to the previous value
            const ev = events.find((e) => e.id === eventId);
            if (ev) sel.value = ev.status;
          }
        });
      });

      // ── TRADING TOGGLE ──
      container.querySelectorAll("[data-toggle-trading]").forEach((label) => {
        const checkbox = label.querySelector("input");
        const labelText = label.querySelector(".toggle__label");
        // Use click + preventDefault so the browser does NOT auto-flip the
        // checkbox visual on mousedown. We flip it ourselves only after the
        // admin commits step 1, so the toggle stays in its pre-click color
        // (green for "Open", red for "Locked") throughout the dialog flow.
        checkbox.addEventListener("click", async (evt) => {
          evt.preventDefault();
          const eventId = label.dataset.toggleTrading;
          const ev = events.find((e) => e.id === eventId);
          // Derive intent from the persisted event data (single source of
          // truth). Reading checkbox.checked is fragile because some browsers
          // toggle the property in unexpected places relative to preventDefault.
          // Treat a missing tradingOpen field as "open" (matches the render and
          // the initial seed in the events list).
          const wasOpen = ev?.tradingOpen !== false;
          const locking = wasOpen; // open → click means lock; locked → means open
          const evName = ev?.name || eventId;
          const evTour = ev?.tour || "mens";
          const tourLabel = evTour === "womens" ? "Women's" : "Men's";
          const evNumLabel = ev?.eventNumber ? `${tourLabel} Event ${ev.eventNumber}` : tourLabel;
          // Synchronous check (events already loaded): is there an earlier locked
          // event on the same tour that carry-forward could pull from? If not,
          // skip the second confirm — nothing to carry.
          const currentNum = ev?.eventNumber ?? Infinity;
          const hasPriorLocked = events.some(
            (e) => (e.tour || "mens") === evTour
              && e.eventNumber < currentNum
              && e.tradingOpen === false
          );

          // Stepper labels. Carry-forward only appears if there's a source.
          // Popularity snapshot only on the lock path.
          const steps = [locking ? "Lock trading" : "Open trading"];
          if (hasPriorLocked) steps.push("Carry forward");
          if (locking) steps.push("Popularity");
          const stepIdx = { action: 1, carry: hasPriorLocked ? 2 : null, pop: hasPriorLocked ? 3 : 2 };

          // ── STEP 1: confirm the toggle action itself ──
          const dialog1Body = locking
            ? `<p>You're about to lock trading for <strong>"${evName}"</strong> (${evNumLabel}).</p>`
              + `<p>This will:</p>`
              + `<ul>`
              + `<li>Freeze all submitted teams — users can no longer add, drop, or swap surfers for this event.</li>`
              + `</ul>`
              + `<p class="text-sm text-muted" style="margin-top:0.75rem">You'll be asked separately about carry-forward and the popularity snapshot.</p>`
            : `<p>You're about to open trading for <strong>"${evName}"</strong> (${evNumLabel}).</p>`
              + `<p>This will:</p>`
              + `<ul>`
              + `<li>Unfreeze teams so users can edit their roster for this event.</li>`
              + `</ul>`
              + (hasPriorLocked
                ? `<p class="text-sm text-muted" style="margin-top:0.75rem">You'll be asked separately about carry-forward.</p>`
                : "");
          const dialog1Confirmed = await confirmModal({
            title: locking ? "Lock trading?" : "Open trading?",
            bodyHtml: dialog1Body,
            confirmLabel: locking ? "Lock trading" : "Open trading",
            cancelLabel: "Cancel",
            confirmTone: locking ? "danger" : "primary",
            steps,
            currentStep: stepIdx.action
          });
          if (!dialog1Confirmed) {
            // preventDefault held the checkbox in its pre-click state, so
            // there's nothing to revert visually. Just bail.
            return;
          }
          // Step 1 committed → flip the toggle visual + label now. The
          // remaining dialogs are opt-ins for additional side effects; they
          // do not change whether the lock/open happens.
          checkbox.checked = !locking;
          labelText.textContent = locking ? "Locked" : "Open";

          // ── STEP 2: opt-in for carry-forward (only if there's a source) ──
          let shouldCarryForward = false;
          if (hasPriorLocked) {
            const cfChoiceCopy = locking
              ? `For each user who didn't submit a team for <strong>"${evName}"</strong>, copy their most recent locked roster (purchase prices preserved) into this event. User-saved teams are never overwritten. This is the normal end-of-trading flow.`
              : `Pre-populate <strong>"${evName}"</strong> with each user's most recent locked roster. When users open My Team, they'll see their last-event roster with updated market-value deltas (no blank teams). User-saved teams are never overwritten.`;
            const skipChoiceCopy = locking
              ? `Use this if you're re-locking after an accidental Open, or don't want stale rosters scored here.`
              : `Use this if you opened by mistake, or if users should explicitly re-pick.`;
            const dialog2Body =
              `<p>Should we also carry forward rosters from the previous event into <strong>"${evName}"</strong>?</p>`
              + `<div class="confirm-modal__choice">`
              +   `<span class="confirm-modal__choice-label">Carry forward</span>`
              +   `${cfChoiceCopy}`
              + `</div>`
              + `<div class="confirm-modal__choice confirm-modal__choice--alt">`
              +   `<span class="confirm-modal__choice-label">Skip</span>`
              +   `${skipChoiceCopy}`
              + `</div>`;
            shouldCarryForward = await confirmModal({
              title: "Carry forward rosters?",
              bodyHtml: dialog2Body,
              confirmLabel: "Carry forward",
              cancelLabel: "Skip",
              confirmTone: "primary",
              steps,
              currentStep: stepIdx.carry
            });
          }

          // ── STEP 3 (LOCK ONLY): opt-in for popularity snapshot ──
          let shouldSnapshotPopularity = false;
          if (locking) {
            const dialog3Body =
              `<p>Should we also snapshot surfer popularity for <strong>"${evName}"</strong>?</p>`
              + `<div class="confirm-modal__choice">`
              +   `<span class="confirm-modal__choice-label">Snapshot</span>`
              +   `Count how many users picked each surfer, compute % of teams, and save the snapshot to the event doc. This drives the popularity % column on the Surfers page. Required if this is the final lock for this event.`
              + `</div>`
              + `<div class="confirm-modal__choice confirm-modal__choice--alt">`
              +   `<span class="confirm-modal__choice-label">Skip</span>`
              +   `Don't capture popularity now. Use this if you're temporarily re-locking after an accidental Open and a real snapshot already exists, or if you want to redo it later.`
              + `</div>`;
            shouldSnapshotPopularity = await confirmModal({
              title: "Snapshot popularity?",
              bodyHtml: dialog3Body,
              confirmLabel: "Snapshot",
              cancelLabel: "Skip",
              confirmTone: "primary",
              steps,
              currentStep: stepIdx.pop
            });
          }

          // Visual already flipped at step 1 commit. Persist now.
          try {
            await saveEvent(eventId, { tradingOpen: !locking });
            // Keep the local events array in sync so a follow-up click that
            // lands while team ops are still in flight reads the just-saved
            // state, not the stale pre-save value.
            const idx = events.findIndex((e) => e.id === eventId);
            if (idx >= 0) events[idx] = { ...events[idx], tradingOpen: !locking };
          } catch (err) {
            toast("Error saving trading status: " + err.message, "error");
            // Persist failed — roll back the toggle + label to original state.
            checkbox.checked = locking;
            labelText.textContent = locking ? "Open" : "Locked";
            return;
          }
          // Team operations may fail if Firestore rules don't allow admin writes to teams/
          try {
            const carried = shouldCarryForward ? await carryForwardTeams(eventId, SEASON) : 0;
            if (locking) {
              await lockTeamsForEvent(eventId, true);

              let popularityNote = "";
              if (shouldSnapshotPopularity) {
                const teams = await getTeamsForEvent(eventId);
                const totalTeams = teams.length;
                const surferCounts = {};
                for (const team of teams) {
                  const surferIds = new Set();
                  if (team.surfers) team.surfers.forEach(s => surferIds.add(s.surferId));
                  if (team.alternate) surferIds.add(team.alternate.surferId);
                  for (const sid of surferIds) surferCounts[sid] = (surferCounts[sid] || 0) + 1;
                }
                const popularityPct = {};
                for (const [sid, count] of Object.entries(surferCounts)) {
                  popularityPct[sid] = totalTeams > 0
                    ? parseFloat(((count / totalTeams) * 100).toFixed(1))
                    : 0;
                }
                await saveEvent(eventId, { popularityPct, totalTeams });
                popularityNote = ` Popularity snapshot saved (${totalTeams} team${totalTeams === 1 ? "" : "s"}).`;
              }
              const carriedNote = carried > 0 ? ` ${carried} roster(s) carried forward.` : "";
              toast(`Trading locked.${carriedNote}${popularityNote}`, "success");
            } else {
              await lockTeamsForEvent(eventId, false);
              toast(`Trading opened.${carried > 0 ? ` ${carried} roster(s) carried forward.` : ""}`, "success");
            }
          } catch (err) {
            toast(locking ? "Trading locked, but team operations failed (check Firestore permissions)." : "Trading opened, but team unlock failed.", "warning");
          }
          try { sessionStorage.removeItem(`events_${SEASON}`); } catch {}
          events = await getEvents(SEASON);
          renderAdmin(container);
        });
      });

      // ── SURFER TOUR SUB-TABS ──
      container.querySelectorAll("[data-surfer-tour]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeSurferTour = btn.dataset.surferTour;
          renderAdmin(container);
        });
      });

      // ── SURFER MODAL ──
      const surferModal = document.getElementById("surfer-modal");
      const openSurferModal = (s) => {
        const preview = document.getElementById("surfer-photo-preview");

      document.getElementById("surfer-modal-close")?.addEventListener("click", closeSurferModal);

      document.getElementById("surfer-form")?.addEventListener("submit", async (e) => {

      container.querySelectorAll("[data-edit-surfer]").forEach((btn) => {

      container.querySelectorAll("[data-delete-surfer]").forEach((btn) => {

      // ── INLINE SURFER BRACKET SELECT ──
      container.querySelectorAll("[data-bracket-surfer]").forEach((sel) => {

      // ── CLUBS ──
      container.querySelectorAll("[data-delete-club]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const clubId = btn.dataset.deleteClub;
          const memberIds = JSON.parse(btn.dataset.clubMembers || "[]");
          if (!confirm(`Delete this club and remove all ${memberIds.length} member(s)? This cannot be undone.`)) return;
          try {

            clubs = await getAllClubs();
            renderAdmin(container);
          } catch (err) {
