<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, requireAdmin, getCurrentUser } from "./js/auth.js";
    import {
      getSurfers, getAllSurfers, saveSurfer, deleteSurfer,
      getEvents, saveEvent, deleteEvent,
      getResults, saveResultsBatch, clearResults,
      getTeamsForEvent, lockTeamsForEvent, carryForwardTeams, clearAllTeams,
      saveLeaderboardEntry, saveLeaderboardBatch, clearLeaderboard, getLeaderboard, touchLeaderboardVersion,
      savePlayerDirectory, getUser, getAllUsers,
      getAllClubs, deleteClub,
      saveSiteConfig
    } from "./js/db.js";
    import { scoreTeam, getPoints, MEN_SCORING, WOMEN_SCORING, calculateSeasonStandings } from "./js/scoring.js";
    import { renderHeader, renderFooter, showLoading, toast, formatSalary, formatSalaryFull, formatDate, confirmModal } from "./js/ui.js";
    import { fetchSchedule, pickTargetVenue, discoverGenders, scrapeEventForGender } from "./js/wsl-scrape.js";
    import { buildSurferIndex, resolveSurfer, computeFinishPositions } from "./js/wsl-resolve.js";

    const SEASON = 2026;
    let surfers = [];
    let events = [];
    let users = [];
    let clubs = [];
    let activeTab = "events";
    let activeSurferTour = "mens";

    initAuth();
    renderHeader();
    renderFooter();

    requireAdmin().then(async (user) => {
      const main = document.getElementById("app-main");
      showLoading(main);
      await loadAdmin(main);
    });

    async function loadAdmin(container) {
      try {
        [surfers, events, users] = await Promise.all([
          getAllSurfers(),
          getEvents(SEASON),
          getAllUsers()
        ]);
        try { clubs = await getAllClubs(); } catch { clubs = []; }
      } catch (err) {
        container.innerHTML = `<h1>Admin Panel</h1><div class="card"><p class="text-muted">Error: ${err.message}</p></div>`;
        return;
      }
      renderAdmin(container);
    }

    function renderAdmin(container) {
      surfers.sort((a, b) => (a.rank || 999) - (b.rank || 999));
      events.sort((a, b) => (a.eventNumber || 0) - (b.eventNumber || 0));

      container.innerHTML = `
        <h1 class="page-title">Admin Panel</h1>

        <div class="tabs">
          <button class="tab-btn ${activeTab === "events" ? "active" : ""}" data-tab="events">Events</button>
          <button class="tab-btn ${activeTab === "surfers" ? "active" : ""}" data-tab="surfers">Surfers</button>
          <button class="tab-btn ${activeTab === "results" ? "active" : ""}" data-tab="results">Results</button>
          <button class="tab-btn ${activeTab === "scoring" ? "active" : ""}" data-tab="scoring">Score & Leaderboard</button>
          <button class="tab-btn ${activeTab === "players" ? "active" : ""}" data-tab="players">Players (${users.length})</button>
          <button class="tab-btn ${activeTab === "clubs" ? "active" : ""}" data-tab="clubs">Clubs (${clubs.length})</button>
          <button class="tab-btn ${activeTab === "seed" ? "active" : ""}" data-tab="seed">Seed Data</button>
        </div>

        <!-- EVENTS TAB -->
        <div class="tab-panel ${activeTab === "events" ? "active" : ""}" id="tab-events">
          <div>
              <div class="card">
                <div class="card__header">
                  <span class="card__title">${SEASON} Events</span>
                  <button class="btn btn--sm btn--primary" id="btn-add-event">+ Add Event</button>
                </div>
                ${events.length > 0 ? `
                  <table class="data-table">
                    <thead><tr><th>#</th><th>Name</th><th>Tour</th><th>Status</th><th>Trading</th><th></th></tr></thead>
                    <tbody>
                      ${events.map((e) => `
                        <tr>
                          <td>${e.eventNumber}</td>
                          <td>${e.name}</td>
                          <td>${e.tour === "womens" ? "W" : "M"}</td>
                          <td>
                            <select class="inline-select inline-select--status" data-status-event="${e.id}" data-current="${e.status}">
                              <option value="upcoming"${e.status === "upcoming" ? " selected" : ""}>Upcoming</option>
                              <option value="live"${e.status === "live" ? " selected" : ""}>Live</option>
                              <option value="completed"${e.status === "completed" ? " selected" : ""}>Completed</option>
                            </select>
                          </td>
                          <td>
                            <label class="toggle" data-toggle-trading="${e.id}">
                              <input type="checkbox" ${e.tradingOpen ? "checked" : ""}>
                              <span class="toggle__track"></span>
                              <span class="toggle__label">${e.tradingOpen ? "Open" : "Locked"}</span>
                            </label>
                          </td>
                          <td>
                            <button class="btn btn--sm btn--outline" data-edit-event="${e.id}">Edit</button>
                            <button class="btn btn--sm btn--danger" data-delete-event="${e.id}">Del</button>
                          </td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                ` : `<p class="text-muted">No events yet.</p>`}
              </div>
            </div>
          </div>

          <!-- Event Modal -->
          <div class="modal-overlay" id="event-modal" style="display:none">
            <div class="modal">
              <div class="modal__header">
                <span class="modal__title" id="event-form-title">Add Event</span>
                <button class="modal__close" id="event-modal-close">&times;</button>
              </div>
              <form id="event-form">
                <input type="hidden" id="event-edit-id">
                <div class="form-group">
                  <label class="form-label">Event ID (slug)</label>
                  <input class="form-input" id="event-id" placeholder="pipe-pro-2026" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Name</label>
                  <input class="form-input" id="event-name" placeholder="Billabong Pipeline Pro" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Location</label>
                  <input class="form-input" id="event-location" placeholder="Pipeline, Oahu">
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Event #</label>
                    <input class="form-input" id="event-number" type="number" min="1" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Tour</label>
                    <select class="form-select" id="event-tour">
                      <option value="both">Both (Men's + Women's)</option>
                      <option value="mens">Men's only</option>
                      <option value="womens">Women's only</option>
                    </select>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Start Date</label>
                    <input class="form-input" id="event-start" type="date" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">End Date</label>
                    <input class="form-input" id="event-end" type="date" required>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Trading Close Time</label>
                    <input class="form-input" id="event-trading-close" type="datetime-local">
                    <span class="text-xs text-muted">First call time. Used for countdown banner.</span>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Event Timezone</label>
                    <select class="form-select" id="event-timezone">
                      <option value="">— select —</option>
                      <option value="+12">NZST / FJT (UTC+12)</option>
                      <option value="+11">AEDT (UTC+11)</option>
                      <option value="+10">AEST (UTC+10)</option>
                      <option value="+8">AWST (UTC+8)</option>
                      <option value="+4">GST (UTC+4)</option>
                      <option value="+1">WEST (UTC+1)</option>
                      <option value="+0">WET (UTC+0)</option>
                      <option value="-3">BRT (UTC-3)</option>
                      <option value="-6">CST (UTC-6)</option>
                      <option value="-7">PDT (UTC-7)</option>
                      <option value="-10">TAHT (UTC-10)</option>
                    </select>
                  </div>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn--primary">Save Event</button>
                  <button type="button" class="btn btn--outline" id="event-modal-cancel">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- SURFERS TAB -->
        <div class="tab-panel ${activeTab === "surfers" ? "active" : ""}" id="tab-surfers">
          <div>
            <div class="card">
              <div class="card__header">
                <span class="card__title">Surfers</span>
                <button class="btn btn--sm btn--primary" id="btn-add-surfer">+ Add Surfer</button>
              </div>
              <div style="display:flex;gap:0.5rem;margin-bottom:1rem;border-bottom:1px solid var(--color-beige);padding-bottom:0">
                <button data-surfer-tour="mens" style="padding:0.4rem 1rem;border:none;background:none;cursor:pointer;font-size:0.875rem;font-weight:${activeSurferTour==="mens"?"600":"400"};color:${activeSurferTour==="mens"?"var(--color-charcoal)":"var(--color-sage)"};border-bottom:2px solid ${activeSurferTour==="mens"?"var(--color-charcoal)":"transparent"};margin-bottom:-1px">
                  Men's CT (${surfers.filter(s=>(s.tour||"mens")==="mens").length})
                </button>
                <button data-surfer-tour="womens" style="padding:0.4rem 1rem;border:none;background:none;cursor:pointer;font-size:0.875rem;font-weight:${activeSurferTour==="womens"?"600":"400"};color:${activeSurferTour==="womens"?"var(--color-charcoal)":"var(--color-sage)"};border-bottom:2px solid ${activeSurferTour==="womens"?"var(--color-charcoal)":"transparent"};margin-bottom:-1px">
                  Women's CT (${surfers.filter(s=>s.tour==="womens").length})
                </button>
              </div>
              <div>
                <table class="data-table">
                  <thead><tr><th>Rank</th><th>Name</th><th>Country</th><th>Value</th><th>Bracket</th><th>Status</th><th></th></tr></thead>
                  <tbody>
                    ${surfers.filter(s => (s.tour || "mens") === activeSurferTour).map((s) => `
                      ${(() => { const currentStatus = s.status || (s.active === false ? "inactive" : "active"); return `
                      <tr style="${currentStatus === "inactive" ? "opacity:0.5" : ""}">
                        <td>${s.rank || "—"}</td>
                        <td>${s.name}</td>
                        <td>${s.country || ""}</td>
                        <td>${formatSalary(s.value)}</td>
                        <td>
                          <select class="inline-select inline-select--bracket" data-bracket-surfer="${s.id}" data-current="${s.priceBracket || ""}">
                            <option value="elite"${s.priceBracket === "elite" ? " selected" : ""}>Elite</option>
                            <option value="high"${s.priceBracket === "high" ? " selected" : ""}>High</option>
                            <option value="mid"${s.priceBracket === "mid" ? " selected" : ""}>Mid</option>
                            <option value="low"${s.priceBracket === "low" ? " selected" : ""}>Low</option>
                            <option value="budget"${s.priceBracket === "budget" ? " selected" : ""}>Budget</option>
                          </select>
                        </td>
                        <td>
                          <select class="inline-select inline-select--surfer-status" data-status-surfer="${s.id}" data-current="${currentStatus}">
                            <option value="active"${currentStatus === "active" ? " selected" : ""}>Active</option>
                            <option value="injured"${currentStatus === "injured" ? " selected" : ""}>Injured</option>
                            <option value="inactive"${currentStatus === "inactive" ? " selected" : ""}>Inactive</option>
                          </select>
                        </td>
                        <td>
                          <button class="btn btn--sm btn--outline" data-edit-surfer="${s.id}">Edit</button>
                          <button class="btn btn--sm btn--danger" data-delete-surfer="${s.id}">Del</button>
                        </td>
                      </tr>`; })()}
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Surfer Modal -->
          <div class="modal-overlay" id="surfer-modal" style="display:none">
            <div class="modal">
              <div class="modal__header">
                <span class="modal__title" id="surfer-form-title">Add Surfer</span>
                <button class="modal__close" id="surfer-modal-close">&times;</button>
              </div>
              <form id="surfer-form">
                <input type="hidden" id="surfer-edit-id">
                <div class="form-group">
                  <label class="form-label">ID (slug)</label>
                  <input class="form-input" id="surfer-id" placeholder="john-john-florence" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Full Name</label>
                  <input class="form-input" id="surfer-name" placeholder="John John Florence" required>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Country</label>
                    <input class="form-input" id="surfer-country" placeholder="HAW" maxlength="5">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Rank</label>
                    <input class="form-input" id="surfer-rank" type="number" min="1">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Tour</label>
                  <select class="form-select" id="surfer-tour">
                    <option value="mens">Men's CT</option>
                    <option value="womens">Women's CT</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Value ($)</label>
                  <input class="form-input" id="surfer-value" type="number" min="0" step="250000" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Photo Path</label>
                  <input class="form-input" id="surfer-photo" placeholder="data/photos/john-john-florence.png">
                  <div id="surfer-photo-preview" style="margin-top:0.5rem"></div>
                </div>
                <div class="form-group">
                  <label class="form-label">Stance</label>
                  <select class="form-select" id="surfer-stance">
                    <option value="">Unknown</option>
                    <option value="regular">Regular</option>
                    <option value="goofy">Goofy</option>
                  </select>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn--primary">Save Surfer</button>
                  <button type="button" class="btn btn--outline" id="surfer-modal-cancel">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- RESULTS TAB -->
        <div class="tab-panel ${activeTab === "results" ? "active" : ""}" id="tab-results">
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Fetch &amp; Update Results</span></div>
            <p class="text-sm text-muted mb-2">Auto-detects the event currently underway (or the most recently completed) on the WSL website, scrapes heat results for both men's and women's draws, computes finish positions, and pre-fills the manual-entry form below. Within-round ties are broken by heat total (exact ties picked at random — flagged for review). Only fully-completed rounds are filled in.</p>
            <div class="form-actions">
              <button class="btn btn--primary" id="btn-fetch-results">Fetch &amp; Update Results from WSL</button>
            </div>
            <div id="wsl-fetch-log" class="mt-3" style="display:none;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:0.78rem;background:#f7f5f0;border:1px solid var(--color-beige);border-radius:6px;padding:0.6rem 0.8rem;max-height:240px;overflow-y:auto;white-space:pre-wrap"></div>
            <div id="wsl-fetch-output" class="mt-3"></div>
          </div>
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Enter Results Manually</span></div>
            <div class="form-group">
              <label class="form-label">Select Event</label>
              <select class="form-select" id="results-event-select">
                <option value="">Choose an event...</option>
                ${events.map((e) => `<option value="${e.id}">${e.eventNumber}. ${e.name} — ${e.tour === "womens" ? "Women's" : "Men's"} (${e.status})</option>`).join("")}
              </select>
            </div>
            <div id="results-form-container"></div>
          </div>
          <div class="card">
            <div class="card__header"><span class="card__title">Clear Results</span></div>
            <div class="form-group">
              <label class="form-label">Select Event</label>
              <select class="form-select" id="clear-results-event-select">
                <option value="">Choose an event...</option>
                ${events.filter((e) => e.resultsEntered).map((e) =>
                  `<option value="${e.id}">${e.eventNumber}. ${e.name} — ${e.tour === "womens" ? "Women's" : "Men's"}</option>`
                ).join("")}
              </select>
            </div>
            <div class="form-actions">
              <button class="btn btn--outline" id="btn-clear-results" style="color:var(--color-error);border-color:var(--color-error)">Clear All Results for Event</button>
            </div>
          </div>
        </div>

        <!-- SCORING TAB -->
        <div class="tab-panel ${activeTab === "scoring" ? "active" : ""}" id="tab-scoring">
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Calculate Scores & Update Leaderboard</span></div>
            <div class="form-group">
              <label class="form-label">Select Event</label>
              <select class="form-select" id="scoring-event-select">
                <option value="">Choose an event...</option>
                ${events.filter((e) => e.status === "completed" || e.resultsEntered).map((e) =>
                  `<option value="${e.id}">${e.eventNumber}. ${e.name} — ${e.tour === "womens" ? "Women's" : "Men's"}</option>`
                ).join("")}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Update Leaderboard For</label>
              <select class="form-select" id="leaderboard-tour-select" style="max-width:220px">
                <option value="both">Both Tours</option>
                <option value="womens">Women's CT only</option>
                <option value="mens">Men's CT only</option>
              </select>
            </div>
            <div class="form-actions">
              <button class="btn btn--primary" id="btn-calculate-scores">Calculate All Scores</button>
              <button class="btn btn--secondary" id="btn-update-leaderboard">Update Season Leaderboard</button>
            </div>
            <div id="scoring-output" class="mt-3"></div>
          </div>

          <div class="card">
            <div class="card__header"><span class="card__title">Countdown Banner</span></div>
            <p class="text-sm text-muted mb-2">Show or hide the countdown banner across the site.</p>
            <div class="form-actions">
              <button class="btn btn--primary" id="btn-banner-on">Show Banner</button>
              <button class="btn btn--danger" id="btn-banner-off">Hide Banner</button>
            </div>
          </div>
        </div>

        <!-- PLAYERS TAB -->
        <div class="tab-panel ${activeTab === "players" ? "active" : ""}" id="tab-players">
          <div class="card">
            <div class="card__header">
              <span class="card__title">Registered Players (${users.length})</span>
              <button class="btn btn--sm btn--outline" id="btn-refresh-directory">Refresh Player Directory</button>
            </div>
            ${users.length > 0 ? `
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Team Name</th>
                    <th>Email</th>
                    <th>Admin</th>
                    <th>Joined</th>
                  </tr>
                </thead>
                <tbody>
                  ${users.map((u) => `
                    <tr>
                      <td>${u.displayName || "—"}</td>
                      <td><strong>${u.teamName || "—"}</strong></td>
                      <td class="text-sm text-muted">${u.email || "—"}</td>
                      <td>${u.isAdmin ? '<span class="badge badge--live">Admin</span>' : ""}</td>
                      <td class="text-sm text-muted">${formatDate(u.joinedAt)}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            ` : `<p class="text-muted">No players have signed up yet.</p>`}
          </div>

          <div class="card mt-3">
            <div class="card__header"><span class="card__title">Season Reset</span></div>
            <p class="text-muted text-sm mb-3">Deletes all team rosters for all users and events. Use this at the start of a new season. This cannot be undone.</p>
            <button class="btn btn--danger" id="btn-reset-teams">Reset All Teams</button>
          </div>
        </div>

        <!-- CLUBS TAB -->
        <div class="tab-panel ${activeTab === "clubs" ? "active" : ""}" id="tab-clubs">
          <div class="card">
            <div class="card__header">
              <span class="card__title">All Clubs (${clubs.length})</span>
            </div>
            ${clubs.length > 0 ? `
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Owner</th>
                    <th>Members</th>
                    <th>Invite Code</th>
                    <th>Club ID</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  ${clubs.map((c) => {
                    const owner = users.find((u) => u.id === c.ownerId);
                    return `<tr>
                      <td><strong>${c.name}</strong></td>
                      <td>${owner ? (owner.teamName || owner.displayName || owner.email) : c.ownerId}</td>
                      <td>${(c.memberIds || []).length}</td>
                      <td><code>${c.inviteCode}</code></td>
                      <td class="text-xs text-muted">${c.id}</td>
                      <td>
                        <button class="btn btn--sm btn--danger" data-delete-club="${c.id}" data-club-members='${JSON.stringify(c.memberIds || [])}'>Delete</button>
                      </td>
                    </tr>`;
                  }).join("")}
                </tbody>
              </table>
            ` : `<p class="text-muted">No clubs yet.</p>`}
          </div>
        </div>

        <!-- SEED DATA TAB -->
        <div class="tab-panel ${activeTab === "seed" ? "active" : ""}" id="tab-seed">
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Seed 2026 Season Data</span></div>
            <p class="text-muted text-sm mb-3">One-click import of the full 2026 CT schedule (11 events) and men's roster (23 surfers with betting-odds-style pricing). Existing data with the same IDs will be overwritten.</p>
            <div class="form-actions">
              <button class="btn btn--primary" id="btn-seed-events">Seed All Events (11)</button>
              <button class="btn btn--secondary" id="btn-seed-surfers">Seed All Surfers (23)</button>
            </div>
            <div id="seed-output" class="mt-3"></div>
          </div>

          <div class="card">
            <div class="card__header"><span class="card__title">Preview: Surfer Pricing</span></div>
            <p class="text-muted text-xs mb-2">Values based on 2025 final rankings — top-ranked surfers cost more (shorter odds = higher price).</p>
            <table class="data-table">
              <thead><tr><th>Rank</th><th>Name</th><th>Country</th><th>Value</th><th>Bracket</th></tr></thead>
              <tbody>
                <tr><td>1</td><td>Yago Dora</td><td>BRA</td><td>$10.0M</td><td>Elite</td></tr>
                <tr><td>2</td><td>Griffin Colapinto</td><td>USA</td><td>$9.5M</td><td>Elite</td></tr>

          // Derive intent from the persisted event data (single source of
          // truth). Reading checkbox.checked is fragile because some browsers
          // toggle the property in unexpected places relative to preventDefault.

          // Synchronous check (events already loaded): is there an earlier locked
          // event on the same tour that carry-forward could pull from? If not,
          // skip the second confirm — nothing to carry.
          const currentNum = ev?.eventNumber ?? Infinity;
          const hasPriorLocked = events.some(
            (e) => (e.tour || "mens") === evTour
              && e.eventNumber < currentNum
              && e.tradingOpen === false
          );

          // Stepper labels. Carry-forward only appears if there's a source.
          // Popularity snapshot only on the lock path.
          const steps = [locking ? "Lock trading" : "Open trading"];
          if (hasPriorLocked) steps.push("Carry forward");
          if (locking) steps.push("Popularity");
          const stepIdx = { action: 1, carry: hasPriorLocked ? 2 : null, pop: hasPriorLocked ? 3 : 2 };

          // ── STEP 1: confirm the toggle action itself ──
          const dialog1Body = locking
            ? `<p>You're about to lock trading for <strong>"${evName}"</strong> (${evNumLabel}).</p>`
              + `<p>This will:</p>`
              + `<ul>`
              + `<li>Freeze all submitted teams — users can no longer add, drop, or swap surfers for this event.</li>`
              + `</ul>`
              + `<p class="text-sm text-muted" style="margin-top:0.75rem">You'll be asked separately about carry-forward and the popularity snapshot.</p>`
            : `<p>You're about to open trading for <strong>"${evName}"</strong> (${evNumLabel}).</p>`
              + `<p>This will:</p>`
              + `<ul>`
              + `<li>Unfreeze teams so users can edit their roster for this event.</li>`
              + `</ul>`
              + (hasPriorLocked
                ? `<p class="text-sm text-muted" style="margin-top:0.75rem">You'll be asked separately about carry-forward.</p>`
                : "");
          const dialog1Confirmed = await confirmModal({
            title: locking ? "Lock trading?" : "Open trading?",
            bodyHtml: dialog1Body,
            confirmLabel: locking ? "Lock trading" : "Open trading",
            cancelLabel: "Cancel",
            confirmTone: locking ? "danger" : "primary",
            steps,
            currentStep: stepIdx.action
          });
          if (!dialog1Confirmed) {
            // preventDefault held the checkbox in its pre-click state, so
            // there's nothing to revert visually. Just bail.
            return;
          }
          // Step 1 committed → flip the toggle visual + label now. The
          // remaining dialogs are opt-ins for additional side effects; they
          // do not change whether the lock/open happens.
          checkbox.checked = !locking;
          labelText.textContent = locking ? "Locked" : "Open";

          // ── STEP 2: opt-in for carry-forward (only if there's a source) ──
          let shouldCarryForward = false;
          if (hasPriorLocked) {
            const cfChoiceCopy = locking
              ? `For each user who didn't submit a team for <strong>"${evName}"</strong>, copy their most recent locked roster (purchase prices preserved) into this event. User-saved teams are never overwritten. This is the normal end-of-trading flow.`
              : `Pre-populate <strong>"${evName}"</strong> with each user's most recent locked roster. When users open My Team, they'll see their last-event roster with updated market-value deltas (no blank teams). User-saved teams are never overwritten.`;
            const skipChoiceCopy = locking
              ? `Use this if you're re-locking after an accidental Open, or don't want stale rosters scored here.`
              : `Use this if you opened by mistake, or if users should explicitly re-pick.`;
            const dialog2Body =
              `<p>Should we also carry forward rosters from the previous event into <strong>"${evName}"</strong>?</p>`
              + `<div class="confirm-modal__choice">`
              +   `<span class="confirm-modal__choice-label">Carry forward</span>`
              +   `${cfChoiceCopy}`
              + `</div>`
              + `<div class="confirm-modal__choice confirm-modal__choice--alt">`
              +   `<span class="confirm-modal__choice-label">Skip</span>`
              +   `${skipChoiceCopy}`
              + `</div>`;
            shouldCarryForward = await confirmModal({
              title: "Carry forward rosters?",
              bodyHtml: dialog2Body,
              confirmLabel: "Carry forward",
              cancelLabel: "Skip",
              confirmTone: "primary",
              steps,
              currentStep: stepIdx.carry
            });
          }

          // ── STEP 3 (LOCK ONLY): opt-in for popularity snapshot ──
          let shouldSnapshotPopularity = false;
          if (locking) {
            const dialog3Body =
              `<p>Should we also snapshot surfer popularity for <strong>"${evName}"</strong>?</p>`
              + `<div class="confirm-modal__choice">`
              +   `<span class="confirm-modal__choice-label">Snapshot</span>`
              +   `Count how many users picked each surfer, compute % of teams, and save the snapshot to the event doc. This drives the popularity % column on the Surfers page. Required if this is the final lock for this event.`
              + `</div>`
              + `<div class="confirm-modal__choice confirm-modal__choice--alt">`
              +   `<span class="confirm-modal__choice-label">Skip</span>`
              +   `Don't capture popularity now. Use this if you're temporarily re-locking after an accidental Open and a real snapshot already exists, or if you want to redo it later.`
              + `</div>`;
            shouldSnapshotPopularity = await confirmModal({
              title: "Snapshot popularity?",
              bodyHtml: dialog3Body,
              confirmLabel: "Snapshot",
              cancelLabel: "Skip",
              confirmTone: "primary",
              steps,
              currentStep: stepIdx.pop
            });

          // Visual already flipped at step 1 commit. Persist now.
          try {
            await saveEvent(eventId, { tradingOpen: !locking });
            // Keep the local events array in sync so a follow-up click that
            // lands while team ops are still in flight reads the just-saved
            // state, not the stale pre-save value.
            const idx = events.findIndex((e) => e.id === eventId);
            if (idx >= 0) events[idx] = { ...events[idx], tradingOpen: !locking };
          } catch (err) {
            toast("Error saving trading status: " + err.message, "error");
            // Persist failed — roll back the toggle + label to original state.
            checkbox.checked = locking;
            labelText.textContent = locking ? "Open" : "Locked";
            return;

          // Team operations may fail if Firestore rules don't allow admin writes to teams/

            const carried = shouldCarryForward ? await carryForwardTeams(eventId, SEASON) : 0;
            if (locking) {
              await lockTeamsForEvent(eventId, true);

              let popularityNote = "";
              if (shouldSnapshotPopularity) {
                const teams = await getTeamsForEvent(eventId);
                const totalTeams = teams.length;
                const surferCounts = {};
                for (const team of teams) {
                  const surferIds = new Set();
                  if (team.surfers) team.surfers.forEach(s => surferIds.add(s.surferId));
                  if (team.alternate) surferIds.add(team.alternate.surferId);
                  for (const sid of surferIds) surferCounts[sid] = (surferCounts[sid] || 0) + 1;

                const popularityPct = {};
                for (const [sid, count] of Object.entries(surferCounts)) {

                    ? parseFloat(((count / totalTeams) * 100).toFixed(1))

                await saveEvent(eventId, { popularityPct, totalTeams });
                popularityNote = ` Popularity snapshot saved (${totalTeams} team${totalTeams === 1 ? "" : "s"}).`;
              }
              const carriedNote = carried > 0 ? ` ${carried} roster(s) carried forward.` : "";
              toast(`Trading locked.${carriedNote}${popularityNote}`, "success");
            } else {
              await lockTeamsForEvent(eventId, false);
              toast(`Trading opened.${carried > 0 ? ` ${carried} roster(s) carried forward.` : ""}`, "success");
            }

          }
          try { sessionStorage.removeItem(`events_${SEASON}`); } catch {}
          events = await getEvents(SEASON);
          renderAdmin(container);

      const wslFetchBtn = document.getElementById("btn-fetch-results");

      const scrapedByTour = {}; // populated on successful scrape, consumed by Save

      function wslLog(msg, level = "info") {
        if (!wslFetchLog) return;
        wslFetchLog.style.display = "block";
        const prefix = level === "error" ? "✗ " : level === "warn" ? "! " : "  ";
        const time = new Date().toLocaleTimeString();
        wslFetchLog.textContent += `[${time}] ${prefix}${msg}\n`;
        wslFetchLog.scrollTop = wslFetchLog.scrollHeight;
      }

      // Match a WSL venue+tour to a local event in our DB. Tries exact
      // normalized-name match first, then substring either direction so that
      // e.g. WSL's "New Zealand Pro" matches our "Corona Cero New Zealand Pro".
      function matchLocalEvent(wslEvent, localEvents) {
        const norm = (s) => (s || "").toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
        const w = norm(wslEvent.name);
        let m = localEvents.find((e) => (e.tour || "mens") === wslEvent.tour && norm(e.name) === w);
        if (m) return m;
        m = localEvents.find((e) => (e.tour || "mens") === wslEvent.tour && (norm(e.name).includes(w) || w.includes(norm(e.name))));
        return m || null;
      }

      function escapeHtml(s) {
        return (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }

      function renderScrapeSummary(byTour, warnings) {
        const sections = ["mens", "womens"].map((tour) => {
          const g = byTour[tour];
          const label = tour === "mens" ? "Men's" : "Women's";
          if (!g) {
            return `<div style="flex:1;min-width:260px"><h4 style="margin:0 0 0.4rem">${label}</h4><p class="text-muted text-sm">No data scraped.</p></div>`;
          }
          const rows = g.resolvedResults.map((r) =>
            `<tr><td style="padding:0.2rem 0.4rem;text-align:right;font-variant-numeric:tabular-nums">${r.finish}</td><td style="padding:0.2rem 0.4rem">${escapeHtml(r.surferName)}</td><td style="padding:0.2rem 0.4rem;text-align:right;font-variant-numeric:tabular-nums">${r.heatTotal != null ? r.heatTotal.toFixed(2) : "—"}</td><td style="padding:0.2rem 0.4rem;text-align:right;font-variant-numeric:tabular-nums">${r.points}</td></tr>`,
          ).join("");
          return `
            <div style="flex:1;min-width:260px">
              <h4 style="margin:0 0 0.2rem">${label} — ${escapeHtml(g.localEvent.name)}</h4>
              <p class="text-sm text-muted" style="margin:0 0 0.4rem">${g.resolvedResults.length} placements${g.unmatched.length ? ` · ${g.unmatched.length} unmatched` : ""}</p>
              <div style="max-height:280px;overflow-y:auto;border:1px solid var(--color-beige);border-radius:6px;background:#fff">
                <table style="width:100%;font-size:0.8rem;border-collapse:collapse">
                  <thead><tr style="background:#f7f5f0;position:sticky;top:0"><th style="padding:0.3rem 0.4rem;text-align:right">#</th><th style="padding:0.3rem 0.4rem;text-align:left">Surfer</th><th style="padding:0.3rem 0.4rem;text-align:right">Heat</th><th style="padding:0.3rem 0.4rem;text-align:right">Pts</th></tr></thead>
                  <tbody>${rows || `<tr><td colspan="4" style="padding:0.5rem;text-align:center;color:var(--color-warm-gray)">No completed rounds yet.</td></tr>`}</tbody>
                </table>
              </div>
            </div>
          `;
        }).join("");

        const warnHtml = warnings.length ? `
          <div class="mt-3" style="background:#fff4dc;border:1px solid #f0d68c;border-radius:6px;padding:0.6rem 0.8rem">
            <strong style="color:#a37500">Warnings (${warnings.length}):</strong>
            <ul style="margin:0.3rem 0 0;padding-left:1.2rem;font-size:0.8rem;line-height:1.4">
              ${warnings.map((w) => `<li>${escapeHtml(w)}</li>`).join("")}
            </ul>
          </div>` : "";

        const hasAny = Object.values(byTour).some((g) => g?.resolvedResults?.length);
        const saveBtnHtml = hasAny ? `
          <div class="form-actions mt-3">
            <button class="btn btn--primary" id="btn-save-scraped">Save Scraped Results to Firestore</button>
          </div>` : "";

        return `<div style="display:flex;gap:1rem;flex-wrap:wrap">${sections}</div>${warnHtml}${saveBtnHtml}`;
      }

      wslFetchBtn?.addEventListener("click", async () => {
        wslFetchLog.textContent = "";
        wslFetchLog.style.display = "none";
        wslFetchOut.innerHTML = "";
        wslFetchBtn.disabled = true;
        wslFetchBtn.textContent = "Fetching…";
        for (const k of Object.keys(scrapedByTour)) delete scrapedByTour[k];

        const allWarnings = [];

        try {
          const schedule = await fetchSchedule(SEASON, wslLog);
          const venue = pickTargetVenue(schedule);
          if (!venue) {
            wslLog("No active or recently-completed event found on the WSL schedule.", "error");
            allWarnings.push("WSL schedule had no active or completed events.");
            return;
          }
          wslLog(`Target venue: "${venue.name}" — status: ${venue.status}, WSL event #${venue.eventNumber}`);

          const genders = await discoverGenders(venue, SEASON, wslLog);

          for (const tour of ["mens", "womens"]) {
            const g = genders[tour];
            if (!g) {
              wslLog(`No ${tour} statEventId discovered for this venue.`, "warn");
              allWarnings.push(`No ${tour} draw discovered for "${venue.name}".`);
              continue;
            }
            // Build the gender-tagged event used by scrapeEventForGender and
            // for local-event matching.
            const wslEvent = {
              wslEventId: venue.wslEventId,
              slug: venue.slug,
              name: venue.name,
              eventNumber: venue.eventNumber,
              tour,
              statEventId: g.statEventId,
              status: g.status,
            };
            wslLog(`Processing ${tour}: statEventId=${g.statEventId} (${g.status})`);

            const localEvent = matchLocalEvent(wslEvent, events);
            if (!localEvent) {
              wslLog(`Could not match WSL ${tour} "${wslEvent.name}" to any local event.`, "error");
              allWarnings.push(`No local event matches WSL ${tour} event "${wslEvent.name}". Add a local ${tour} event with that name and re-run.`);
              continue;
            }
            wslLog(`  Local event: "${localEvent.name}" (id=${localEvent.id})`);

            let heats, totalRounds;
            try {
              ({ heats, totalRounds } = await scrapeEventForGender(wslEvent, SEASON, wslLog));
            } catch (err) {
              wslLog(`Scrape failed for ${tour}: ${err.message}`, "error");
              allWarnings.push(`${tour} scrape failed: ${err.message}`);
              continue;
            }

            const { places, warnings: placeWarnings } = computeFinishPositions(heats);
            allWarnings.push(...placeWarnings);

            // Build wslId → displayName lookup for the resolver.
            const nameByWslId = new Map();
            for (const h of heats) {
              for (const a of h.athletes) {
                if (a.displayName && !nameByWslId.has(a.wslId)) nameByWslId.set(a.wslId, a.displayName);
              }
            }

            const index = buildSurferIndex(surfers, tour);
            const resolvedResults = [];
            const unmatched = [];
            for (const [wslId, place] of places) {
              const displayName = nameByWslId.get(wslId) || "";
              const r = resolveSurfer(displayName, index);
              if (!r) {
                unmatched.push({ wslId, displayName, finish: place.finish });
                continue;
              }
              if (r.ambiguous) {
                allWarnings.push(`Ambiguous match for "${displayName}" — chose ${r.surfer.name}. Verify (multiple surfers share that first-initial + last name).`);
              }
              resolvedResults.push({
                surferId: r.surfer.id,
                surferName: r.surfer.name,
                finish: place.finish,
                points: place.withdrawn ? 0 : getPoints(place.finish, tour),
                withdrawn: !!place.withdrawn,
                heatTotal: place.heatTotal,
              });
            }
            resolvedResults.sort((a, b) => a.finish - b.finish);

            if (unmatched.length) {
              allWarnings.push(`${unmatched.length} unmatched ${tour} athlete(s): ${unmatched.map((u) => `${u.displayName} (#${u.finish})`).join("; ")}. Likely rookies/wildcards — add them in the Surfers tab and re-run, or enter manually.`);
            }

            scrapedByTour[tour] = { wslEvent, localEvent, resolvedResults, unmatched, totalRounds };
            wslLog(`  ${tour} done: ${resolvedResults.length} placements (${unmatched.length} unmatched).`);
          }

          wslFetchOut.innerHTML = renderScrapeSummary(scrapedByTour, allWarnings);
          wslLog("Scrape complete. Review the summary, then click Save when ready.");

          document.getElementById("btn-save-scraped")?.addEventListener("click", async () => {
            const saveBtn = document.getElementById("btn-save-scraped");
            saveBtn.disabled = true;
            saveBtn.textContent = "Checking existing results…";
            try {
              // Pre-check: any existing results in target events?
              const existingByTour = {};
              for (const tour of ["mens", "womens"]) {
                const g = scrapedByTour[tour];
                if (!g) continue;
                existingByTour[tour] = await getResults(g.localEvent.id);
              }
              const hasNonEmpty = Object.values(existingByTour).some((arr) =>
                arr.some((r) => r.finish || r.withdrawn),
              );
              if (hasNonEmpty && !confirm("This event already has saved results. Overwrite them with the scraped data?")) {
                wslLog("Save canceled by admin.", "warn");
                saveBtn.disabled = false;
                saveBtn.textContent = "Save Scraped Results to Firestore";
                return;
              }

              saveBtn.textContent = "Saving…";
              for (const tour of ["mens", "womens"]) {
                const g = scrapedByTour[tour];
                if (!g || !g.resolvedResults.length) continue;
                const batch = g.resolvedResults.map((r) => ({
                  surferId: r.surferId,
                  finish: r.finish,
                  points: r.points,
                  withdrawn: r.withdrawn,
                  season: SEASON,
                  tour,
                }));
                await saveResultsBatch(g.localEvent.id, batch);
                await saveEvent(g.localEvent.id, { resultsEntered: true });
                wslLog(`Saved ${batch.length} ${tour} results to "${g.localEvent.name}".`);
              }
              try { Object.keys(sessionStorage).filter(k => k.startsWith("events_")).forEach(k => sessionStorage.removeItem(k)); } catch {}
              toast("Scraped results saved. Reload the page to see updated event statuses.", "success");
              saveBtn.textContent = "Saved ✓";
            } catch (err) {
              wslLog(`Save failed: ${err.message}`, "error");
              toast(`Save failed: ${err.message}`, "error");
              saveBtn.disabled = false;
              saveBtn.textContent = "Save Scraped Results to Firestore";
            }
          });

        } catch (err) {
          wslLog(`Fatal: ${err.message}`, "error");
          toast(`Fetch failed: ${err.message}`, "error");
        } finally {
          wslFetchBtn.disabled = false;
          wslFetchBtn.textContent = "Fetch & Update Results from WSL";

                  <span class="result-pts" data-pts-for="${s.id}" style="font-size:0.72rem;color:var(--color-warm-gray);min-width:2rem;text-align:right">${ex?.withdrawn ? "WDRW" : (ex?.finish ? getPoints(ex.finish, eventTour) : "—")}</span>

        rc.querySelectorAll("[data-result-surfer]").forEach((inp) => {

        try {
          for (const s of SEED_SURFERS) {
            await saveSurfer(s.id, { name: s.name, country: s.country, rank: s.rank, value: s.value, priceBracket: s.priceBracket, active: true });

          toast(`Seeded ${SEED_SURFERS.length} surfers!`, "success");

          const count = await clearAllTeams();
          toast(`All teams cleared (${count} rosters deleted).`, "success");

            id: u.id,
            displayName: u.displayName || "Anonymous",
            teamName: u.teamName || "",
            avatarUrl: u.avatarUrl || u.photoUrl || ""
          }));
