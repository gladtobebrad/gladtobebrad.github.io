<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Club — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { SEASON, TOURS } from "./js/config.js";
    import { getUser, getClub, getClubByInviteCode, createClub, joinClub, leaveClub, deleteClub,
             getLeaderboard, getEvents, getUserClubIds, fetchLeaderboardVersion } from "./js/db.js";
    import { isInProgress, buildRankProgression } from "./js/scoring.js";
    import { bootstrapPage, toast, escapeHtml, confirmModal } from "./js/ui.js";
    import { renderStandingsTable, wireStandingsTables } from "./js/standings-table.js";

    let clubScoringMode = "best9";

    // Cache fetched data so scoring-mode toggles don't re-fetch
    let _clubDataCache = null;
    // Stash the auth'd user so visibility/bfcache handlers can re-render.
    let _activeUser = null;
    // Guard against concurrent re-renders triggered by overlapping events.
    let _refreshing = false;

    const main = bootstrapPage({
      auth: "user",
      render: ({ main, user }) => { _activeUser = user; return renderClubPage(main, user); },
      onGate: () => { _activeUser = null; },
    });

    // If the leaderboard version on the server has moved past what this tab
    // last rendered with (e.g. admin recalculated in another tab while this
    // one was hidden, or this page was restored from bfcache), refresh.
    // Without this, the cached _clubDataCache + cached `events` would keep
    // showing pre-recalc scores until the user manually reloads.
    async function refreshIfStale() {
      if (_refreshing || !_activeUser) return;
      const cachedVersion = _clubDataCache?.lbVersion;
      if (cachedVersion == null) return;
      _refreshing = true;
      try {
        const currentVersion = await fetchLeaderboardVersion();
        if (currentVersion !== cachedVersion) {
          _clubDataCache = null;
          if (main) await renderClubPage(main, _activeUser);
        }
      } catch {} finally {
        _refreshing = false;
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") refreshIfStale();
    });
    // pageshow fires with persisted=true when the page is restored from the
    // back/forward cache (full JS state preserved, no re-execution otherwise).
    window.addEventListener("pageshow", (e) => {
      if (e.persisted) refreshIfStale();
    });

    async function renderClubPage(container, user) {
      const userDoc = await getUser(user.uid);
      const clubIds = getUserClubIds(userDoc);

      if (clubIds.length === 0) {
        renderNoClub(container, user);
        return;
      }

      // Determine which club to show — from URL param or first
      const params = new URLSearchParams(window.location.search);
      const requestedId = params.get("id");
      const activeId = (requestedId && clubIds.includes(requestedId)) ? requestedId : clubIds[0];

      const clubs = (await Promise.all(clubIds.map((id) => getClub(id)))).filter(Boolean);
      if (clubs.length === 0) { renderNoClub(container, user); return; }

      const activeClub = clubs.find((c) => c.id === activeId) || clubs[0];
      await renderClubView(container, user, userDoc, activeClub, clubs);
    }

    function renderNoClub(container, user) {
      container.innerHTML = `
        <h1 class="page-title">My Club</h1>
        <p class="text-muted mb-3">Compete with friends in a private leaderboard. Create a club or join one with an invite code.</p>
        <div class="grid grid--2">
          <div class="card">
            <div class="card__header"><span class="card__title">Create a Club</span></div>
            <div class="form-group mb-2">
              <label class="form-label">Club Name</label>
              <input type="text" class="search-input" id="club-name-input" aria-label="Club name" placeholder="The Barrels" maxlength="40">
            </div>
            <button class="btn btn--primary btn--sm" id="btn-create-club">Create Club</button>
          </div>
          <div class="card">
            <div class="card__header"><span class="card__title">Join a Club</span></div>
            <div class="form-group mb-2">
              <label class="form-label">Invite Code</label>
              <input type="text" class="search-input" id="invite-code-input" aria-label="Invite code" placeholder="e.g. AB3XY7" maxlength="6" style="text-transform:uppercase">
            </div>
            <button class="btn btn--outline btn--sm" id="btn-join-club">Join Club</button>
          </div>
        </div>
      `;

      document.getElementById("btn-create-club")?.addEventListener("click", async () => {
        const name = document.getElementById("club-name-input")?.value.trim();
        if (!name) { toast("Enter a club name.", "error"); return; }
        const btn = document.getElementById("btn-create-club");
        btn.disabled = true; btn.textContent = "Creating…";
        try {
          await createClub(user.uid, name);
          location.href = "club.html";
        } catch (err) {
          toast("Failed to create club.", "error");
          btn.disabled = false; btn.textContent = "Create Club";
        }
      });

      document.getElementById("btn-join-club")?.addEventListener("click", async () => {
        const code = document.getElementById("invite-code-input")?.value.trim().toUpperCase();
        if (!code) { toast("Enter an invite code.", "error"); return; }
        const btn = document.getElementById("btn-join-club");
        btn.disabled = true; btn.textContent = "Joining…";
        try {
          const club = await getClubByInviteCode(code);
          if (!club) { toast("Club not found. Check the invite code.", "error"); btn.disabled = false; btn.textContent = "Join Club"; return; }
          await joinClub(user.uid, club.id);
          location.href = "club.html";
        } catch (err) {
          toast("Failed to join club.", "error");
          btn.disabled = false; btn.textContent = "Join Club";
        }
      });
    }

    async function renderClubView(container, user, userDoc, club, allUserClubs) {
      const isOwner = club.ownerId === user.uid;

      // ── Fetch all data once; bust cache when leaderboard version changes ──
      const currentLbVersion = await fetchLeaderboardVersion();
      if (!_clubDataCache || _clubDataCache.clubId !== club.id || _clubDataCache.lbVersion !== currentLbVersion) {
        const [mensLeaderboard, womensLeaderboard, events] = await Promise.all([
          getLeaderboard(SEASON, "mens"),
          getLeaderboard(SEASON, "womens"),
          getEvents(SEASON),
        ]);

        const memberSet = new Set(club.memberIds);

        // Member docs: sessionStorage cache keyed by club + leaderboard version
        const memberCacheKey = `memberDocs_${club.id}_${currentLbVersion}`;
        let memberDocs = {};
        try {
          const cached = sessionStorage.getItem(memberCacheKey);
          if (cached) memberDocs = JSON.parse(cached);
        } catch {}

        if (Object.keys(memberDocs).length === 0) {
          await Promise.all(club.memberIds.map(async (uid) => {
            memberDocs[uid] = await getUser(uid);
          }));
          try { sessionStorage.setItem(memberCacheKey, JSON.stringify(memberDocs)); } catch {}
        }

        const buildMemberEntries = (leaderboard) => {
          const entries = leaderboard.filter((e) => memberSet.has(e.userId));
          const seenIds = new Set(entries.map((e) => e.userId));
          const missingIds = club.memberIds.filter((id) => !seenIds.has(id));
          for (const entry of entries) {
            const ud = memberDocs[entry.userId];
            if (ud) {
              entry.avatarUrl = ud.avatarUrl || "";
              entry.teamName = ud.teamName || entry.teamName || ud.displayName || "";
              entry.displayName = ud.displayName || entry.displayName || "";
            }
          }
          for (const uid of missingIds) {
            const ud = memberDocs[uid];
            if (ud) entries.push({ userId: uid, avatarUrl: ud.avatarUrl || "", teamName: ud.teamName || ud.displayName || "—", displayName: ud.displayName || "—", bestNineTotal: 0, allEventsTotal: 0, eventScores: {} });
          }
          return entries;
        };

        // Member entries carry their own per-event scores (already projected
        // for any in-progress event, since the admin recalc stores projections);
        // the flat lookup used by the leaderboard table is derived from them below.
        _clubDataCache = {
          clubId: club.id,
          lbVersion: currentLbVersion,
          events,
          memberDocs,
          mensMemberEntries: buildMemberEntries(mensLeaderboard),
          womensMemberEntries: buildMemberEntries(womensLeaderboard),
        };
      }

      const { events, mensMemberEntries, womensMemberEntries } = _clubDataCache;
      const clubIds = getUserClubIds(userDoc);
      const canJoinMore = clubIds.length < 3;

      // Each event doc gets its own column (mens and womens are separate)
      // Sort by eventNumber then tour so mens comes before womens
      const eventColumns = [...events].sort((a, b) =>
        a.eventNumber !== b.eventNumber
          ? a.eventNumber - b.eventNumber
          : (a.tour || "mens").localeCompare(b.tour || "mens")
      );

      // Flat {userId:{eventId:pts}} lookup for the table, derived from the
      // member entries' own eventScores (projected values already baked in by
      // the admin recalc for live events). A user has an entry in BOTH tours,
      // so MERGE their eventScores — overwriting would drop one tour's columns.
      // Event IDs are unique per tour, so the merge can't collide.
      const eventScores = {};
      for (const e of [...mensMemberEntries, ...womensMemberEntries]) {
        eventScores[e.userId] = { ...(eventScores[e.userId] || {}), ...(e.eventScores || {}) };
      }
      const projectedIds = new Set(
        eventColumns.filter((e) => isInProgress(e) && e.resultsEntered).map((e) => e.id)
      );

      // ── Rank progression chart helpers (mirror dashboard) ──
      const mensCompletedIds = events
        .filter(e => (e.tour || "mens") === "mens" && e.status === "completed")
        .sort((a, b) => (a.eventNumber || 0) - (b.eventNumber || 0))
        .map(e => e.id);
      const womensCompletedIds = events
        .filter(e => (e.tour || "") === "womens" && e.status === "completed")
        .sort((a, b) => (a.eventNumber || 0) - (b.eventNumber || 0))
        .map(e => e.id);

      const MENS_LINE_COLOR = "#7D8975";   // sage-dark
      const WOMENS_LINE_COLOR = "#B0837A"; // muted dusty rose

      const renderRankChart = (mensRanks, womensRanks, totalPlayers) => {
        const maxEvents = Math.max(mensRanks.length, womensRanks.length);
        if (maxEvents === 0) return `<p class="text-muted text-sm" style="text-align:center;margin-top:0.75rem">Chart will appear after events are scored.</p>`;
        // Flat-aspect viewBox so the chart fills the full pane width without
        // running too tall. SVG will render at ~872 × 311 px on a 920px page.
        const W = 280, H = 100, pad = { t: 5, r: 8, b: 20, l: 24 };
        const chartW = W - pad.l - pad.r;
        const chartH = H - pad.t - pad.b;
        const maxRank = Math.max(totalPlayers, 1);
        const toPoint = (ranks, i) => {
          const x = pad.l + (maxEvents === 1 ? chartW / 2 : (i / (maxEvents - 1)) * chartW);
          const y = pad.t + ((ranks[i] - 1) / (maxRank - 1)) * chartH;
          return { x, y };
        };
        const makeLine = (ranks, color) => {
          const valid = ranks.map((r, i) => r != null ? i : null).filter(i => i != null);
          if (valid.length === 0) return "";
          const points = valid.map(i => { const p = toPoint(ranks, i); return `${p.x},${p.y}`; });
          const pathD = points.length === 1 ? "" : `<polyline points="${points.join(" ")}" fill="none" stroke="${color}" stroke-width="1" />`;
          const dots = valid.map(i => {
            const p = toPoint(ranks, i);
            return `<circle cx="${p.x}" cy="${p.y}" r="1.5" fill="${color}" />`;
          }).join("");
          return pathD + dots;
        };
        const yLabelCount = 7;
        const yLabels = [...new Set(
          Array.from({ length: yLabelCount }, (_, i) =>
            Math.max(1, Math.round(1 + (maxRank - 1) * i / (yLabelCount - 1)))
          )
        )].sort((a, b) => a - b);
        const yLabelHtml = yLabels.map(r => {
          const y = pad.t + ((r - 1) / Math.max(maxRank - 1, 1)) * chartH;
          return `<text x="${pad.l - 2}" y="${y + 1.5}" text-anchor="end" fill="var(--color-warm-gray)" font-size="4">${r}</text>`;
        }).join("");
        const xLabelHtml = Array.from({ length: maxEvents }, (_, i) => {
          const x = pad.l + (maxEvents === 1 ? chartW / 2 : (i / (maxEvents - 1)) * chartW);
          return `<text x="${x}" y="${H - 11}" text-anchor="middle" fill="var(--color-warm-gray)" font-size="4">E${i + 1}</text>`;
        }).join("");
        const gridHtml = yLabels.map(r => {
          const y = pad.t + ((r - 1) / Math.max(maxRank - 1, 1)) * chartH;
          return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="var(--color-beige)" stroke-width="0.25" />`;
        }).join("");
        const yAxisLabelX = 5;
        const yAxisLabelY = pad.t + chartH / 2;
        const xAxisLabelY = H - 3;
        return `
          <div style="margin-top:0.75rem">
            <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
              ${gridHtml}
              ${yLabelHtml}
              ${xLabelHtml}
              <text x="${yAxisLabelX}" y="${yAxisLabelY}" text-anchor="middle" transform="rotate(-90, ${yAxisLabelX}, ${yAxisLabelY})" fill="var(--color-warm-brown)" font-size="5" font-weight="600">Rank</text>
              <text x="${pad.l + chartW / 2}" y="${xAxisLabelY}" text-anchor="middle" fill="var(--color-warm-brown)" font-size="5" font-weight="600">Event Number</text>
              ${makeLine(mensRanks, MENS_LINE_COLOR)}
              ${makeLine(womensRanks, WOMENS_LINE_COLOR)}
            </svg>
            <div style="display:flex;gap:1.25rem;justify-content:center;margin-top:0.25rem;font-size:0.72rem">
              <span style="color:${MENS_LINE_COLOR};display:inline-flex;align-items:center;gap:0.3rem"><span style="display:inline-block;width:14px;height:2px;background:${MENS_LINE_COLOR}"></span>Men's CT</span>
              <span style="color:${WOMENS_LINE_COLOR};display:inline-flex;align-items:center;gap:0.3rem"><span style="display:inline-block;width:14px;height:2px;background:${WOMENS_LINE_COLOR}"></span>Women's CT</span>
            </div>
          </div>`;
      };

      const clubMensRanks = buildRankProgression(mensMemberEntries, mensCompletedIds, user.uid);
      const clubWomensRanks = buildRankProgression(womensMemberEntries, womensCompletedIds, user.uid);
      const clubChartHtml = renderRankChart(
        clubMensRanks,
        clubWomensRanks,
        Math.max(club.memberIds.length, 6)
      );

      // Club tabs for multi-club users
      const clubTabsHtml = allUserClubs.length > 1 ? `
        <div class="tour-tabs mb-3">
          ${allUserClubs.map((c) => `
            <a href="club.html?id=${c.id}" class="tour-tab ${c.id === club.id ? "tour-tab--active" : ""}">${escapeHtml(c.name)}</a>
          `).join("")}
        </div>
      ` : "";

      container.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
          <h1 class="page-title" style="margin:0">${escapeHtml(club.name)}</h1>
          <button class="btn btn--outline btn--sm" id="btn-leave-club" style="color:var(--color-error);border-color:var(--color-error)">
            ${isOwner ? "Delete Club" : "Leave Club"}
          </button>
        </div>
        ${clubTabsHtml}
        <p class="text-muted text-sm mb-3">${club.memberIds.length} member${club.memberIds.length === 1 ? "" : "s"} &nbsp;·&nbsp; Invite code: <strong>${escapeHtml(club.inviteCode)}</strong></p>


        <!-- Event-by-Event Scores -->
        <div class="card mb-3">
          <div class="card__header"><span class="card__title">Season Leaderboard</span></div>
          <div class="club-controls">
            <div class="tour-tabs" style="margin-bottom:0;border-bottom-width:1px">
              <button class="tour-tab ebe-tour-tab tour-tab--active" data-ebe-tour="mens" style="padding:0.35rem 1rem;font-size:0.85rem">Men's CT</button>
              <button class="tour-tab ebe-tour-tab" data-ebe-tour="womens" style="padding:0.35rem 1rem;font-size:0.85rem">Women's CT</button>
            </div>
            <div style="display:inline-flex;border:1px solid var(--color-beige);border-radius:var(--radius-md);overflow:hidden;font-size:0.75rem">
              <button class="club-scoring-toggle" data-mode="best9" style="padding:0.25rem 0.6rem;border:none;cursor:pointer;font-family:inherit;${clubScoringMode === "best9" ? "background:var(--color-sage);color:#fff;font-weight:600" : "background:var(--color-warm-white);color:var(--color-warm-brown)"}">Best 9</button>
              <button class="club-scoring-toggle" data-mode="all" style="padding:0.25rem 0.6rem;border:none;border-left:1px solid var(--color-beige);cursor:pointer;font-family:inherit;${clubScoringMode === "all" ? "background:var(--color-sage);color:#fff;font-weight:600" : "background:var(--color-warm-white);color:var(--color-warm-brown)"}">All Events</button>
            </div>
          </div>
          ${TOURS.map((tour) => {
            const tourEvents = eventColumns.filter((e) => (e.tour || "mens") === tour);
            const sortKey = clubScoringMode === "all" ? "allEventsTotal" : "bestNineTotal";
            const entries = (tour === "mens" ? mensMemberEntries : womensMemberEntries)
              .slice().sort((a, b) => (b[sortKey] || 0) - (a[sortKey] || 0))
              .map((e, i) => ({
                id: e.userId,
                rank: i + 1,
                displayName: e.displayName || "Anonymous",
                teamName: e.teamName || e.displayName || "—",
                avatarUrl: e.avatarUrl || "",
                bestNineTotal: e.bestNineTotal || 0,
                allEventsTotal: e.allEventsTotal || 0,
                eventScores: eventScores[e.userId] || {},
              }));
            return `
              <div class="ebe-panel" data-ebe-panel="${tour}" style="${tour === "womens" ? "display:none" : ""}">
                ${tourEvents.length > 0
                  ? renderStandingsTable({ players: entries, tourEvents, scoringMode: clubScoringMode, liveEventIds: projectedIds, highlightUserId: user.uid })
                  : `<p class="text-muted text-sm">No events yet.</p>`}
              </div>
            `;
          }).join("")}
        </div>

        <!-- Club rank progression chart -->
        <div class="card mb-3">
          <div class="card__header"><span class="card__title">${escapeHtml(club.name)} Standings</span></div>
          ${clubChartHtml}
        </div>

        <!-- Join another club -->
        ${canJoinMore ? `
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Join Another Club</span><span class="text-xs text-muted">${clubIds.length}/3 clubs</span></div>
            <div style="display:flex;gap:0.5rem;align-items:flex-end">
              <div class="form-group" style="flex:1;margin:0">
                <input type="text" class="search-input" id="invite-code-input" aria-label="Invite code" placeholder="Invite code" maxlength="6" style="text-transform:uppercase">
              </div>
              <button class="btn btn--outline btn--sm" id="btn-join-more">Join</button>
            </div>
          </div>
        ` : `<p class="text-muted text-sm mb-3">You're in 3 clubs (maximum).</p>`}
      `;

      // Scoring mode toggle
      document.querySelectorAll(".club-scoring-toggle").forEach((btn) => {
        btn.addEventListener("click", async () => {
          clubScoringMode = btn.dataset.mode;
          await renderClubView(container, user, userDoc, club, allUserClubs);
        });
      });

      // Tour tabs for event-by-event
      document.querySelectorAll(".ebe-tour-tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".ebe-tour-tab").forEach((b) => b.classList.remove("tour-tab--active"));
          btn.classList.add("tour-tab--active");
          document.querySelectorAll(".ebe-panel").forEach((p) => {
            p.style.display = p.dataset.ebePanel === btn.dataset.ebeTour ? "" : "none";
          });
        });
      });

      // Click-to-sort the total column and each event-by-event column
      wireStandingsTables(container);

      document.getElementById("btn-leave-club")?.addEventListener("click", async () => {
        if (!(await confirmModal({
          title: isOwner ? "Delete club?" : "Leave club?",
          bodyHtml: isOwner
            ? "<p>This deletes the club and removes all members. This cannot be undone.</p>"
            : "<p>Are you sure you want to leave this club?</p>",
          confirmLabel: isOwner ? "Delete club" : "Leave club",
          confirmTone: "danger",
        }))) return;
        const btn = document.getElementById("btn-leave-club");
        btn.disabled = true;
        try {
          if (isOwner) await deleteClub(club.id, club.memberIds);
          else await leaveClub(user.uid, club.id);
          location.href = "club.html";
        } catch (err) {
          toast("Action failed.", "error");
          btn.disabled = false;
        }
      });

      document.getElementById("btn-join-more")?.addEventListener("click", async () => {
        const code = document.getElementById("invite-code-input")?.value.trim().toUpperCase();
        if (!code) { toast("Enter an invite code.", "error"); return; }
        const btn = document.getElementById("btn-join-more");
        btn.disabled = true; btn.textContent = "Joining…";
        try {
          const found = await getClubByInviteCode(code);
          if (!found) { toast("Club not found.", "error"); btn.disabled = false; btn.textContent = "Join"; return; }
          await joinClub(user.uid, found.id);
          location.href = `club.html?id=${found.id}`;
        } catch (err) {
          toast("Failed to join club.", "error");
          btn.disabled = false; btn.textContent = "Join";
        }
      });
    }
  </script>
</body>
</html>
