<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Club — Fantasy Surf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fantasy.css">
  <link rel="icon" type="image/png" href="img/Fsurf_logo.png">
  <link rel="apple-touch-icon" href="img/Fsurf_logo.png">
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <main class="app-main" id="app-main">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>

  <script type="module">
    import { initAuth, onAuth } from "./js/auth.js";
    import { getUser, getClub, getClubByInviteCode, createClub, joinClub, leaveClub, deleteClub,
             getLeaderboard, getEvents, getTeamsForEvent, getResults, getSurfers, getUserClubIds } from "./js/db.js";
    import { scoreTeam } from "./js/scoring.js";
    import { renderHeader, renderFooter, showAuthGate, showLoading, toast, formatSalary } from "./js/ui.js";

    const SEASON = 2026;

    initAuth();
    renderHeader();
    renderFooter();

    onAuth(async (user, profile) => {
      const main = document.getElementById("app-main");
      if (!user) { showAuthGate(main); return; }
      showLoading(main);
      await renderClubPage(main, user);
    });

    async function renderClubPage(container, user) {
      const userDoc = await getUser(user.uid);
      const clubIds = getUserClubIds(userDoc);

      if (clubIds.length === 0) {
        renderNoClub(container, user);
        return;
      }

      // Determine which club to show — from URL param or first
      const params = new URLSearchParams(window.location.search);
      const requestedId = params.get("id");
      const activeId = (requestedId && clubIds.includes(requestedId)) ? requestedId : clubIds[0];

      const clubs = (await Promise.all(clubIds.map((id) => getClub(id)))).filter(Boolean);
      if (clubs.length === 0) { renderNoClub(container, user); return; }

      const activeClub = clubs.find((c) => c.id === activeId) || clubs[0];
      await renderClubView(container, user, activeClub, clubs);
    }

    function renderNoClub(container, user) {
      container.innerHTML = `
        <h1 class="page-title">My Club</h1>
        <p class="text-muted mb-3">Compete with friends in a private leaderboard. Create a club or join one with an invite code.</p>
        <div class="grid grid--2">
          <div class="card">
            <div class="card__header"><span class="card__title">Create a Club</span></div>
            <div class="form-group mb-2">
              <label class="form-label">Club Name</label>
              <input type="text" class="search-input" id="club-name-input" placeholder="The Barrels" maxlength="40">
            </div>
            <button class="btn btn--primary btn--sm" id="btn-create-club">Create Club</button>
          </div>
          <div class="card">
            <div class="card__header"><span class="card__title">Join a Club</span></div>
            <div class="form-group mb-2">
              <label class="form-label">Invite Code</label>
              <input type="text" class="search-input" id="invite-code-input" placeholder="e.g. AB3XY7" maxlength="6" style="text-transform:uppercase">
            </div>
            <button class="btn btn--outline btn--sm" id="btn-join-club">Join Club</button>
          </div>
        </div>
      `;

      document.getElementById("btn-create-club")?.addEventListener("click", async () => {
        const name = document.getElementById("club-name-input")?.value.trim();
        if (!name) { toast("Enter a club name.", "error"); return; }
        const btn = document.getElementById("btn-create-club");
        btn.disabled = true; btn.textContent = "Creating…";
        try {
          await createClub(user.uid, name);
          location.href = "club.html";
        } catch (err) {
          toast("Failed to create club.", "error");
          btn.disabled = false; btn.textContent = "Create Club";
        }
      });

      document.getElementById("btn-join-club")?.addEventListener("click", async () => {
        const code = document.getElementById("invite-code-input")?.value.trim().toUpperCase();
        if (!code) { toast("Enter an invite code.", "error"); return; }
        const btn = document.getElementById("btn-join-club");
        btn.disabled = true; btn.textContent = "Joining…";
        try {
          const club = await getClubByInviteCode(code);
          if (!club) { toast("Club not found. Check the invite code.", "error"); btn.disabled = false; btn.textContent = "Join Club"; return; }
          await joinClub(user.uid, club.id);
          location.href = "club.html";
        } catch (err) {
          toast("Failed to join club.", "error");
          btn.disabled = false; btn.textContent = "Join Club";
        }
      });
    }

    async function renderClubView(container, user, club, allUserClubs) {
      const isOwner = club.ownerId === user.uid;
      const userDoc = await getUser(user.uid);
      const clubIds = getUserClubIds(userDoc);
      const canJoinMore = clubIds.length < 3;

      // Load leaderboard (both tours) + enrich members
      const [mensLeaderboard, womensLeaderboard, events, surfers] = await Promise.all([
        getLeaderboard(SEASON, "mens"),
        getLeaderboard(SEASON, "womens"),
        getEvents(SEASON),
        getSurfers()
      ]);

      const surferMap = {};
      surfers.forEach((s) => { surferMap[s.id] = s; });

      const memberSet = new Set(club.memberIds);

      const userCache = {};
      const getOrFetchUser = async (uid) => {
        if (!userCache[uid]) userCache[uid] = await getUser(uid);
        return userCache[uid];
      };

      const buildMemberEntries = async (leaderboard) => {
        const entries = leaderboard.filter((e) => memberSet.has(e.userId));
        const seenIds = new Set(entries.map((e) => e.userId));
        const missingIds = club.memberIds.filter((id) => !seenIds.has(id));
        for (const entry of entries) {
          const ud = await getOrFetchUser(entry.userId);
          if (ud) {
            entry.avatarUrl = ud.avatarUrl || "";
            entry.teamName = ud.teamName || entry.teamName || ud.displayName || "";
            entry.displayName = ud.displayName || entry.displayName || "";
          }
        }
        for (const uid of missingIds) {
          const ud = await getOrFetchUser(uid);
          if (ud) entries.push({ userId: uid, avatarUrl: ud.avatarUrl || "", teamName: ud.teamName || ud.displayName || "—", displayName: ud.displayName || "—", bestNineTotal: 0, allEventsTotal: 0 });
        }
        entries.sort((a, b) => (b.bestNineTotal || 0) - (a.bestNineTotal || 0));
        return entries;
      };

      const [mensMemberEntries, womensMemberEntries] = await Promise.all([
        buildMemberEntries(mensLeaderboard),
        buildMemberEntries(womensLeaderboard)
      ]);

      // ── Event-by-event scoring ──
      // eventScores[userId][eventId] = points (completed events only)
      const eventScores = {};
      for (const uid of club.memberIds) eventScores[uid] = {};

      const completedEvents = events.filter((e) => e.status === "completed");
      for (const event of completedEvents) {
        const [teams, results] = await Promise.all([getTeamsForEvent(event.id), getResults(event.id)]);
        for (const team of teams) {
          if (!memberSet.has(team.userId)) continue;
          const score = scoreTeam(team, results, event.tour || "mens");
          eventScores[team.userId][event.id] = score.totalPoints;
        }
      }

      // Each event doc gets its own column (mens and womens are separate)
      // Sort by eventNumber then tour so mens comes before womens
      const eventColumns = [...events].sort((a, b) =>
        a.eventNumber !== b.eventNumber
          ? a.eventNumber - b.eventNumber
          : (a.tour || "mens").localeCompare(b.tour || "mens")
      );

      // Club tabs for multi-club users
      const clubTabsHtml = allUserClubs.length > 1 ? `
        <div class="tour-tabs mb-3">
          ${allUserClubs.map((c) => `
            <a href="club.html?id=${c.id}" class="tour-tab ${c.id === club.id ? "tour-tab--active" : ""}">${c.name}</a>
          `).join("")}
        </div>
      ` : "";

      container.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
          <h1 class="page-title" style="margin:0">${club.name}</h1>
          <button class="btn btn--outline btn--sm" id="btn-leave-club" style="color:var(--color-error,#c0392b);border-color:var(--color-error,#c0392b)">
            ${isOwner ? "Delete Club" : "Leave Club"}
          </button>
        </div>
        ${clubTabsHtml}
        <p class="text-muted text-sm mb-3">${club.memberIds.length} member${club.memberIds.length === 1 ? "" : "s"} &nbsp;·&nbsp; Invite code: <strong>${club.inviteCode}</strong></p>


        <!-- Event-by-Event Scores -->
        <div class="card mb-3">
          <div class="card__header"><span class="card__title">Season Leaderboard</span></div>
          <div class="tour-tabs" style="margin-bottom:0.75rem;border-bottom-width:1px">
            <button class="tour-tab ebe-tour-tab tour-tab--active" data-ebe-tour="mens" style="padding:0.35rem 1rem;font-size:0.85rem">Men's CT</button>
            <button class="tour-tab ebe-tour-tab" data-ebe-tour="womens" style="padding:0.35rem 1rem;font-size:0.85rem">Women's CT</button>
          </div>
          ${["mens", "womens"].map((tour) => {
            const tourEvents = eventColumns.filter((e) => (e.tour || "mens") === tour);
            const entries = tour === "mens" ? mensMemberEntries : womensMemberEntries;
            return `
              <div class="ebe-panel" data-ebe-panel="${tour}" style="${tour === "womens" ? "display:none" : ""}">
                ${tourEvents.length > 0 ? `
                  <div style="overflow-x:auto;position:relative">
                    <table class="data-table" style="border-collapse:separate;border-spacing:0">
                      <thead>
                        <tr>
                          <th style="position:sticky;left:0;z-index:2;background:var(--color-warm-white);white-space:nowrap">Player</th>
                          ${tourEvents.map((e) => `
                            <th class="text-right sortable-col" data-event-id="${e.id}" style="white-space:nowrap;font-size:0.7rem;cursor:pointer;user-select:none" title="Sort by ${e.name}">
                              ${e.name.split(" ").slice(-2).join(" ")} <span class="sort-arrow" style="font-size:0.6rem;opacity:0.4">▲▼</span>
                            </th>
                          `).join("")}
                          <th class="text-right" style="position:sticky;right:0;z-index:2;background:var(--color-warm-white);white-space:nowrap;font-size:0.75rem">Best 9</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${entries.map((entry) => `
                          <tr class="${entry.userId === user.uid ? "highlight" : ""}" data-user-id="${entry.userId}">
                            <td style="position:sticky;left:0;z-index:1;background:var(--color-warm-white);white-space:nowrap">
                              <a href="profile.html?id=${entry.userId}" style="text-decoration:none;color:inherit">
                                ${entry.teamName || entry.displayName || "—"}
                              </a>
                            </td>
                            ${tourEvents.map((e) => {
                              const pts = eventScores[entry.userId]?.[e.id];
                              const isCompleted = e.status === "completed";
                              return `<td class="text-right" data-event-pts="${e.id}" data-pts="${isCompleted && pts != null ? pts : -1}" style="${!isCompleted ? "color:var(--color-warm-brown)" : ""}">
                                ${isCompleted ? (pts ?? "—") : e.status === "live" ? "🔴" : "·"}
                              </td>`;
                            }).join("")}
                            <td class="text-right" style="position:sticky;right:0;z-index:1;background:var(--color-warm-white);font-weight:600">${entry.bestNineTotal || 0}</td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>
                  </div>
                ` : `<p class="text-muted text-sm">No events yet.</p>`}
              </div>
            `;
          }).join("")}
        </div>

        <!-- Join another club -->
        ${canJoinMore ? `
          <div class="card mb-3">
            <div class="card__header"><span class="card__title">Join Another Club</span><span class="text-xs text-muted">${clubIds.length}/3 clubs</span></div>
            <div style="display:flex;gap:0.5rem;align-items:flex-end">
              <div class="form-group" style="flex:1;margin:0">
                <input type="text" class="search-input" id="invite-code-input" placeholder="Invite code" maxlength="6" style="text-transform:uppercase">
              </div>
              <button class="btn btn--outline btn--sm" id="btn-join-more">Join</button>
            </div>
          </div>
        ` : `<p class="text-muted text-sm mb-3">You're in 3 clubs (maximum).</p>`}
      `;

      // Tour tabs for event-by-event
      document.querySelectorAll(".ebe-tour-tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".ebe-tour-tab").forEach((b) => b.classList.remove("tour-tab--active"));
          btn.classList.add("tour-tab--active");
          document.querySelectorAll(".ebe-panel").forEach((p) => {
            p.style.display = p.dataset.ebePanel === btn.dataset.ebeTour ? "" : "none";
          });
        });
      });

      // Click-to-sort event-by-event columns
      const sortState = {}; // tableIndex → { eventId, dir }
      document.querySelectorAll(".sortable-col").forEach((th) => {
        th.addEventListener("click", () => {
          const eventId = th.dataset.eventId;
          const tbody = th.closest("table").querySelector("tbody");
          const tableKey = th.closest("table").dataset.tourKey || th.closest("table");
          const prev = sortState[tableKey] || {};
          const dir = (prev.eventId === eventId && prev.dir === "desc") ? "asc" : "desc";
          sortState[tableKey] = { eventId, dir };

          // Update arrow indicators
          th.closest("thead").querySelectorAll(".sort-arrow").forEach((a) => { a.textContent = "▲▼"; a.style.opacity = "0.4"; });
          th.querySelector(".sort-arrow").textContent = dir === "desc" ? "▼" : "▲";
          th.querySelector(".sort-arrow").style.opacity = "1";

          const rows = [...tbody.querySelectorAll("tr")];
          rows.sort((a, b) => {
            const aVal = parseInt(a.querySelector(`[data-event-pts="${eventId}"]`)?.dataset.pts ?? -1, 10);
            const bVal = parseInt(b.querySelector(`[data-event-pts="${eventId}"]`)?.dataset.pts ?? -1, 10);
            return dir === "desc" ? bVal - aVal : aVal - bVal;
          });
          rows.forEach((r) => tbody.appendChild(r));
        });
      });

      document.getElementById("btn-leave-club")?.addEventListener("click", async () => {
        if (!confirm(`Are you sure you want to ${isOwner ? "delete this club" : "leave"}?`)) return;
        const btn = document.getElementById("btn-leave-club");
        btn.disabled = true;
        try {
          if (isOwner) await deleteClub(club.id, club.memberIds);
          else await leaveClub(user.uid, club.id);
          location.href = "club.html";
        } catch (err) {
          toast("Action failed.", "error");
          btn.disabled = false;
        }
      });

      document.getElementById("btn-join-more")?.addEventListener("click", async () => {
        const code = document.getElementById("invite-code-input")?.value.trim().toUpperCase();
        if (!code) { toast("Enter an invite code.", "error"); return; }
        const btn = document.getElementById("btn-join-more");
        btn.disabled = true; btn.textContent = "Joining…";
        try {
          const found = await getClubByInviteCode(code);
          if (!found) { toast("Club not found.", "error"); btn.disabled = false; btn.textContent = "Join"; return; }
          await joinClub(user.uid, found.id);
          location.href = `club.html?id=${found.id}`;
        } catch (err) {
          toast("Failed to join club.", "error");
          btn.disabled = false; btn.textContent = "Join";
        }
      });
    }
  </script>
</body>
</html>
